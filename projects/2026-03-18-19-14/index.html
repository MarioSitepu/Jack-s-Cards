<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future-Forward Project</title>
    <style>
        /* Basic Reset & Variables */
        :root {
            --bg-dark: #1a1a2e;
            --bg-dark-light: #2c2c44;
            --text-light: #e0e0e0;
            --accent-blue: #00bcd4; /* A vibrant teal/cyan */
            --accent-blue-dark: #008ba3;
            --gradient-start: #1a1a2e;
            --gradient-end: #0f0f1a;
            --card-bg: #22223b;
            --border-color: #3e3e5c;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; /* Modern sans-serif stack */
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: rgba(26, 26, 46, 0.95); /* Slightly transparent for depth */
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--shadow-color);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .logo:hover {
            color: var(--accent-blue-dark);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.2s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            background: var(--accent-blue);
            left: 0;
            bottom: -5px;
            transition: width 0.3s ease;
        }

        nav a:hover, nav a:focus {
            color: var(--accent-blue);
            transform: translateY(-2px);
        }
        
        nav a:hover::after, nav a:focus::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1920x1080/1a1a2e/e0e0e0?text=Modern+Tech+Background') no-repeat center center/cover;
            text-align: center;
            padding: 8rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1; /* Allows hero to take available space */
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 188, 212, 0.1) 0%, transparent 70%);
            animation: pulse 10s infinite alternate;
            z-index: 1;
        }

        .hero .container {
            position: relative;
            z-index: 2;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            line-height: 1.2;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.3rem);
            max-width: 700px;
            margin: 0 auto 2.5rem auto;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-blue-dark));
            color: #fff;
            padding: 0.9rem 2.2rem;
            border-radius: 50px; /* Pill shape */
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.6);
        }

        /* General Section Styling */
        main section {
            padding: 5rem 0;
            text-align: center;
        }

        main section:nth-child(even) {
            background-color: var(--bg-dark-light);
        }

        h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 2.5rem;
            color: var(--accent-blue);
            position: relative;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
        }

        /* Features Section */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feature-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .feature-card .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: block;
            color: var(--accent-blue);
            animation: bounceIn 1s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .feature-card h3 {
            font-size: clamp(1.4rem, 2.5vw, 1.8rem);
            margin-bottom: 1rem;
            color: var(--accent-blue);
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-light);
            max-width: 300px;
        }

        /* About Section */
        .about-section p {
            max-width: 800px;
            margin: 1rem auto;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        /* Contact Section */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-light);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: #aaa;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.2);
        }

        .contact-form textarea {
            min-height: 140px;
            resize: vertical;
        }

        /* Footer */
        footer {
            background-color: var(--bg-dark);
            color: var(--text-light);
            text-align: center;
            padding: 2.5rem 0;
            margin-top: auto; /* Pushes footer to the bottom */
            border-top: 1px solid var(--border-color);
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.3rem;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .social-links a:hover {
            color: var(--accent-blue);
            transform: translateY(-3px);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 1.2rem;
            }

            nav ul {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .hero {
                padding: 6rem 0;
            }

            .hero h1 {
                font-size: clamp(2rem, 8vw, 3rem);
            }

            .hero p {
                font-size: clamp(0.9rem, 3vw, 1.1rem);
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            main section {
                padding: 4rem 0;
            }

            h2 {
                font-size: clamp(1.8rem, 6vw, 2.5rem);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            .hero {
                padding: 4rem 0;
            }

            .btn {
                padding: 0.8rem 1.8rem;
                font-size: 0.9rem;
            }

            footer .container {
                gap: 1rem;
            }

            .social-links {
                gap: 1rem;
            }

            .social-links a {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
