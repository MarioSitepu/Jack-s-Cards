<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --secondary-bg: #ffffff;
            --text-color: #343a40;
            --accent-gradient-start: #6a11cb; /* A deep purple */
            --accent-gradient-end: #2575fc;   /* A vibrant blue */
            --button-text: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --max-width: 1200px;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
        }

        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--primary-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            margin-bottom: 0.5em;
            font-weight: 700;
        }

        h1 { font-size: clamp(2.5rem, 5vw, 4rem); }
        h2 { font-size: clamp(2rem, 4vw, 3rem); }
        h3 { font-size: clamp(1.5rem, 3vw, 2rem); }

        a {
            color: var(--accent-gradient-end);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-gradient-start);
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: var(--border-radius-md);
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: var(--button-text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-medium);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
        }

        /* Header */
        .header {
            background-color: var(--secondary-bg);
            box-shadow: 0 2px 10px var(--shadow-light);
            padding: var(--spacing-sm) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Roboto', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers that don't support background-clip: text */
        }

        .nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        .nav a {
            font-weight: 600;
            color: var(--text-color);
            position: relative;
            padding-bottom: 5px;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            transition: width 0.3s ease;
        }

        .nav a:hover::after,
        .nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: var(--button-text);
            padding: var(--spacing-lg) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at bottom right, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0.5;
            z-index: 0;
            animation: moveGradient 15s infinite alternate ease-in-out;
        }

        @keyframes moveGradient {
            0% { transform: translate(0%, 0%); }
            100% { transform: translate(-20%, -20%); }
        }

        .hero .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        .hero h1 {
            color: var(--button-text);
            margin-bottom: 0.5em;
            line-height: 1.2;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.3rem);
            margin-bottom: var(--spacing-md);
            opacity: 0.9;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Section Styling */
        .section {
            padding: var(--spacing-lg) 0;
            background-color: var(--secondary-bg);
            margin-bottom: var(--spacing-md);
            box-shadow: 0 4px 20px var(--shadow-light);
            border-radius: var(--border-radius-md);
        }

        .section:nth-of-type(odd) {
            background-color: var(--primary-bg);
            box-shadow: none;
        }

        .section-title {
            text-align: center;
            margin-bottom: var(--spacing-lg);
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            border-radius: 5px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .grid-item {
            background-color: var(--secondary-bg);
            padding: var(--spacing-md);
            border-radius: var(--border-radius-md);
            box-shadow: 0 4px 15px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .grid-item h3 {
            margin-top: 1rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .grid-item p {
            font-size: 0.95rem;
            color: #6c757d;
        }
