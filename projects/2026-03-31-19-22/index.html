<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Global Styles */
        :root {
            --primary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --secondary-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            --text-dark: #333;
            --text-light: #fff;
            --bg-light: #f9f9f9;
            --accent-color: #00f2fe; /* A color from the primary gradient */
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--text-light);
            box-shadow: 0 2px 10px var(--shadow-light);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            cursor: default;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 60            0;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            text-align: center;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            box-shadow: 0 5px 20px var(--shadow-medium);
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .hero p {
            font-size: 1.3em;
            margin-bottom: 40px;
            max-width: 700px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background-color: var(--text-light);
            color: var(--accent-color);
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-light);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
            background-color: #e0f7fa; /* Slightly lighter white */
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: var(--text-light);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); /* Reverse gradient or slightly different */
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.5);
        }

        /* Section Styling */
        .section-padded {
            padding: 80px 0;
            text-align: center;
        }

        .section-padded h2 {
            font-size: 2.8em;
            margin-bottom: 20px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-padded p {
            font-size: 1.1em;
            max-width: 800px;
            margin: 0 auto 50px auto;
        }

        .bg-light {
            background-color: var(--bg-light);
        }

        .bg-gradient-alt {
            background: var(--secondary-gradient);
            color: var(--text-light);
        }

        .text-white h2 {
            -webkit-text-fill-color: var(--text-light);
            background: none;
        }

        .text-white p {
            color: var(--text-light);
            opacity: 0.9;
        }

        /* Grid Layouts */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--text-light);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .card h3 {
            font-size: 1.6em;
            margin-top: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p {
            font-size: 1em;
            margin-bottom: 0;
            max-width: none; /* Override section-padded p */
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .feature-item {
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-10px);
            background-color: rgba(255, 255, 255, 0.25);
        }

        .feature-item .icon-symbol {
            font-size: 3em;
            margin-bottom: 15px;
            color: var(--text-light);
            display: block;
            line-height: 1; /* Adjust line height for icon symbols */
        }

        .feature-item h3 {
            font-size: 1.8em;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-light);
            font-weight: 600;
        }

        .feature-item p {
            font-size: 1em;
            margin-bottom: 0;
            max-width: none;
            color: var(--text-light);
            opacity: 0.8;
        }

        /* Footer */
        footer {
            background-color: var(--text-dark);
            color: var(--text-light);
            padding: 40px 0;
            text-align: center;
            font-size: 0.9em;
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        footer p {
            margin: 0;
        }

        .social-links a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }

            nav ul {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .hero {
                padding: 80px 20px;
                min-height: 50vh;
            }

            .hero h1 {
                font-size: 2.5em;
            }

            .hero p {
                font-size: 1.1em;
                margin-bottom: 30px;
            }

            .section-padded {
                padding: 60px 0;
            }

            .section-padded h2 {
                font-size: 2em;
            }

            .section-padded p {
                margin-bottom: 30px;
            }

            .grid-3, .feature-grid {
                grid-template-columns: 1fr;
            }

            .card, .feature-item {
                margin: 0 auto;
                max-width: 400px;
            }
        }
    </style>
</head>
