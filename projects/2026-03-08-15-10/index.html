<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureVision Project</title>
    <style>
        /* Basic Reset & Global Styles */
        :root {
            --primary-color: #4A00E0; /* Deep Purple */
            --secondary-color: #8E2DE2; /* Lighter Purple */
            --accent-color: #00C6FF;   /* Bright Blue */
            --text-light: #f4f4f4;
            --text-dark: #333;
            --bg-light: #ffffff;
            --bg-dark: #1a1a1a;
            --gradient-bg-1: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-bg-2: linear-gradient(135deg, var(--accent-color) 0%, var(--secondary-color) 100%);
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: var(--accent-color);
        }

        ul {
            list-style: none;
        }

        /* Header & Navigation */
        header {
            background: var(--gradient-bg-1);
            color: var(--text-light);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-dark);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-light);
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }
        nav ul li a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: var(--text-light);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--primary-color);
            box-shadow: 0 8px 20px rgba(74, 0, 224, 0.4);
            transform: translateY(-3px);
        }

        .secondary-btn {
            background: var(--primary-color);
            box-shadow: 0 5px 15px rgba(74, 0, 224, 0.4);
        }

        .secondary-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }


        /* Hero Section */
        .hero-section {
            background: var(--gradient-bg-2);
            color: var(--text-light);
            text-align: center;
            padding: 8rem 2rem;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse-glow 10s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }


        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            max-width: 900px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 700px;
            opacity: 0.9;
        }

        .hero-section p span {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Content Sections */
        .content-section {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .content-section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--primary-color);
            position: relative;
            padding-bottom: 10px;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .content-section .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }

        .card {
            background-color: var(--bg-light);
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: var(--shadow-light);
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            color: var(--secondary-color);
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .card p {
            color: var(--text-dark);
            font-size: 1rem;
        }

        /* Gradient Section (Features) */
        .gradient-section {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: var(--text-light);
            padding: 6rem 2rem;
            text-align: center;
        }

        .gradient-section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: var(--text-light);
            position: relative;
            padding-bottom: 10px;
        }

        .gradient-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }


        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-item {
            background-color: rgba(255, 255, 255, 0.1);
