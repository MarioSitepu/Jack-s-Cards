    <title>Project Nova - Modern Showcase</title>

    <style>
        :root {
            --primary-gradient: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Purple to Blue */
            --secondary-gradient: linear-gradient(to right, #fc676a 0%, #ec008c 100%); /* Red-orange to Pink */
            --text-light: #f0f0f0;
            --text-dark: #333;
            --bg-dark: #1a1a2e; /* Dark blue-purple */
            --bg-dark-alt: #1f1f3a; /* Slightly lighter dark */
            --card-bg: rgba(255, 255, 255, 0.08); /* Slightly transparent white for dark theme cards */
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            --button-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            --border-radius-lg: 15px;
            --border-radius-sm: 8px;
            --highlight-color: #ffcc00; /* Yellow for highlights */
        }

        /* Base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            padding: 20px 0;
            color: var(--text-light);
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
            font-weight: 700;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1em;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--secondary-gradient);
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        nav a:hover {
            color: var(--highlight-color);
        }

        /* Main content */
        main {
            flex: 1; /* Allow main content to grow and push footer down */
        }

        section {
            padding: 80px 0;
            text-align: center;
        }

        h2, h3 {
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 2.8em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h3 {
            font-size: 2.2em;
        }

        p {
            margin-bottom: 15px;
            font-size: 1.1em;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero h2 {
            font-size: 4em;
            margin-bottom: 20px;
            background: none; /* Override gradient for hero H2 */
            -webkit-text-fill-color: var(--text-light);
        }

        .hero p {
            font-size: 1.4em;
            margin-bottom: 40px;
            max-width: 600px;
            opacity: 0.9;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--text-light);
            padding: 15px 30px;
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--button-shadow);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn.secondary-btn {
            background: var(--primary-gradient);
            margin-top: 20px;
        }

        /* Feature Section */
        .features-section {
            background-color: var(--bg-dark);
            padding: 100px 0;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, background 0.3s ease;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            background: var(--primary-gradient);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .feature-card .icon {
            font-size: 3em;
            margin-bottom: 20px;
            display: block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            color: var(--text-light);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .feature-card h4 {
            font-size: 1.6em;
            margin-bottom: 15px;
            color: var(--text-light);
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .feature-card p {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            margin-left: 0;
            margin-right: 0;
        }

        /* About Section */
        .about-section {
            background-color: var(--bg-dark-alt);
            padding: 100px 0;
        }

        .about-section p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .about-section .highlight-date {
            font-weight: bold;
            background: linear-gradient(to right, var(--highlight-color), #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Footer */
        footer {
            background-color: #111122;
            color: var(--text-light);
            text-align: center;
            padding: 30px 0;
            font-size: 0.9em;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .container {
                padding: 0 15px;
            }

            h2 {
                font-size: 3em;
            }

            .hero h2 {
                font-size: 3.5em;
            }
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            header h1 {
                margin-bottom: 15px;

                display: block;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            nav a::after {
                display: none; /* Hide underline effect for mobile nav items */
