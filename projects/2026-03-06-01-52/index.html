    <title>Project Nova - Modern Dashboard</title>

    <style>
        /* General Styles */
        :root {
            --primary-gradient: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(45deg, #00c6ff 0%, #0072ff 100%);
            --bg-color: #1a1a2e;
            --card-bg: #2a2a4a;
            --text-color: #e0e0e0;
            --heading-color: #ffffff;
            --accent-color: #00bcd4;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1, h2, h3 {
            color: var(--heading-color);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #008ba3; /* Slightly darker accent */
        }

        /* Header */
        header {
            background-color: var(--card-bg);
            padding: 1rem 0;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-color);
            font-weight: 600;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--heading-color);
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            min-height: 60vh;
            border-bottom-left-radius: 50% 20px;
            border-bottom-right-radius: 50% 20px;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: moveShape 10s infinite alternate;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: moveShape 12s infinite alternate-reverse;
        }
        @keyframes moveShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }


        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ffffff 0%, #c1f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 800px;
            margin: 0 auto 2rem auto;
            color: #d0e0ff;
        }

        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--heading-color);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 114, 255, 0.6);
        }

        .project-date {
            font-size: 1.1rem;
            margin-top: 1.5rem;
            font-weight: 600;
            color: #b0d0ff;
        }

        /* Main Sections */
        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: var(--card-bg);
            border-radius: 15px;
            margin: 40px 0;
            box-shadow: 0 8px 30px var(--shadow-color);
        }

        section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .features-grid, .cta-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .feature-item {
            background-color: var(--bg-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 20px var(--shadow-color);
            flex: 1 1 calc(33% - 40px); /* 3 items per row on large screens */
            max-width: 350px;
            min-width: 280px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(0, 114, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--secondary-gradient);
            transform: translateX(-100%);
            transition: transform 0.4s ease-out;
        }

        .feature-item:hover::before {
            transform: translateX(0);
        }

        .feature-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px var(--shadow-color);
        }

        .feature-item h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .feature-item p {
            color: var(--text-color);
        }

        /* Call to Action */
        .cta {
            background: var(--primary-gradient);
            color: var(--heading-color);
            padding: 100px 0;
            margin-top: 3rem;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .cta h2 {
            color: var(--heading-color);
            background: none; /* Override gradient for h2 in CTA */
            -webkit-text-fill-color: unset;
        }

        .cta p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 2.5rem auto;
            color: #d0e0ff;
        }

        /* Footer */
        footer {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
            box-shadow: 0 -4px 15px var(--shadow-color);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

            }

            nav ul li {
                margin: 0.5rem 1rem;
            }
