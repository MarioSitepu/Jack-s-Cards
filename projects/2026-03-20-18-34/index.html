<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-bg: linear-gradient(135deg, #e0f2f7 0%, #c1e4f3 100%);
            --secondary-bg: #ffffff;
            --text-color: #333;
            --heading-color: #2c3e50;
            --accent-color-start: #6dd5ed; /* Light Blue */
            --accent-color-end: #2193b0;   /* Darker Blue */
            --button-gradient: linear-gradient(45deg, var(--accent-color-start), var(--accent-color-end));
            --border-radius: 12px;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
            --max-width: 1200px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --font-family: 'Poppins', sans-serif;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            color: var(--text-color);
            background: var(--primary-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-bottom: var(--spacing-sm);
            font-weight: 700;
        }

        a {
            color: var(--accent-color-end);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-color-start);
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.9);
            padding: var(--spacing-md) 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--heading-color);
            background: var(--button-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        .header nav a {
            font-weight: 600;
            color: var(--text-color);
            position: relative;
        }

        .header nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--accent-color-end);
            left: 0;
            bottom: -5px;
            transition: width 0.3s ease;
        }

        .header nav a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: var(--spacing-lg) 0;
        }

        section {
            padding: var(--spacing-lg) 0;
        }

        .hero-section {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.9)), url('https://source.unsplash.com/random/1200x600?abstract,technology') no-repeat center center/cover;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            max-width: var(--max-width);
            margin-left: auto;
            margin-right: auto;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(109, 213, 237, 0.1), rgba(33, 147, 176, 0.1));
            z-index: 1;
        }

        .hero-section .container {
            position: relative;
            z-index: 2;
        }

        .hero-section h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
            background: var(--button-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            max-width: 800px;
            margin: 0 auto var(--spacing-md);
        }

        .btn {
            display: inline-block;
            background: var(--button-gradient);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
        }

        .feature-card {
            background: var(--secondary-bg);
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--button-gradient);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease-out;
        }

        .feature-card:hover::before {
            transform: scaleX(1);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
            background: var(--button-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-card p {
            font-size: 0.95rem;
        }

        .about-section {
            background: var(--secondary-bg);
            padding: var(--spacing-lg) 0;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-top: var(--spacing-lg);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
            align-items: center;
        }

        .about-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        /* Footer */
        .footer {
            background: var(--heading-color);
            color: #f4f4f4;
            padding: var(--spacing-md) 0;
            text-align: center;
            margin-top: var(--spacing-lg);
        }

        .footer p {
            margin-bottom: 0.5rem;
        }

        .footer .social-links a {
            color: #f4f4f4;
            margin: 0 0.8rem;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .footer .social-links a:hover {
            color: var(--accent-color-start);
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            .about-content {
                grid-template-columns: 1fr 1fr;
            }
            .about-content img {
                order: 2; /* Image on right for larger screens */
            }
            .about-text {
                order: 1;
            }
        }

        @media (max-width: 767px) {
            .header .container {
                flex-direction: column;
                gap: var(--spacing-sm);
            }

            .header nav ul {
                flex-direction: column;
                gap: 0.
