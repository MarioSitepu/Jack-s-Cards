        * {

        nav ul li a:hover::after {

        .hero::before {

        }

            color: var(--bg-light);

            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
            border: none;
            cursor: pointer;

        .btn:hover {

            -webkit-text-fill-color: transparent;
        }
