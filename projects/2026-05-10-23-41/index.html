<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureVision Project</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* General Body & Reset */
        :root {
            --primary-gradient: linear-gradient(135deg, #2a2a72 0%, #009ffd 100%); /* Dark Blue to Sky Blue */
            --secondary-gradient: linear-gradient(45deg, #8e2de2 0%, #4a00e0 100%); /* Purple to Darker Purple */
            --accent-color: #00e0ff; /* Bright Cyan */
            --text-color-light: #f0f0f0;
            --text-color-dark: #333;
            --card-bg: rgba(255, 255, 255, 0.08); /* Slightly transparent white for cards */
            --card-border: rgba(255, 255, 255, 0.15);
            --hover-effect: translateY(-5px);
            --transition-speed: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color-light);
            background: var(--primary-gradient);
            line-height: 1.6;
            overflow-x: hidden; /* Prevent horizontal scroll on small devices */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.3); /* Slightly transparent black */
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-color-light);
            text-decoration: none;
            background: linear-gradient(45deg, #00e0ff, #8e2de2); /* Gradient for logo */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-color-light);
            text-decoration: none;
            font-weight: 400;
            position: relative;
            transition: color var(--transition-speed);
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            left: 0;
            bottom: -5px;
            transition: width var(--transition-speed);
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Sections */
        section {
            padding: 80px 0;
            text-align: center;
        }

        h2, h3 {
            font-size: 2.8em;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(45deg, #00e0ff, #8e2de2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h3 {
            font-size: 2.2em;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Hero Section */
        .hero-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('https://source.unsplash.com/random/1920x1080/?technology,abstract') no-repeat center center/cover;
            position: relative;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* Dark overlay */
            z-index: 1;
        }

        .hero-section .container {
            position: relative;
            z-index: 2;
        }

        .hero-section h2 {
            font-size: 4em;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }

        .hero-section p {
            font-size: 1.4em;
            margin-bottom: 40px;
            max-width: 900px;
            font-weight: 300;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-speed);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .primary-btn {
            background: var(--accent-color);
            color: var(--text-color-dark);
            border: none;
        }

        .primary-btn:hover {
            background: linear-gradient(45deg, #00e0ff, #00c0ff); /* Slightly different gradient on hover */
            transform: var(--hover-effect);
            box-shadow: 0 8px 20px rgba(0, 224, 255, 0.4);
        }

        .secondary-btn {
            background: var(--secondary-gradient);
            color: var(--text-color-light);
            border: 2px solid var(--accent-color);
        }

        .secondary-btn:hover {
            transform: var(--hover-effect);
            box-shadow: 0 8px 20px rgba(142, 45, 226, 0.4);
        }

        /* Features Section */
        .features-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 100px 0;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .feature-card:hover {
            transform: var(--hover-effect);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-color);
        }

        .feature-card .icon {
            font-size: 3em;
            color: var(--accent-color);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00e0ff, #8e2de2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-card h4 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: var(--text-color-light);
        }

        .feature-card p {
            font-size: 1em;
            margin-bottom: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        /* About Section */
        .about-section {
            background: transparent; /* Blends with body gradient */
            padding: 100px 0;
        }
</body>
</html>
