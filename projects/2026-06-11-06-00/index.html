<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER // Next-Gen Decentralized Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060814;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #0000ff 100%);
            --accent-gradient: linear-gradient(135deg, #8ec5fc 0%, #e0c3fc 100%);
            --glow-gradient: linear-gradient(135deg, #00f2fe, #4facfe, #8a2be2);
            --glow-color: rgba(0, 242, 254, 0.15);
            --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow-x: hidden;
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Utility Classes */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #9b51e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Header / Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            background: rgba(6, 8, 20, 0.7);
            transition: var(--transition-smooth);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary-gradient);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
        }

        nav ul {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        nav a:hover {
            color: var(--text-primary);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .nav-cta {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .nav-cta:hover {
            background: var(--text-primary);
            color: var(--bg-dark);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* Hero Section */
        .hero {
            padding: 12rem 0 8rem 0;
            position: relative;
            text-align: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: #00f2fe;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.05);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero p {
            font-size: clamp(1.1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 650px;
            margin: 0 auto 3rem auto;
            font-weight: 400;
        }

        .hero-ctas {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 4rem;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #000;
            box-shadow: 0 4px 30px rgba(0, 242, 254, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 40px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border-color-hover);
            transform: translateY(-2px);
        }

        /* Info Banner / Date Highlight */
        .launch-banner {
            background: linear-gradient(135deg, rgba(13, 18, 41, 0.8) 0%, rgba(26, 17, 47, 0.8) 100%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .launch-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.15), transparent 70%);
            pointer-events: none;
        }

        .banner-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
            text-align: left;
        }

        .banner-left h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .banner-left p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .banner-right {
            text-align: right;
        }

        .date-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(138, 43, 226, 0.1) 100%);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 1rem 2rem;
            border-radius: 16px;
            text-align: center;
        }

        .date-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .date-value {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00f2fe, #e0c3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Features Section */
        .features {
            padding: 8rem 0;
            position: relative;
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            border-color: var(--border-color-hover);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.05);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.05), transparent 50%);
            opacity: 0;
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            color: #00f2fe;
            transition: var(--transition-smooth);
        }

        .card:hover .card-icon {
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.3);
            color: #00f2fe;
            transform: scale(1.05);
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Dynamic Showcase Section */
        .showcase {
            padding: 4rem 0 8rem 0;
        }

        .showcase-wrapper {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 4rem;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .showcase-content h2 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .showcase-content p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .stat-item {
            border-left: 2px solid rgba(0, 242, 254, 0.3);
            padding-left: 1.5rem;
        }

        .stat-num {
            font-size: 2.25rem;
            font-weight: 800;
            display: block;
            margin-bottom: 0.25rem;
            letter-spacing: -0.03em;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .showcase-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .visual-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--glow-gradient);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        .visual-box {
            background: rgba(10, 14, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            position: relative;
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .visual-header {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        .dot:nth-child(1) { background: #ff5f56; }
        .dot:nth-child(2) { background: #ffbd2e; }
        .dot:nth-child(3) { background: #27c93f; }

        .visual-content {
            font-family: monospace;
            color: #00f2fe;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .visual-line {
            display: flex;
            gap: 1rem;
        }

        .line-num {
            color: rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        /* Call To Action */
        .cta-section {
            padding: 6rem 0 10rem 0;
            text-align: center;
        }

        .cta-card {
            background: radial-gradient(ellipse at top, rgba(0, 242, 254, 0.1) 0%, rgba(6, 8, 20, 0) 70%);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 5rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .cta-card h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .cta-card p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 550px;
            margin: 0 auto 3rem auto;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            background: rgba(3, 5, 12, 0.9);
            padding: 5rem 0 3rem 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-brand h4 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-brand p {
            max-width: 280px;
            line-height: 1.6;
        }

        .footer-links h5 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 2rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .social-links a:hover {
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .showcase-wrapper {
                grid-template-columns: 1fr;
                gap: 3rem;
                padding: 3rem;
            }
        }

        @media (max-width: 768px) {
            nav {
                display: none; /* Simple dynamic responsive hiding for minimalism */
            }

            .nav-cta {
                display: none;
            }

            .banner-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
                text-align: center;
            }

            .banner-right {
                text-align: center;
            }

            .footer-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3rem;
            }

            .hero h1 {
                font-size: 3rem;
            }

            .cta-card h2 {
                font-size: 2.25rem;
            }
        }

        @media (max-width: 480px) {
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem;
            }

            .footer-bottom {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }

            .hero-ctas {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
