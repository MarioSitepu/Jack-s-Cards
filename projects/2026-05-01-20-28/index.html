        :root {
            --primary-color: #6A11CB; /* Deep Purple */
            --secondary-color: #2575FC; /* Vibrant Blue */

            --gradient-main: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-hero: linear-gradient(45deg, #8E2DE2 0%, #4A00E0 100%); /* More dramatic purple */
            --gradient-button: linear-gradient(90deg, #FF6B6B 0%, #FFB86B 100%); /* Warm button gradient */
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-medium: 0 8px 30px rgba(0, 0, 0, 0.15);
            --border-radius: 12px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;

        body {

            overflow-x: hidden; /* Prevent horizontal scroll */
        }

            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-color);
        }

        h1, h2, h3 {
            margin-bottom: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        p {
            margin-bottom: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            background: var(--bg-light);
            padding: 1rem 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        nav ul {
            list-style: none;
            display: flex;
        }

            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-dark);
            font-weight: 600;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--secondary-color);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--gradient-hero);
            color: var(--text-light);
            padding: 6rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: var(--gradient-button);
            color: var(--text-light);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 107, 107, 0.6);
        }

        /* Main Content Sections */
        main {
            flex-grow: 1;
        }

        section {
            padding: 4rem 0;
            margin-bottom: 2rem;
        }

        section:nth-of-type(even) {
            background-color: #f0f2f5; /* Light subtle background for alternating sections */
        }

            background-clip: text;
