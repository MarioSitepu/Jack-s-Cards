            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #f8f8ff; /* Ghost White */
            --accent-color: #00bcd4; /* Cyan */
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

        html {
            scroll-behavior: smooth;
        }

        body {

            line-height: 1.6;
            color: var(--text-dark);
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);

            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {

        }

            list-style: none;

        }

        nav ul li {
            margin-left: 30px;

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.05rem;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover {

        nav ul li a:hover::after {
            width: 100%;

        /* Hero Section */
        .hero-section {

            text-align: center;

            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1; /* Allows it to take available space */
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-section p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--text-light);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px var(--shadow-medium);
            border: none;
            cursor: pointer;
            background-size: 200% auto; /* For gradient animation */
        }

        .btn:hover {
            background-position: right center; /* Shift gradient on hover */
            box-shadow: 0 12px 25px var(--shadow-medium);
            transform: translateY(-3px);
        }

        .secondary-btn {
            background: var(--primary-gradient);
        }

        .secondary-btn:hover {
            background-position: right center;
        }

        /* Content Sections */
        .content-section {
            padding: 80px 20px;
            text-align: center;
            background-color: var(--text-light); /* Default light background */
        }

        .content-section.light-bg {
            background-color: var(--bg-light);
        }

        .content-section h2 {
            font-size: 2.5rem;
            margin-bottom: 60px;
            font-weight: 700;
            color: #4a4a4a;
            position: relative;
            display: inline-block;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-medium);
        }

        .feature-item h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #6a11cb;
        }

        .feature-item p {

            color: #555;

            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-medium);
        }

        .card h3 {
            font-size: 1.7rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
