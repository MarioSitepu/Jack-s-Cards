        :root {

            --card-background: #ffffff;

        }

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;

            background-color: var(--background-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .container {

            padding: calc(var(--spacing-unit) * 2);
        }

        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }

        h1, h2, h3 {

            font-weight: 700;
            line-height: 1.2;

            margin-bottom: var(--spacing-unit);
        }

        /* Header */
        header {
            background-color: var(--card-background);
            box-shadow: 0 2px 10px var(--shadow);
            padding: var(--spacing-unit) 0;
            position: sticky;
            top: 0;
            z-index: 1000;

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background-image: linear-gradient(45deg, var(--primary-gradient-start), var(--primary-gradient-end));

            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        nav ul {
            display: flex;
            gap: calc(var(--spacing-unit) * 1.5);
        }

        nav a {
            font-weight: 600;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';

            left: 0;
            bottom: -5px;
            width: 0;
            height: 3px;
            background-image: linear-gradient(90deg, var(--primary-gradient-start), var(--primary-gradient-end));

            transition: width 0.3s ease;

        }

        .hero p {

            margin: 0 auto calc(var(--spacing-unit) * 2);
            font-weight: 300;
        }
        .hero .project-date {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: calc(var(--spacing-unit) * 2);
            opacity: 0.8;
        }

        section {

        .section-title {

            font-size: 2.8rem;
            background-image: linear-gradient(45deg, var(--secondary-gradient-start), var(--secondary-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: calc(var(--spacing-unit) * 2);
            padding-top: calc(var(--spacing-unit) * 2);
        }

        .feature-card {
            background-color: var(--card-background);
            padding: calc(var(--spacing-unit) * 2);
            border-radius: var(--border-radius);
            box-shadow: 0 5px 20px var(--shadow);
            text-align: center;

            flex-direction: column;
            align-items: center;

        .feature-card:hover {

        }

        .feature-icon {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        .feature-card h3 {
            margin-top: 0;
            margin-bottom: calc(var(--spacing-unit) * 0.5);
            font-size: 1.5rem;
        }

        .feature-card p {
            font-size: 0.95rem;
            color: #555;
        }

        /* About Section */
        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: calc(var(--spacing-unit) * 4);
        }

        .about-text {
            flex: 2;
            min-width: 300px;
        }

        .about-image {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px var(--shadow);
        }

        /* Call to Action */
        .cta-section {
            background-image: linear-gradient(45deg, #a18cd1, #fbc2eb); /* A softer gradient for CTA */
            color: var(--dark-text);
            text-align: center;
            padding: calc(var(--spacing-unit) * 5) 0;
        }

        .cta-section h2 {
            color: var(--card-background); /* White text for contrast */
            margin-bottom: calc(var(--spacing-unit) * 1.5);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Footer */
        footer {
            background-color: var(--dark-text);
            color: var(--light-text);
            padding: calc(var(--spacing-unit) * 2) 0;
            text-align: center;
            margin-top: auto; /* Pushes footer to bottom */
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
