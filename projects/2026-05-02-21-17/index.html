<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Horizon: Modern Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #6a11cb; /* Deep Purple */
            --secondary-color: #2575fc; /* Bright Blue */
            --gradient-bg-1: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            --gradient-bg-2: linear-gradient(to right, #8e2de2 0%, #4a00e0 100%);
            --text-color-light: #f0f0f0;
            --text-color-dark: #333;
            --card-bg: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-heavy: rgba(0, 0, 0, 0.2);
            --border-radius: 10px;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 3rem;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color-dark);
            background: var(--gradient-bg-1); /* Main body gradient */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header */
        header {
            background: var(--gradient-bg-2);
            color: var(--text-color-light);
            padding: var(--spacing-sm) var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow-heavy);
            z-index: 1000;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        nav a {
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg) var(--spacing-md);
        }

        section {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 4px 20px var(--shadow-light);
        }

        /* Hero Section */
        .hero {
            background: var(--gradient-bg-1); /* Override section background */
            color: var(--text-color-light);
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-md);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            margin-top: 0; /* Remove top margin from section */
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(50px);
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(60px);
        }

        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px var(--shadow-heavy);
            position: relative;
            z-index: 1;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .hero button {
            background: var(--card-bg); /* White button */
            color: var(--primary-color);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-heavy);
            position: relative;
            z-index: 1;
        }

        .hero button:hover {
            background: var(--text-color-light);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 20px var(--shadow-heavy);
        }

        /* Features Section */
        .features h3, .about h3 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: var(--spacing-lg);
            color: var(--primary-color);
            font-weight: 600;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
        }

        .feature-card {
            background: var(--card-bg);
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            box-shadow: 0 2px 10px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
        }

        .feature-card .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--gradient-bg-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; /* Required for background-clip to work on text */
        }

        .feature-card h4 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .feature-card p {
            font-size: 1rem;
            color: #666;
        }

        /* About Section */
        .about {
            text-align: left;
        }

        .about p {
            font-size: 1.1rem;
            margin-bottom: var(--spacing-sm);
            color: #555;
        }

        .about p strong {
            color: var(--primary-color);
            font-weight: 700;
        }

        /* Footer */
        footer {
            background: var(--text-color-dark);
            color: var(--text-color-light);
            text-align: center;
            padding: 2rem var(--spacing-md);
            margin-top: var(--spacing-lg);
            box-shadow: 0 -2px 10px var(--shadow-heavy);
        }

        footer p {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .hero h2 {
                font-size: 3rem;
            }
            .hero p {
                font-size: 1.3rem;
            }
            .features h3, .about h3 {
                font-size: 2rem;
            }
            main {
                padding: var(--spacing-lg) var(--spacing-sm);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding: var(--spacing-sm);
            }
            header h1 {
                margin-bottom: var(--spacing-sm);
            }
            nav ul {
                flex-direction: column;
                gap: 0.5rem;
                width: 100%;
            }
            nav a {
                display: block;
                text-align: center;
                width: 100%;
            }
            .hero {
                min-height: 300px;
                padding: var(--spacing-lg) var(--spacing-sm);
            }
            .hero h2 {
                font-size: 2.5rem;
            }
            .hero p {
                font-size: 1.1rem;
            }
            .hero button {
                padding: 0.8rem 2rem;
                font-size: 1.1rem;
            }
            main {
                padding: var(--spacing-md) var(--spacing-sm);
            }
            section {
                padding: var(--spacing-md);
                margin-bottom: var(--spacing-md);
            }
            .feature-grid {
                grid-template-columns: 1fr; /* Single column for features */
            }
            .features h3, .about h3 {
                font-size: 1.8rem;
                margin-bottom: var(--spacing-md);
            }
            .feature-card .icon {
                font-size: 2.5rem;
            }
            .feature-card h4 {
                font-size: 1.3rem;
            }
            .about p {
                font-size: 1rem;
            }
            footer {
                padding: var(--spacing-md) var(--spacing-sm);
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }
            .hero h2 {
                font-size: 2rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .hero button {
                padding: 0.7rem 1.8rem;
                font-size: 1rem;
            }
            .features h3, .about h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Project Horizon</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#about">
</body>
</html>
