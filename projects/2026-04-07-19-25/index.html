<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient-start: #2a003f; /* Dark Violet */
            --primary-gradient-end: #000000; /* Black */
            --accent-color: #00e676; /* Bright Green */
            --text-light: #f0f0f0;
            --text-dark: #333;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.15);
            --button-gradient-start: #00c853; /* Green */
            --button-gradient-end: #00e676; /* Bright Green */
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 400;
            font-size: 1.1rem;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
            text-shadow: 0 0 8px rgba(0, 230, 118, 0.7);
        }

        /* Main Sections */
        main {
            flex: 1;
        }

        section {
            padding: 80px 0;
            text-align: center;
            position: relative;
        }

        section:nth-of-type(even) {
            background: rgba(0, 0, 0, 0.1);
        }

        h1, h2, h3 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 230, 118, 0.6);
        }

        h2 {
            font-size: 2.5rem;
            color: var(--text-light);
        }

        h3 {
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--button-gradient-start), var(--button-gradient-end));
            color: var(--text-dark);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px var(--shadow-color);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-color);
        }

        /* Hero Section */
        #hero {
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0, 230, 118, 0.05) 0%, transparent 70%);
        }

        #hero p {
            font-size: 1.3rem;
            margin-top: 20px;
            margin-bottom: 40px;
            max-width: 700px;
        }

        /* Features Section */
        #features .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .feature-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            text-align: left;
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-color);
        }

        .feature-card h3 {
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        .feature-card p {
            font-size: 1rem;
            margin-bottom: 0;
            max-width: none;
        }

        .icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: block;
        }

        /* About Section */
        #about .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
            text-align: left;
        }

        #about p {
            text-align: left;
            max-width: none;
        }

        /* Contact Section */
        #contact .contact-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 1px solid var(--border-color);
            text-align: left;
        }

        #contact .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        #contact .contact-form input[type="text"],
        #contact .contact-form input[type="email"],
        #contact .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        #contact .contact-form input[type="text"]:focus,
        #contact .contact-form input[type="email"]:focus,
        #contact .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        #contact .contact-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        footer p {
            margin-bottom: 10px;
            max-width: none;
        }

        footer .date-info {
            font-weight: 600;
            color: var(--accent-color);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo {
                margin-bottom: 15px;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
                text-align: center;
            }

            .nav-links li {
                margin: 10px 0;
            }

            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }

            section {
                padding: 60px 0;
            }

            #hero {
                padding: 80px 0;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }

            #features .feature-grid {
