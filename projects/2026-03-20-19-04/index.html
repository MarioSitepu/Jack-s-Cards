<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Digital Solutions</title>
    <style>
        /* General Reset & Variables */
        :root {
            --primary-color: #4A90E2; /* Vibrant Blue */
            --secondary-color: #50E3C2; /* Teal/Mint */
            --accent-color: #F5A623; /* Orange for highlights */
            --dark-text: #333333;
            --light-text: #f4f4f4;
            --background-light: #ffffff;
            --background-dark: #f0f2f5;
            --gradient-hero: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-section: linear-gradient(to bottom, var(--background-light) 0%, var(--background-dark) 100%);
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--background-light);
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Typography */
        h1, h2, h3, h4 {
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--dark-text);
        }

        h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
        h2 { font-size: clamp(1.8rem, 4vw, 3rem); }
        h3 { font-size: clamp(1.5rem, 3.5vw, 2.5rem); }
        h4 { font-size: clamp(1.2rem, 3vw, 2rem); }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--gradient-hero);
            color: var(--light-text);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-dark);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }

        /* Header */
        header {
            background-color: var(--background-light);
            padding: 15px 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* For mobile */
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: var(--primary-color);
        }

        header nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        header nav a {
            color: var(--dark-text);
            font-weight: 500;
            padding: 5px 0;
            position: relative;
        }

        header nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        header nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero-section {
            background: var(--gradient-hero);
            color: var(--light-text);
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            min-height: 70vh;
        }

        .hero-section h2 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 20px;
            color: var(--light-text);
        }

        .hero-section p {
            font-size: clamp(1rem, 2vw, 1.3rem);
            max-width: 800px;
            margin: 0 auto 30px auto;
            opacity: 0.9;
        }

        /* General Section Styling */
        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: var(--background-dark);
        }

        section h3 {
            margin-bottom: 40px;
            color: var(--primary-color);
        }

        /* Features Section */
        .features-section {
            background: var(--gradient-section); /* Subtle gradient for this section */
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-item {
            background-color: var(--background-light);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-dark);
        }

        .feature-item .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .feature-item h4 {
            color: var(--dark-text);
            margin-bottom: 10px;
        }

        /* About Section */
        .about-section {
            padding-top: 100px;
            padding-bottom: 100px;
        }

        .about-section p {
            max-width: 800px;
            margin: 0 auto 1.5rem auto;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .about-section strong {
            color: var(--primary-color);
            font-weight: 700;
        }

        /* Services Section */
        .services-section {
            background: var(--gradient-section);
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .service-item {
            background-color: var(--background-light);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow-light);
            text-align: left;
            border-left: 5px solid var(--primary-color);
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .service-item:hover {
            border-left-color: var(--secondary-color);
            transform: translateY(-3px);
        }

        .service-item h4 {
            margin-top: 0;
            color: var(--dark-text);
        }

        /* Contact Section */
        .contact-section {
            background-color: var(--background-dark);
        }

        .contact-form {
            max-width: 600px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input[type="text"],
        .contact-form input[type="email"],
        .contact-form textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .contact-form textarea {
            resize: vertical;
        }

        /* Footer */
        footer {
            background-color: var(--dark-text);
            color: var(--light-text);
            padding: 40px 0;
            text-align: center;
            font-size: 0.9rem;
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        footer p {
            margin: 0;
        }

        .social-links a {
            color: var(--light-text);
            margin: 0 10px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--primary-color);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }

            header nav ul {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            header nav a::after {
                left: 50%;
                transform: translateX(-50%);
            }

            .hero-section {
                padding: 80px 0;
                min-height: 60vh;
            }

            section {
                padding: 60px 0;
            }

            .feature-grid, .service-grid {
                grid-template-columns: 1fr; /* Stack columns on smaller screens */
            }

            .feature-item, .service-item {
                text-align: center;
            }

            .feature-item .icon {
                margin: 0 auto 15px auto;
            }

            footer .container {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            .hero-section h2 {
                font-size: 2.5rem;
            }

            .btn {
                padding: 10px 20px;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

        <div class="container">
            <h1>Project Nova</h1>
            <nav>
                <ul>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
