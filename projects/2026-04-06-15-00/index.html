<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* General Body & Container Styling */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6; /* Light background */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styling */
        header {
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Purple to Blue Gradient */
            color: #fff;
            padding: 1rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows items to wrap on smaller screens */
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        header nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        header nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: #fff;
            transition: width 0.3s ease;
        }

        header nav a:hover::after {
            width: 100%;
        }

        header nav a:hover {
            color: #f0f0f0;
        }

        /* Hero Section Styling */
        .hero {
            background: linear-gradient(135deg, #e0f2f7 0%, #c8e6f0 100%); /* Light subtle gradient */
            padding: 100px 0;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
        }

        .hero h2 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 800;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2em;
            max-width: 700px;
            margin: 0 auto 30px auto;
            color: #555;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* Features Section Styling */
        .features {
            padding: 60px 0;
        }

        .features h3 {
            text-align: center;
            font-size: 2.8em;
            color: #2c3e50;
            margin-bottom: 50px;
            font-weight: 700;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .feature-card .icon { /* Placeholder for icons */
