<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureForge Innovations Project 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        :root {
            --primary-gradient-start: #6a11cb; /* Purple */
            --primary-gradient-end: #2575fc;   /* Blue */
            --accent-color: #FFC107;           /* Amber */
            --dark-text: #2c3e50;              /* Dark blue-grey */
            --light-text: #f4f4f4;             /* Off-white */
            --light-bg-1: #e0f2f7;             /* Very light blue */
            --light-bg-2: #c8e6f0;             /* Slightly darker light blue */
            --card-bg-start: #fdfefe;          /* Near white */
            --card-bg-end: #eff4f6;            /* Very light grey-blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background: linear-gradient(135deg, var(--light-bg-1) 0%, var(--light-bg-2) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            color: var(--light-text);
            padding: 1.5rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light-text);
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav a {
            color: var(--light-text);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
            padding-bottom: 0.3rem;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .nav a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f7ff 100%); /* Lighter gradient for hero */
            padding: 6rem 0;
            text-align: center;
            display: flex;
</body>
</html>
