<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureSphere Innovations - Modern Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset & Base Styles */
        :root {
            --primary-dark: #2c3e50;
            --primary-light: #34495e;
            --accent-blue: #2193b0;
            --accent-cyan: #6dd5ed;
            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #f8f9fa;
            --gradient-header-footer: linear-gradient(to right, var(--primary-dark), var(--primary-light));
            --gradient-hero: linear-gradient(to right, var(--accent-cyan), var(--accent-blue));
            --shadow-light: 0 4px 8px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            scroll-behavior: smooth;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--gradient-header-footer);
            color: var(--text-light);
            padding: 1rem 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            background: -webkit-linear-gradient(left, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; /* Standard property */
            color: transparent; /* Fallback for non-webkit browsers */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin-top: 5px; /* Adjust for better vertical alignment on smaller screens */
        }

        nav a {
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-cyan);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: var(--accent-cyan);
        }

        /* Hero Section */
        .hero {
            background: var(--gradient-hero);
            color: var(--text-light);
            padding: 6rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero h2 {
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .hero .project-date {
            font-size: 1.5rem;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
</body>
</html>
