<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Zenith - Modern Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General styles */
        :root {
            --primary-color: #4A00E0; /* Deep Purple */
            --secondary-color: #8E2DE2; /* Brighter Purple */
            --text-dark: #333;
            --text-light: #fff;
            --bg-light: #f4f7f6; /* Off-white background */
            --gradient-bg: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.2);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-dark);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .menu-toggle {
            display: none; /* Hidden on desktop */
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Hero Section */
        .hero-section {
            background: var(--gradient-bg);
            color: var(--text-light);
            text-align: center;
            padding: 8rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .hero-section .project-date {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
        }

        .primary-btn {
            background-color: var(--text-light);
            color: var(--primary-color);
            box-shadow: var(--shadow-light);
        }

        .primary-btn:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: var(--shadow-dark);
        }

        /* General Section Styling */
        section {
            padding: 6rem 0;
            text-align: center;
        }

        section h2 {
            font-size: 2.8rem;
            margin-bottom: 4rem;
            color: var(--primary-color);
            position: relative;
            display: inline-block;
        }

        section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--gradient-bg);
            border-radius: 2px;
        }

        /* Features Section */
        .features-section {
            background-color: var(--bg-light);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--text-light);
            padding: 2.5rem;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-dark);
        }

        .feature-card h3 {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

        /* Services Section */
        .services-section {
            background: linear-gradient(to bottom, #e0e5eb, var(--bg-light));
            padding-bottom: 8rem;
        }

        .service-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
        }

        .service-item {
            background-color: var(--text-light);
            padding: 2.5rem;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-light);
            flex: 1 1 300px;
            max-width: 350px;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-item:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-dark);
        }

        .service-item h3 {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .service-item p {
            font-size: 1rem;
            color: #555;
        }

        /* Contact Section */
        .contact-section {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding-bottom: 8rem;
        }

        .contact-section h2 {
            color: var(--text-light);
        }

        .contact-section h2::after {
            background: var(--text-light);
        }

        .contact-section p {
            font-size: 1.1rem;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-form input[type="email"],
        .contact-form textarea {
            padding: 1.2rem 1.5rem;
            border:
