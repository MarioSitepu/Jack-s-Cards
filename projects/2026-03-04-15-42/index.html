<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-color: #e94560;
            --text-light: #e0e0e0;
            --text-dark: #cccccc;
            --gradient-start: #0f0f1d;
            --gradient-end: #1a1a2e;
            --button-gradient-start: #e94560;
            --button-gradient-end: #ff7f50;
            --card-bg: #282c40;
            --card-shadow: rgba(0, 0, 0, 0.3);
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background-color: var(--primary-bg);
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--text-light);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--card-shadow);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--text-light);
            font-weight: 700;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
            padding: 0.5rem 0;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            padding: 8rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero-section h2 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            margin-bottom: 1.5rem;
            line-height: 1.2;
            font-weight: 700;
            color: var(--text-light);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hero-section p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            margin-bottom: 2.5rem;
            color: var(--text-dark);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--button-gradient-start), var(--button-gradient-end));
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }

        /* Content Sections */
        .content-section {
            padding: 6rem 0;
            background-color: var(--primary-bg);
        }

        .content-section:nth-of-type(even) {
            background-color: var(--secondary-bg);
        }

        .content-section h3 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-light);
            position: relative;
            padding-bottom: 0.5rem;
        }
</body>
</html>
