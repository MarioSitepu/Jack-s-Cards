<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureVision Project 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* Root Variables */
        :root {
            --primary-bg: #f8faff; /* Lightest background */
            --secondary-bg: #e0e7ff; /* Slightly darker background for alt sections */
            --accent-blue: #4a90e2; /* Vibrant blue */
            --accent-purple: #8e44ad; /* Complementary purple */
            --dark-text: #2c3e50; /* Dark grey-blue for text */
            --light-text: #ecf0f1; /* Light grey for hero/footer text */
            --border-color: #d1d9e6;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --font-family-sans: 'Inter', sans-serif;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2.5rem;
            --spacing-xl: 4rem;
        }

        /* Global Resets & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-sans);
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--primary-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: var(--accent-blue);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-purple);
        }

        h1, h2, h3 {
            margin-bottom: var(--spacing-md);
            font-weight: 700;
            color: var(--dark-text);
        }

        h1 { font-size: clamp(2.5rem, 6vw, 4rem); }
        h2 { font-size: clamp(2rem, 5vw, 3.2rem); }
        h3 { font-size: clamp(1.5rem, 4vw, 2.2rem); }

        p {
            margin-bottom: var(--spacing-sm);
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: var(--light-text);
            padding: var(--spacing-md) 0;
            position: relative;
            overflow: hidden;
            min-height: 100vh; /* Full viewport height for hero */
            display: flex;
            flex-direction: column;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            opacity: 0.5;
            pointer-events: none;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--light-text);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-lg);
        }

        nav ul li a {
            color: var(--light-text);
            font-weight: 500;
            font-size: 1.1rem;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--light-text);
            bottom: -5px;
            left: 0;
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            max-width: 900px;
            margin: 0 auto;
            z-index: 1; /* Above the pseudo-element */
        }

        .hero h1 {
            color: var(--light-text);
            margin-bottom: var(--spacing-sm);
            text-shadow: 0 4px 10px var(--shadow-medium);
        }

        .hero p {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            margin-bottom: var(--spacing-lg);
            max-width: 600px;
            color: var(--light-text);
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #FF6B6B 0%, #FFD166 100%); /* Warm gradient for button */
            color: #fff;
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(255, 107, 107, 0.6);
            background: linear-gradient(45deg, #FFD166 0%, #FF6B6B 100%);
        }

        /* Main Content Sections */
        .section {
            padding: var(--spacing-xl) var(--spacing-md);
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section h2 {
            margin-bottom: var(--spacing-xl);
            position: relative;
            display: inline-block;
        }

        .section h2::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            bottom: -10px;
            left: 20%;
            border-radius: 2px;
        }

        .lead-text {
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            max-width: 800px;
            margin: 0 auto var(--spacing-xl);
            line-height: 1.8;
        }

        .alt-background {
            background-color: var(--secondary-bg);
            background: radial-gradient(circle at top right, rgba(200, 220, 255, 0.3) 0%, rgba(200, 220, 255, 0) 70%), var(--secondary-bg);
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }

        .feature-card {
            background-color: #fff;
            padding: var(--spacing-lg);
            border-radius: 15px;
</body>
</html>
