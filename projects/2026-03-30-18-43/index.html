            --gradient-3: linear-gradient(to right, #FFC371, #FF5F6D); /* Warm gradient for buttons/accents */
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color-dark);

        }

        h1, h2, h3 {

        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {

            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on small screens */
        }

            margin: 0;
            font-size: 1.8rem;
        }

        header nav ul {
            list-style: none;
            display: flex;
        }

        header nav ul li {
            margin-left: 2rem;
        }

        header nav ul li a {
            color: var(--text-color-light);
            font-weight: 600;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        header nav ul li a:hover::after {
            width: 100%;
        }
        header nav ul li a:hover {
             color: var(--accent-color);
        }
