<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase | 2026</title>

    <style>
        /* Modern CSS with Gradient Styling */

        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --text-color: #e0e0e0;
            --heading-color: #ffffff;
            --accent-color-start: #4a00e0; /* Purple */
            --accent-color-end: #8e2de2; /* Lighter Purple */
            --btn-gradient-start: #00c6ff; /* Sky Blue */
            --btn-gradient-end: #0072ff; /* Darker Blue */
            --shadow-color: rgba(0, 0, 0, 0.3);
            --border-radius: 8px;
            --transition-speed: 0.3s ease;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Typography */
        h1, h2, h3 {
            color: var(--heading-color);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.1;
        }

        h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, var(--btn-gradient-start), var(--btn-gradient-end));
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        h3 {
            font-size: 1.75rem;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--btn-gradient-start);
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        a:hover {
            color: var(--btn-gradient-end);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--btn-gradient-start), var(--btn-gradient-end));
            color: var(--heading-color);
            padding: 1rem 2rem;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 8px 15px var(--shadow-color);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px var(--shadow-color);
        }

        .primary-btn {
            background: linear-gradient(45deg, var(--accent-color-start), var(--accent-color-end));
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--shadow-color);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--heading-color);
            background: linear-gradient(45deg, var(--btn-gradient-start), var(--btn-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-color);
            font-weight: 500;
            font-size: 1.1rem;
            transition: color var(--transition-speed);
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 3px;
            background: linear-gradient(to right, var(--accent-color-start), var(--accent-color-end));
            transition: width var(--transition-speed);
            border-radius: 2px;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--heading-color);
        }
