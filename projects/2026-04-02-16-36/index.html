<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Root variables for consistent styling */
        :root {
            --font-primary: 'Poppins', sans-serif;
            --color-dark-blue: #2c3e50;
            --color-dark-purple: #8e44ad;
            --color-teal: #1abc9c;
            --color-light-teal: #16a085;
            --color-white: #ffffff;
            --color-off-white: #f0f2f5;
            --color-gray-text: #333;
            --color-light-gray: #f8f9fa;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --border-radius-medium: 8px;
            --spacing-unit: 1rem;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-primary);
            line-height: 1.6;
            color: var(--color-gray-text);
            background-color: var(--color-off-white);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-unit);
        }

        /* Header */
        header {
            background-color: var(--color-white);
            padding: calc(var(--spacing-unit) * 1.5) 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on small screens */
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-dark-blue);
            background: -webkit-linear-gradient(135deg, var(--color-dark-blue), var(--color-dark-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: calc(var(--spacing-unit) * 2);
        }

        nav ul li a {
            text-decoration: none;
            color: var(--color-gray-text);
            font-weight: 600;
            transition: color 0.3s ease;
            padding: 0.5rem 0;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            background-image: linear-gradient(90deg, var(--color-teal), var(--color-light-teal));
            left: 0;
            bottom: -5px;
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--color-teal);
        }

        /* Hero Section */
        .hero-section {
            background-image: linear-gradient(135deg, var(--color-dark-blue) 0%, var(--color-dark-purple) 100%);
            color: var(--color-white);
            padding: calc(var(--spacing-unit) * 8) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh; /* Make it take up more vertical space */
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: calc(var(--spacing-unit) * 1.5);
            font-weight: 700;
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: calc(var(--spacing-unit) * 2.5);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: calc(var(--spacing-unit) * 1) calc(var(--spacing-unit) * 2.5);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .primary-btn {
            background-image: linear-gradient(90deg, var(--color-teal) 0%, var(--color-light-teal) 100%);
            color: var(--color-white);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(26, 188, 156, 0.6);
        }

        .secondary-btn {
            background-color: var(--color-white);
            color: var(--color-dark-blue);
            border: 2px solid var(--color-dark-blue);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .secondary-btn:hover {
            background-color: var(--color-dark-blue);
            color: var(--color-white);
            border-color: var(--color-dark-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        /* Sections */
        section {
            padding: calc(var(--spacing-unit) * 6) 0;
        }

        section:nth-child(even) {
            background-color: var(--color-light-gray);
        }

        h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: calc(var(--spacing-unit) * 4);
            color: var(--color-dark-blue);
            position: relative;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 4px;
            background-image: linear-gradient(90deg, var(--color-teal), var(--color-dark-purple));
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            border-radius: 2px;
        }


        /* Features Section */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: calc(var(--spacing-unit) * 2);
            margin-top: calc(var(--spacing-unit) * 3);
        }

        .feature-card {
            background-color: var(--color-white);
            padding: calc(var(--spacing-unit) * 2.5);
            border-radius: var(--border-radius-medium);
            box-shadow: var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            font-size: 1.6rem;
            margin-bottom: var(--spacing-unit);
            color: var(--color-dark-blue);
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

        /* About Section */
        .about-section p {
            font-size: 1.1rem;
            max-width: 900px;
            margin: 0 auto calc(var(--spacing-unit) * 3) auto;
            text-align: center;
            color: #555;
        }

        /* Footer */
        footer {
            background-color: var(--color-dark-blue);
            color: var(--color-off-white);
            padding: calc(var(--spacing-unit) * 3) 0;
            font-size: 0.9rem;
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        footer p {
            margin: 0;
        }

        .social-links a {
            color: var(--color-off-white);
            text-decoration: none;
            margin-left: calc(var(--spacing-unit) * 1.5);
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--color-teal);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            .logo {
                margin-bottom: var(--spacing-unit);
            }

            nav ul {
                flex-direction: column;
                align-items: center;
                width: 100%;
            }

            nav ul li {
                margin: var(--spacing-unit) 0;
            }

            .hero-section {
                padding: calc(var(--spacing-unit) * 6) var(--spacing-unit);
                min-height: 60vh;
            }

            .hero-section h1 {
                font-size: 2.5rem;
            }

            .hero-section p {
                font-size: 1.1rem;
            }

            h2 {
                font-size: 2rem;
                margin-bottom: calc(var(--spacing-unit) * 3);
            }

            .feature-grid {
                grid-template-columns: 1fr; /* Stack cards on small screens */
</body>
</html>
