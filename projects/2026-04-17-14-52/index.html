        }

        }

        .feature-card .icon {

        }

        .feature-card h3 {

        }

        /* About Section */
        .about-section {
            background: linear-gradient(to right, #e0eafc, #cfdef3); /* Light, subtle gradient */

            padding: calc(var(--spacing-unit) * 5) 0;
            text-align: center;
