<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* CSS Variables */
        :root {
            --primary-bg-start: #6a11cb; /* Deep purple */
            --primary-bg-end: #2575fc;   /* Bright blue */
            --secondary-bg-color: #ffffff;
            --text-color-light: #ffffff;
            --text-color-dark: #333333;
            --accent-color: #ff6f61; /* Vibrant coral */
            --accent-color-dark: #e05e52; /* Darker coral for hover */
            --border-radius-lg: 12px;
            --border-radius-sm: 6px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --header-footer-bg: rgba(255, 255, 255, 0.05);
            --header-footer-text: rgba(255, 255, 255, 0.9);
        }

        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: linear-gradient(135deg, var(--primary-bg-start) 0%, var(--primary-bg-end) 100%);
            color: var(--text-color-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--header-footer-bg);
            padding: 15px 0;
            box-shadow: var(--box-shadow);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .logo:hover {
            color: var(--accent-color);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-color-light);
            text-decoration: none;
            font-weight: 400;
            font-size: 1.05rem;
            transition: color 0.3s ease;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            display: block;
            margin-top: 5px;
            right: 0;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
            left: 0;
            background: var(--accent-color);
        }
        
        nav ul li a:hover {
            color: var(--accent-color);
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            flex-grow: 1;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            max-width: 700px;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            background: var(--accent-color);
            color: var(--text-color-light);
            padding: 15px 30px;
            border-radius: var(--border-radius-lg);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 111, 97, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            background-color: var(--accent-color-dark);
            box-shadow: 0 12px 25px rgba(255, 111, 97, 0.4);
        }

        /* Main Content Sections */
        main {
            flex-grow: 1;
        }

        .section {
            background: var(--secondary-bg-color);
            color: var(--text-color-dark);
            padding: 80px 0;
            border-radius: var(--border-radius-lg);
            margin: 40px auto;
            box-shadow: var(--box-shadow);
            overflow: hidden; /* To contain shadows or overflows */
        }

        .section:nth-of-type(even) {
            background: #f7f7f7;
        }

        .section h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            color: var(--primary-bg-start);
            position: relative;
        }

        .section h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-item {
            background: #ffffff;
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .feature-item i {
            font-size: 3.5rem;
            color: var(--primary-bg-end);
            margin-bottom: 20px;
            display: block;
            transition: color 0.3s ease;
        }

        .feature-item:hover i {
            color: var(--accent-color);
        }

        .feature-item h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-color-dark);
        }

        .feature-item p {
            font-size: 1rem;
            color: #666;
        }

        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }

        .about-text {
            flex: 1;
            min-width: 300px;
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--primary-bg-start);
        }

        .about-image {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--box-shadow);
            transition: transform 0.3s ease;
        }

        .about-image img:hover {
            transform: scale(1.02);
        }

        /* Footer */
        footer {
            background: var(--header-footer-bg);
            padding: 30px 0;
            text-align: center;
            margin-top: 60px;
            backdrop-filter: blur(5px);
            color: var(--header-footer-text);
        }

        footer p {
            margin: 0;
            font-size: 0.95rem;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            nav ul {
                margin-top: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav ul li {
                margin: 0 15px 10px;
            }

            .hero {
                padding: 80px 15px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .section {
                padding: 60px 0;
                margin: 20px auto;
            }

            .section h2 {
                font-size: 2rem;
            }

            .about-content {
                flex-direction: column;
            }

            .about-image {
                order: -1; /* Image appears above text on mobile */
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }

            nav ul li {
                margin: 0 10px 10px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .cta-button {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .section h2 {
                font-size: 1.8rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">Project 2026</a>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <h1>Revolutionizing the Future, Today.</h1>
                <p>Experience innovation like never before with our groundbreaking project
</body>
</html>
