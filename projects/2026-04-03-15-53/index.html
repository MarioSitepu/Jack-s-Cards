<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Redefining Excellence (2026-04-03)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for consistent styling */
        :root {
            --primary-color: #3a7bd5; /* Vibrant Blue */
            --secondary-color: #00d2ff; /* Lighter Blue/Teal */
            --dark-bg-color: #1a2a6c; /* Deep Blue/Purple */
            --light-text-color: #f0f0f0;
            --dark-text-color: #333;
            --accent-color: #2ecc71; /* Green for highlights */
            --card-bg-color: #ffffff;
            --body-bg-color: #f4f7f6; /* Light background for main content */
            --shadow-color: rgba(0, 0, 0, 0.1);

            --font-family: 'Poppins', sans-serif;
            --border-radius: 8px;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
        }

        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            color: var(--dark-text-color);
            background-color: var(--body-bg-color);
            scroll-behavior: smooth;
        }

        a {
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        ul {
            list-style: none;
        }

        h1, h2, h3 {
            margin-bottom: 1rem;
            color: var(--dark-bg-color);
            font-weight: 600;
        }

        p {
            margin-bottom: 1rem;
        }

        /* Utility classes */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: var(--light-text-color);
            padding: 0.8rem 2rem;
            border-radius: var(--border-radius);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            color: var(--light-text-color);
        }

        .btn.secondary-btn {
            background: var(--dark-bg-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn.secondary-btn:hover {
            background: var(--primary-color);
        }

        /* Header Section */
        header {
            background: linear-gradient(to right, var(--dark-bg-color), var(--primary-color));
            color: var(--light-text-color);
            padding-bottom: var(--spacing-lg);
            position: relative;
            overflow: hidden;
        }

        /* Decorative wave effect at the bottom of the header */
        header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: var(--body-bg-color);
            clip-path: ellipse(120% 100% at 50% 100%);
            transform: translateY(50%);
            z-index: 1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-md);
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light-text-color);
        }

        .nav-links {
            display: flex;
        }

        .nav-links li {
            margin-left: var(--spacing-md);
        }

        .nav-links a {
            color: var(--light-text-color);
            font-weight: 400;
            padding: 0.5rem 0;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--secondary-color);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hero {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-md);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: var(--spacing-sm);
            color: var(--light-text-color);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: var(--spacing-md);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Main Content Sections */
        main {
            padding-top: var(--spacing-lg);
        }

        section {
            padding: var(--spacing-lg) 0;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: var(--spacing-md);
            padding-right: var(--spacing-md);
        }

        section h2 {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-lg);
            position: relative;
            display: inline-block;
        }

        section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        .features-section {
            background-color: var(--card-bg-color);
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 10px 30px var(--shadow-color);
            padding-top: var(--spacing-lg);
            padding-bottom: var(--spacing-lg);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .feature-card {
            background-color: var(--card-bg-color);
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .feature-card .icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-sm);
            display: block;
        }

        .feature-card h3 {
            color: var(--dark-bg-color);
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
        }

            align-items: center;
            gap: var(--spacing-lg);
            text-align: left;
            padding-top:
