<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureSphere - Modern Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-text-color: #333;
            --secondary-text-color: #555;
            --light-bg-gradient: linear-gradient(to right bottom, #f4f7fa, #e8edf3);
            --dark-bg-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --accent-gradient-blue: linear-gradient(135deg, #6DD5ED 0%, #2193B0 100%); /* Teal to Dark Blue */
            --accent-gradient-green: linear-gradient(45deg, #2ECC71 0%, #27AE60 100%); /* Green */
            --accent-gradient-purple: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%); /* Purple */
            --header-footer-bg: rgba(255, 255, 255, 0.95);
            --header-footer-text: #333;
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s ease;
        }

        /* Base Styles & Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--primary-text-color);
            background: var(--light-bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-bottom: 0.8em;
            font-weight: 600;
        }

        p {
            margin-bottom: 1em;
            color: var(--secondary-text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--header-footer-bg);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--box-shadow);
            backdrop-filter: blur(5px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 700;
            background: var(--accent-gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        nav ul {
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            font-weight: 600;
            color: var(--header-footer-text);
            padding: 5px 0;
            position: relative;
            transition: color var(--transition-speed);
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gradient-blue);
            transition: width var(--transition-speed);
        }

        nav ul li a:hover {
            color: #2193B0; /* A color from the accent gradient */
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
        }
