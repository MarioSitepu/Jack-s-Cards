<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futura Project Showcase</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --text-color: #e0e0e0;
            --accent-purple: #533483;
            --accent-red: #e94560;
            --gradient-start: #0f3460;
            --gradient-end: #533483;
            --card-bg: #1e2a4a;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
        }

        /* Base Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 700;
            margin-top: 0;
        }

        a {
            color: var(--accent-red);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--bg-light);
            padding: 20px 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-color);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-color);
            font-weight: 600;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-red);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            padding: 100px 0;
            text-align: center;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero h2 {
            font-size: 3.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px var(--shadow-color);
            position: relative;
            z-index: 1;
        }

        .hero p {
            font-size: 1.4em;
            margin-bottom: 40px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .hero .project-date {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--accent-red);
            text-shadow: 1px 1px 3px var(--shadow-color);
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-red);
            color: var(--text-color);

</body>
