            --border-radius: 12px;
            --transition-speed: 0.3s ease;
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color-dark);
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-color-dark);
        }

        p {
            margin-bottom: 1rem;
        }

        /* Header */
        .header {
            background: var(--primary-gradient);
            color: var(--text-color-light);
            padding: 1rem 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav ul {
            display: flex;
            gap: 1.5rem;
        }

        .nav a {
            color: var(--text-color-light);
            font-weight: 600;
            padding: 0.5rem 0;
            position: relative;
            transition: color var(--transition-speed);
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--accent-color);
            transition: width var(--transition-speed);
        }

        .nav a:hover::after {
            width: 100%;
        }
        .nav a:hover {
            color: var(--accent-color);
        }

        /* Hero Section */
        .hero {
            background: var(--secondary-gradient);
            color: var(--text-color-light);
            padding: 8rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-color-light);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 800px;
            margin: 0 auto 2rem auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: var(--text-color-light);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .date-info {
            font-size: 1rem;
            margin-top: 1.5rem;
            opacity: 0.9;
        }

        /* Main Content Sections */
        .section {
            padding: 5rem 0;
            text-align: center;
        }

        .section:nth-of-type(even) {
            background-color: var(--bg-light);
        }
        .section:nth-of-type(odd) {
            background-color: #f0f0f0;
        }

        .section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }

        .section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: left;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            font-size: 1.8rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

        /* Call to Action */
        .cta-section {
            background: var(--primary-gradient);
            color: var(--text-color-light);
            padding: 6rem 0;
            text-align: center;
        }

        .cta-section h2 {
            color: var(--text-color-light);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-size: 3rem;
        }

        .cta-section p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 2.5rem auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .cta-section .btn {
            background: var(--accent-color);
        }

        /* Footer */
        .footer {
            background-color: var(--bg-dark);
            color: var(--text-color-light);
            padding: 3rem 0;
            text-align: center;
            margin-top: auto; /* Pushes footer to the bottom */
        }

        .footer .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .footer-nav ul {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-nav a {
            color: rgba(255, 255, 255, 0.8);
            transition: color var(--transition-speed);
        }

        .footer-nav a:hover {
            color: var(--accent-color);
        }

        .social-links {
            margin-top: 1rem;
        }

        .social-links a {
            display: inline-block;
            margin: 0 10px;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            transition: color var(--transition-speed), transform var(--transition-speed);
        }

        .social-links a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        .copyright {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 1rem;

            .hero {

            }
