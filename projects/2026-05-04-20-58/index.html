<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumForge - Modern Project</title>
    <style>
        :root {
            --primary-color: #4A00E0; /* Deep Purple */
            --primary-color-rgb: 74, 0, 224; /* RGB for #4A00E0 */
            --secondary-color: #8E2DE2; /* Lighter Purple */
            --accent-color: #00C6FF; /* Bright Blue/Cyan */
            --text-color: #333;
            --light-text-color: #f4f4f4;
            --bg-color: #ffffff;
            --light-bg-color: #f8f8f8;
            --gradient-hero: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-button: linear-gradient(45deg, var(--accent-color) 0%, #007bff 100%);
            --gradient-card: linear-gradient(135deg, #f0f0f0 0%, #ffffff 100%);

            --font-primary: 'Arial', sans-serif; /* Fallback */
            --font-heading: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --border-radius: 8px;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 10px;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .primary-btn {
            background: var(--gradient-button);
            color: var(--light-text-color);
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }

        /* Header */
        header {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px 0;
            box-shadow: var(--box-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary-color);
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-color);
            font-weight: 500;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color);
            text-decoration: none;
        }

        /* Hero Section */
        .hero {
            background: var(--gradient-hero);
            color: var(--light-text-color);
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: var(--light-text-color);
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .hero .tagline {
            font-size: 1.4em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .hero .project-date {
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0.8;
        }

        .hero .project-date span {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Content Sections */
        section {
            padding: 80px 0;
            text-align: center;
        }

        .features-section {
            background-color: var(--light-bg-color);
        }

        .features-section h2, .about-section h2 {
            font-size: 2.5em;
            margin-bottom: 50px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-card {
            background: var(--gradient-card);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .icon-placeholder {
            font-size: 3em;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(var(--primary-color-rgb), 0.1), rgba(var(--primary-color-rgb), 0.15));
        }

        .feature-card h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .feature-card p {
            color: #666;
        }

        .about-section {
            background-color: var(--bg-color);
        }

        .about-section p {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1em;
            color: #555;
            line-height: 1.8;
        }

        footer {

</html>
