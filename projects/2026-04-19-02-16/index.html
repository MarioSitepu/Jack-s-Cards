<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase 2026</title>
    <style>
        /* General Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Body & Base Styles */
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; /* Modern system font stack */
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            scroll-behavior: smooth;
        }

        /* Container for content sections */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            background: linear-gradient(to right, #001f3f, #003366); /* Dark blue gradient */
            color: #fff;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
</body>
</html>
