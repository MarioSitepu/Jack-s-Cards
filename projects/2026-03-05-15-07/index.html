<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase - 2026</title>

    <style>
        /* CSS Variables for easy theme management */
        :root {
            --color-primary-dark: #1a1a2e; /* Deep blue-purple */
            --color-secondary-dark: #2c2c4d; /* Slightly lighter blue-purple for cards/sections */
            --color-text-light: #e0e0e0; /* Light grey for text */
            --color-text-accent: #f0f0f0; /* Even lighter for headings */
            --color-accent-1: #4a00e0; /* Deep purple */
            --color-accent-2: #8e2de2; /* Vibrant purple */
            --gradient-main: linear-gradient(135deg, var(--color-accent-1) 0%, var(--color-accent-2) 100%);
            --gradient-button: linear-gradient(45deg, #007bff, #00c6ff); /* Blue gradient for buttons */
            --shadow-light: 0 4px 8px rgba(0, 0, 0, 0.2);
            --shadow-heavy: 0 8px 16px rgba(0, 0, 0, 0.4);
            --border-radius-soft: 8px;
            --border-radius-round: 50px;
        }

        /* Base Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--color-text-light);
            background-color: var(--color-primary-dark);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        a {
            color: var(--color-accent-2);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #fff;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--color-text-accent);
            margin-top: 0;
            font-weight: 600;
        }

        section {
            padding: 4rem 2rem;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Header */
        header {
            background-color: var(--color-secondary-dark);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* For mobile responsiveness */
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-text-accent);
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap; /* For mobile responsiveness */
            justify-content: center;
        }

        header nav a {
            color: var(--color-text-light);
            font-weight: 400;
            padding: 0.5rem 1rem;
            position: relative;
        }

        header nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient-button);
            transition: width 0.3s ease-in-out;
        }

        header nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--gradient-main);
            color: #fff;
            padding: 6rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            text-shadow: var(--shadow-light);
        }

        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            color: #fff; /* Override text-accent for better contrast on gradient */
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            max-width: 700px;
        }

        .hero .date-text {
            font-size: 1.1rem;
            margin-top: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn {
            background: var(--gradient-button);
            color: #fff;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: var(--border-radius-round);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-light);
            outline: none;
        }

        .btn:hover {
            box-shadow: var(--shadow-heavy);
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Features Section */
        .features {
            background-color: var(--color-primary-dark);
        }

        .features h3 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }

        .features h3::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 3px;
            bottom: -10px;
            left: 20%;
            background: var(--gradient-main);
            border-radius: 2px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-item {
            background-color: var(--color-secondary-dark);
            padding: 2.5rem;
            border-radius: var(--border-radius-soft);
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid transparent; /* For hover effect */
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-heavy);
            border: 1px solid var(--color-accent-2);
        }

        .feature-item .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        .feature-item h4 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--color-text-accent);
        }

        .feature-item p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--color-text-light);
        }

        /* About Section */
        .about {
            background-color: var(--color-primary-dark);
            padding: 6rem 2rem;
        }

        .about h3 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .about h3::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 3px;
            bottom: -10px;
            left: 20%;
            background: var(--gradient-button);
            border-radius: 2px;
        }

        .about p {
            max-width: 800px;
            margin: 0 auto 1.5rem auto;
            font-size: 1.1rem;
            color: var(--color-text-light);
        }

        /* Footer */
        footer {
            background-color: var(--color-secondary-dark);
            color: var(--color-text-light);
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        footer p {
            margin: 0.5rem 0;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: center;
            }

            header nav ul {
                margin-top: 1rem;
                flex-direction: column;
                gap: 0.8rem;
            }

            .hero h2 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            section {
                padding: 3rem 1rem;
            }

            .features h3, .about h3 {
                font-size: 2rem;
            }

            .feature-grid {
                grid-template-columns: 1fr; /* Stack features on small screens */
            }

            .feature-item {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            header .logo {
                font-size: 1.5rem;
            }

            header nav a {
                padding: 0.3rem 0.8rem;
                font-size: 0.9rem;

                font-size: 1.8rem;
            }
