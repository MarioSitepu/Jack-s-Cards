        a:hover {

        header {

        .nav-links a::after {
            content: '';

            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: var(--accent-color);
            transition: width 0.3s ease-out;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .burger {
            display: none;
            cursor: pointer;
        }

        .burger div {
            width: 25px;
            height: 3px;
            background-color: var(--text-light);
            margin: 5px;
            transition: all 0.3s ease;
        }

            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);

            color: var(--accent-color);
            font-weight: bold;
