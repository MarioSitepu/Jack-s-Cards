<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-gradient: linear-gradient(to right, #4A00E0, #8E2DE2); /* Deep Purple to Magenta */
            --secondary-gradient: linear-gradient(to right, #8E2DE2, #4A00E0); /* Magenta to Deep Purple */
            --text-light: #F0F0F0;
            --text-dark: #333333;
            --bg-light: #FFFFFF;
            --bg-dark: #1A1A2E; /* Dark background for contrast */
            --accent-color: #FFD700; /* Gold for highlights */
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --transition-speed: 0.3s ease;
        }

        /* General Body Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.6;
            color: var(--text-light);
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: rgba(0, 0, 0, 0.2); /* Slightly transparent */
            padding: 1.5rem 0;
            box-shadow: 0 2px 10px var(--shadow-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-light);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .nav-links li {
            margin-left: 2.5rem;
        }
        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 400;
            transition: color var(--transition-speed), transform var(--transition-speed);
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width var(--transition-speed);
        }
        .nav-links a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 3rem 0;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        section {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 4rem;
            margin-bottom: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px var(--shadow-light);
            transition: transform var(--transition-speed);
        }
        section:hover {
            transform: translateY(-5px);
        }
        h1, h2, h3 {
            color: #6A0DAD; /* A darker purple for headings */
            margin-top: 0;
            font-weight: 600;
        }
        h1 { font-size: 3.5rem; margin-bottom: 1.5rem; }
        h2 { font-size: 2.5rem; margin-bottom: 1.2rem; }
        h3 { font-size: 1.8rem; margin-bottom: 1rem; }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        .hero {
            background: var(--secondary-gradient); /* Different gradient */
            color: var(--text-light);
            text-align: center;
            padding: 6rem 2rem;
            border-radius: var(--border-radius);
            margin-bottom: 3rem;
            box-shadow: 0 15px 40px var(--shadow-dark);
        }
        .hero h1 {
            color: var(--text-light);
            font-size: 4.5rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .hero p {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 0 auto 2rem auto;
        }
        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: var(--bg-dark); /* Dark text on accent button */
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-speed);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
            background: #FFEF80; /* Lighter gold on hover */
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .feature-item {
            background-color: #F8F8F8; /* Lighter background for features */
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }
        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        .feature-item h3 {
            color: #6A0DAD;
            margin-bottom: 1rem;
        }
        .feature-item p {
            color: var(--text-dark);
            font-size: 1rem;
        }

        /* Form Styles */
        form input,
        form textarea {
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            transition: border-color var(--transition-speed);
        }
        form input:focus,
        form textarea:focus {
            outline: none;
            border-color: #8E2DE2;
            box-shadow: 0 0 0 3px rgba(142, 45, 226, 0.2);
        }
        form button.btn {
            width: fit-content;
            align-self: center;
        }

        /* Footer */
        footer {
            background-color: rgba(0, 0, 0, 0.3); /* Slightly transparent */
            color: var(--text-light);
            text-align: center;
            padding: 2.5rem 0;
            margin-top: auto;
            box-shadow: 0 -2px 10px var(--shadow-dark);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .footer-content p {
            margin: 0;
            font-size: 0.9rem;
        }
        .footer-content a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color var(--transition-speed);
        }
        .footer-content a:hover {
            color: var(--text-light);
        }

        /* Mobile Responsiveness */
        @media (max-width: 992px) {
            .navbar {
                padding: 0 1.5rem;
            }
            .nav-links li {
                margin-left: 1.5rem;
            }
            .hero h1 {
                font-size: 3.5rem;
            }
            .hero p {
                font-size: 1.3rem;
            }
            h1 { font-size: 3rem; }
            h2 { font-size: 2rem; }
            section {
                padding: 3rem;
                margin-bottom: 2rem;
            }
            main {
                padding: 2rem 0;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }
            .logo {
                margin-bottom: 1rem;
            }
            .nav-links {
                flex-direction: column;
                width: 100%;
                margin-top: 1rem;
            }
            .nav-links li {
                margin: 0.5rem 0;
                width: 100%;
                text-align: center;
            }
            .nav-links a {
                display: block;
                padding: 0.5rem 0;
            }
            .hero {
                padding: 4rem 1.5rem;
            }
            .hero h1 {
                font-size: 2.8rem;
            }
            .hero p {
                font-size: 1.1rem;
            }
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            section {
                padding: 2.5rem;
                margin: 0 1rem 2rem 1rem; /* Add horizontal margin */
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .feature-item {
                padding: 2rem;
            }
        }

        @media
