<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg-start: #000022; /* Very dark blue */
            --primary-bg-end: #0a0a33;   /* Slightly lighter dark blue */
            --accent-color-light: #4a90e2; /* Bright blue */
            --accent-color-dark: #2c5f9f;  /* Darker blue for contrast */
            --text-color-light: #e0e0e0;
            --text-color-dark: #a0a0a0;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --font-family: 'Poppins', sans-serif;
            --spacing-unit: 1rem;
        }

        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            color: var(--text-color-light);
            background: linear-gradient(135deg, var(--primary-bg-start) 0%, var(--primary-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevent horizontal scroll on small devices */
        }

        h1, h2, h3, h4 {
            font-weight: 700;
            color: var(--accent-color-light);
            margin-bottom: var(--spacing-unit);
        }

        h1 { font-size: 3rem; }
        h2 { font-size: 2.5rem; }
        h3 { font-size: 1.8rem; }
        p { margin-bottom: var(--spacing-unit); }

        a {
            color: var(--accent-color-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            color: var(--accent-color-dark);
        }

        /* Layout & Components */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 calc(2 * var(--spacing-unit));
            width: 100%;
        }

        /* Header */
        header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: var(--spacing-unit) 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color-light);
            text-shadow: 0 0 5px var(--accent-color-light);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            font-weight: 600;
            padding: 0.5rem 0;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-color-light);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex-grow: 1;
        }

        section {
            padding: 5
