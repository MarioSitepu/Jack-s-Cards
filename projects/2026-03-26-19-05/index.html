<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureSphere Project Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        /* CSS Reset & Variables */
        :root {
            --primary-bg-start: #1a003f; /* Dark Violet */
            --primary-bg-end: #001f3f;   /* Dark Blue */
            --accent-color-1: #00bcd4;   /* Cyan */
            --accent-color-2: #ff4081;   /* Pink */
            --text-light: #e0e0e0;
            --text-dark: #333;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --gradient-text: linear-gradient(90deg, #ff4081, #00bcd4);
            --shadow-light: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-dark: 0 12px 40px rgba(0, 0, 0, 0.6);
            --border-radius-lg: 15px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--primary-bg-start), var(--primary-bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-light);
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            line-height: 1;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color-1);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-color-1);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 40px 0;
        }

        section {
            padding: 80px 0;
            position: relative;
            z-index: 1;
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        h1 {
            font-size: 3.5em;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 2.5em;
            text-align: center;
            color: var(--accent-color-1);
            margin-bottom: 40px;
        }

        h3 {
            font-size: 1.8em;
            color: var(--accent-color-2);
        }

        p {
            margin-bottom: 15px;
            font-size: 1.1em;
            color: var(--text-light);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 0;
            background: radial-gradient(circle at top left, rgba(0, 188, 212, 0.15), transparent 70%),
                        radial-gradient(circle at bottom right, rgba(255, 64, 129, 0.15), transparent 70%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }

        .hero p {
            font-size: 1.5em;
            max-width: 800px;
            margin: 0 auto 30px auto;
            color: rgba(255, 255, 255, 0.8);
        }

        .hero .launch-date {
            font-size: 1.8em;
            font-weight: 600;
            color: var(--accent-color-1);
            margin-top: 40px;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-light);
        }

        /* Features Section */
        .features {
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-lg);
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(3px);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-dark);
        }

        .feature-card .icon {
            font-size: 3em;
            color: var(--accent-color-2);
            margin-bottom: 20px;
        }
        .feature-card:nth-child(1) .icon::before { content: "✨"; } /* Placeholder icon */
        .feature-card:nth-child(2) .icon::before { content: "🚀"; } /* Placeholder icon */
        .feature-card:nth-child(3) .icon::before { content: "💡"; } /* Placeholder icon */


        .feature-card h3 {
            margin-bottom: 15px;
            font-size: 1.6em;
            color: var(--accent-color-1);
        }

        .feature-card p {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.7);
        }

        /* About Section */
        .about {
            background: radial-gradient(circle at center, rgba(0, 188, 212, 0.1), transparent 60%);
            padding-top: 60px;
            padding-bottom: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .about-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-light);
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        footer p {
            margin: 0;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            h1 {
                font-size: 3em;
            }
            h2 {
                font-size: 2em;
            }
            .hero p {
                font-size: 1.3em;
            }
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 20px;
            }
            nav ul {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            nav a::after {
                left: 50%;
                transform: translateX(-50%);
            }
            h1 {
                font-size: 2.5em;
            }
            .hero {
                padding: 80px 0;
            }
            .hero p {
                font-size: 1.1em;
            }
            .hero .launch-date {
                font-size: 1.5em;
            }
            .feature-grid {
                grid-template-columns: 1fr;
            }
            section {
                padding: 60px 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }
