<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <style>
        /* Global Reset & Box Sizing */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Color Palette */
            --primary-bg-start: #0f2027; /* Dark blue/grey */
            --primary-bg-end: #203a43;   /* Slightly lighter blue/grey */
            --header-footer-bg-start: #1e3c72; /* Deeper blue */
            --header-footer-bg-end: #2a5298;   /* Royal blue */
            --hero-bg-start: #1f2a40; /* Darker blue */
            --hero-bg-end: #3a4b6b;   /* Muted blue */
            --accent-gradient-start: #00c6ff; /* Bright blue */
            --accent-gradient-end: #0072ff;   /* Darker blue */
            --heading-gradient-start: #a7d9ff; /* Light sky blue */
            --heading-gradient-end: #e0a7ff;   /* Light lavender */
            --text-light: #e0e0e0;
            --text-dark: #333;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--primary-bg-start), var(--primary-bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevent horizontal scroll on small devices */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, var(--header-footer-bg-start), var(--header-footer-bg-end));
            color: #fff;
            padding: 1rem 0;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(45deg, var(--heading-gradient-start), var(--heading-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers that don't support background-clip */
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--accent-gradient-start);
        }

        /* Main Content */
        main {
            flex-grow: 1;
        }

        section {
            padding: 60px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: rgba(0, 0, 0, 0.1);
        }

        h2, h3 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--heading-gradient-start), var(--heading-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        h3 {
            font-size: 2rem;
        }

        p {
            margin-bottom: 15px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        /* Hero Section */
        #hero {
            background: linear-gradient(135deg, var(--hero-bg-start) 0%, var(--hero-bg-end) 100%);
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        #hero h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        #hero p {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 114, 255, 0.6);
        }

        /* Features Section */
        #features .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px var(--shadow-color);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, background-color 0.3s ease;
            text-align: left;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.15);
        }

        .feature-item h4 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #fff;
            background: linear-gradient(45deg, var(--heading-gradient-start), var(--heading-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        .feature-item p {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 0;
        }

        /* About Section */
        #about p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #about strong {
            color: var(--accent-gradient-start);
        }

        /* Footer */
        footer {
            background: linear-gradient(90deg, var(--header-footer-bg-start), var(--header-footer-bg-end));
            color: #fff;
            text-align: center;
            padding: 1.5rem 0;
            margin-top: auto;
            box-shadow: 0 -4px 15px var(--shadow-color);
        }
