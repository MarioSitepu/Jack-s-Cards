<html lang="en">

        :root {

            --accent-color-2: #2193b0; /* Stronger Blue */
            --light-bg: #f8f9fa; /* Off-White */
            --dark-bg: #1a202c; /* Very Dark Grey */
            --text-light: #ffffff;
            --text-dark: #333333;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-sm: 8px;
            --border-radius-lg: 12px;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
            --max-width: 1200px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--light-bg) 0%, #e0e6ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        /* Header */
        header {
            background: var(--primary-color);
            color: var(--text-light);
            padding: var(--spacing-sm) 0;
            box-shadow: 0 2px 10px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-light);
            text-decoration: none;
            flex-shrink: 0;
            margin-right: var(--spacing-sm);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        nav a:hover, nav a:focus {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(45deg, var(--accent-color-1) 0%, var(--accent-color-2) 100%);
            color: var(--text-light);
            padding: var(--spacing-lg) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: var(--border-radius-lg);
            border-bottom-right-radius: var(--border-radius-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 5px 20px var(--shadow-medium);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            transform: rotate(30deg);
            pointer-events: none;
            animation: pulse-gradient 10s infinite alternate;
        }

        @keyframes pulse-gradient {
            0% { opacity: 0.8; transform: rotate(30deg) scale(1); }
            100% { opacity: 1; transform: rotate(40deg) scale(1.1); }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: var(--spacing-sm);
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .hero p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            margin-bottom: var(--spacing-md);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .hero .project-date {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            display: inline-block;
            margin-top: var(--spacing-sm);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 100%); /* Purple-Pink Gradient */
            color: var(--text-light);
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover, .btn:focus {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0.9;
        }

        main {
