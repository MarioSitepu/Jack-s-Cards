<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset & Base Styles */
        :root {
            --primary-bg: #f8f8f8;
            --secondary-bg: #ffffff;
            --text-color: #333;
            --heading-color: #222;
            --accent-color: #007bff;
            --gradient-1-start: #6a11cb; /* Purple */
            --gradient-1-end: #2575fc;   /* Blue */
            --gradient-2-start: #fc6767; /* Red */
            --gradient-2-end: #ec008c;   /* Pink */
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--primary-bg);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1, h2, h3 {
            color: var(--heading-color);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        h1 { font-size: 3rem; }
        h2 { font-size: 2.5rem; }
        h3 { font-size: 1.75rem; }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--gradient-1-start);
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--gradient-1-start), var(--gradient-1-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers not supporting background-clip: text */
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            font-weight: 600;
            color: var(--heading-color);
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(45deg, var(--gradient-1-start), var(--gradient-1-end));
            transition: width 0.3s ease-in-out;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .primary-btn {
            background: linear-gradient(45deg, var(--gradient-1-start) 0%, var(--gradient-1-end) 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(37, 117, 252, 0.4);
        }

        .secondary-btn {
            background: linear-gradient(45deg, var(--gradient-2-start) 0%, var(--gradient-2-end) 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(236, 0, 140, 0.3);
        }

        .secondary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(236, 0, 140, 0.4);
        }

        /* Sections */
        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: var(--secondary-bg);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--gradient-1-end) 0%, var(--gradient-1-start) 100%);
            color: #fff;
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-section h1 {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
            line-height: 1.1;
        }

        .hero-section p {
            font-size: 1.4rem;
            max-width: 800px;
            margin: 0 auto 2.5rem auto;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Features Section */
        .features-section h2 {
            margin-bottom: 3rem;
            background: linear-gradient(45deg, var(--gradient-2-start), var(--gradient-2-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--secondary-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-medium);
        }

        .feature-card .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .feature-card h3 {
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .feature-card p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* About Section */
        .about-section {
            background-color: var(--primary-bg);
            text-align: left;
        }

        .about-section h2 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--gradient-1-start), var(--gradient-1-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .about-section p {
            max-width: 800px;
            margin: 0 auto 1.5rem auto;
            font-size: 1.15rem;
            line-height: 1.8;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--gradient-2-end) 0%, var(--gradient-2-start) 100%);
            color: #fff;
            padding: 100px 0;
        }

        .cta-section h2 {
            color: #fff;
            font-size: 3rem;
        }

        .cta-section p {
            font-size: 1.3rem;
            max-width: 700px;
            margin: 0 auto 2.5rem auto;
</body>
</html>
