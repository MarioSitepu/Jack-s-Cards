<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS variables */
        :root {
            --primary-gradient: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(to right, #a1c4fd 0%, #c2e9fb 100%);
            --dark-blue: #2c3e50;
            --text-color: #34495e;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
        }

        /* Global styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--light-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        h1, h2, h3 {
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--dark-blue);
        }

        p {
            margin-bottom: 1rem;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            color: var(--white);
            padding: 1rem 0;
            box-shadow: 0 4px 10px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            font-weight: 400;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--white);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-light);
            border: none;
            cursor: pointer;
        }

        .primary-btn {
            background: var(--primary-gradient);
            color: var(--white);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
            opacity: 0.9;
        }

        .secondary-btn {
            background: var(--white);
            color: var(--dark-blue);
            border: 2px solid #a1c4fd;
        }

        .secondary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
            background: var(--secondary-gradient);
            color: var(--white);
            border-color: transparent;
        }

        /* Sections */
        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: var(--white);
        }

        /* Hero Section */
        .hero-section {
            background: var(--primary-gradient);
            color: var(--white);
            padding: 150px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: var(--white);
        }

        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-section p span {
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Features Section */
        .features-section h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid transparent;
            border-image: var(--primary-gradient);
            border-image-slice: 1;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-medium);
        }

        .feature-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--dark-blue);
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-color);
        }

        /* About Section */
        .about-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .about-section p {
            font-size: 1.1rem;
            max-width: 900px;
            margin: 0 auto 2rem auto;
        }

        .about-section p span {
            font-weight: 600;
            color: var(--dark-blue);
        }

        /* Contact Section */
        .contact-section {
            background: var(--secondary-gradient);
            color: var(--dark-blue);
        }

        .contact-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--dark-blue);
        }

        .contact-section p {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .contact-section form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-section form input,
        .contact-section form textarea {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #c2e9fb;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-section form input:focus,
        .contact-section form textarea:focus {
            outline: none;
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2);
        }

        .contact-section form textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Footer */
        footer {
            background-color: var(--dark-blue);
            color: var(--white);
            padding: 3rem 0;
            text-align: center;
            font-size: 0.9rem;
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-links a {
            color: var(--white);
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: #c2e9fb;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }

            nav ul li {
                margin: 0 10px;
            }

            .hero-section {
                padding: 100px 0;
                min-height: 60vh;
            }

            .hero-section h1 {
                font-size: 2.5rem;
            }

            .hero-section p {
                font-size: 1rem;
            }

            .features-section h2,
            .about-section h2,
            .contact-section h2 {
                font-size: 2rem;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .feature-card {
                padding: 30px;
            }

            .btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }

            footer .container {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            .logo {
                font-size: 1.5rem;
            }

            nav ul li {
                margin: 0 5px;
                font-size: 0.9rem;
            }

            .hero-section h1 {
                font-size: 2rem;
            }

            .hero-section p {
                font-size: 0.9rem;
            }

            .features-section h2,
            .about-section h2,
            .contact-section h2 {
                font-size: 1.8rem;
            }

            section {
                padding: 60px 0;
            }
        }
    </style>
</head>
<body>
</body>
</html>
