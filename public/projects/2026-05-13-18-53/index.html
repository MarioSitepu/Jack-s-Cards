<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a11cb; /* Dark Purple */
            --secondary-color: #2575fc; /* Bright Blue */
            --accent-color: #00c6ff; /* Cyan */
            --text-dark: #2c3e50; /* Dark Grey Blue */
            --text-light: #f4f4f4; /* Off-white */
            --background-light: #ffffff; /* White */
            --background-gradient-start: #f0f2f5; /* Light Grey */
            --background-gradient-end: #e0e5ec; /* Slightly darker Light Grey */
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
        }

        /* Base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: var(--primary-color);
        }

        h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--primary-color);
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        h3 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--text-dark);
        }

        p {
            margin-bottom: var(--spacing-sm);
        }

        a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-color);
        }

        .button {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: var(--border-radius-md);
            background: linear-gradient(45deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-light);
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-medium);
        }

        .button:hover {
            background: linear-gradient(45deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-medium);
        }

        /* Header */
        header {
            background: var(--background-light);
            box-shadow: 0 2px 10px var(--shadow-light);
            padding: var(--spacing-sm) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on small screens */
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        nav a {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        #hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-light);
            padding: var(--spacing-lg) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh; /* Make hero section taller */
        }

        #hero h1 {
            color: var(--text-light);
            margin-bottom: var(--spacing-sm);
        }

        #hero p {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            max-width: 800px;
            margin: 0 auto var(--spacing-md) auto;
            opacity: 0.9;
        }

        /* Main Content Sections */
        main {
            flex-grow: 1; /* Allow main to take available space */
        }

        section {
            padding: var(--spacing-lg) 0;
        }

        section:nth-of-type(even) {
            background-color: var(--background-light);
        }

        /* Features Section */
        #features .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .feature-card {
            background: var(--background-light);
            padding: var(--spacing-md);
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card .icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: var(--spacing-sm);
            display: inline-block;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* About Section */
        #about {
            text-align: center;
        }

        #about p {
            max-width: 800px;
            margin: 0 auto;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
        }

        /* CTA Section */
        #cta {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: var(--text-light);
            text-align: center;
            padding: var(--spacing-lg) 0;
        }

        #cta h2 {
            color: var(--text-light);
            margin-bottom: var(--spacing-md);
        }

        /* Footer */
        footer {
            background: var(--text-dark);
            color: var(--text-light);
            text-align: center;
            padding: var(--spacing-md) 0;
            margin-top: auto; /* Push footer to the bottom */
            font-size: 0.9rem;
        }

        footer p {
            margin: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: var(--spacing-sm);
            }

            nav ul {
                flex-direction: column;
                gap: var(--spacing-xs);
                text-align: center;
                margin-top: var(--spacing-sm);
            }

            nav a::after {
                left: 50%;
                transform: translateX(-50%);
            }

            #hero {
                padding: var(--spacing-md) 0;
                min-height: 50vh;
            }

            #hero h1 {
                font-size: clamp(2rem, 8vw, 3rem);
            }

            h2 {
                font-size: clamp(1.8rem, 7vw, 2.5rem);
            }

            .button {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }

            .feature-grid {
                grid-template-columns: 1fr; /* Stack features on small screens */
            }

            .feature-card {
                padding: var(--spacing-sm);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 var(--spacing-xs);
            }

            header {
                padding: var(--spacing-xs) 0;
            }

            nav a {
                font-size: 0.9rem;
            }

            section {
                padding: var(--spacing-md) 0;
            }
        }
    </style>
</head>

                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero">
            <div class="container">
