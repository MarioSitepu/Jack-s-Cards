    <style>
        /* General Resets */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;

        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); /* Purple to Blue */
            --secondary-gradient: linear-gradient(135deg, #a770ef 0%, #cf8bf3 100%); /* Lighter Purple/Pink */
            --bg-color: #f8f9fa;
            --text-color: #343a40;
            --light-text-color: #ffffff;
            --accent-color: #2575fc;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            scroll-behavior: smooth;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #6a11cb;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            color: var(--light-text-color);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light-text-color);
            margin-right: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: var(--light-text-color);
            font-weight: 600;
            position: relative;
            padding-bottom: 5px;
            transition: opacity 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--light-text-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }
        nav ul li a:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--light-text-color);
            padding: 80px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .hero::before, .hero::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(50px);
        }
        .hero::before {
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
        }
        .hero::after {
            bottom: -70px;
            right: -70px;
            width: 250px;
            height: 250px;
            filter: blur(60px);
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            max-width: 800px;
            opacity: 0.9;
        }

        .project-date {
            font-size: 1rem;
            margin-top: -15px; /* Adjust spacing */
            margin-bottom: 30px; /* Ensure space before button */
            opacity: 0.8;
            font-weight: 300;
        }
        .project-date strong {
            font-weight: 600;
        }

        .btn {
            display: inline-block;
            background: var(--light-text-color);
            color: var(--accent-color);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-medium);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
        }

        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: #f0f2f5;
        }

        section h2 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            font-weight: 700;
            color: #495057;
        }

        section h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        }

</html>
