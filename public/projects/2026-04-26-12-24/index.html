<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Dashboard 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        :root {
            --primary-gradient-start: #4A00E0; /* Deep Purple */
            --primary-gradient-end: #8E2DE2;   /* Vibrant Violet */
            --secondary-color: #A770EF;        /* Lighter Purple */
            --text-dark: #333333;
            --text-light: #f0f0f0;
            --background-light: #ffffff;
            --background-dark: #2c3e50;
            --card-background: rgba(255, 255, 255, 0.95);
            --border-radius-lg: 15px;
            --border-radius-md: 8px;
            --box-shadow-light: 0 10px 30px rgba(0, 0, 0, 0.1);
            --box-shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.15);
            --transition-speed: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--background-light);
            padding: 1.5rem 0;
            box-shadow: var(--box-shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-gradient-start);
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        nav ul li a:hover {
            color: var(--primary-gradient-end);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 6rem 1.5rem;
            color: var(--text-light);
            background: linear-gradient(45deg, var(--primary-gradient-start), var(--secondary-color));
            border-bottom-left-radius: var(--border-radius-lg);
            border-bottom-right-radius: var(--border-radius-lg);
            margin-bottom: 2rem;
            box-shadow: var(--box-shadow-light);
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .hero .project-date {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.8;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to right, #FF5F6D, #FFC371); /* Warm gradient for CTA */
            color: var(--text-light);
            padding: 0.9rem 2.2rem;
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: 600;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 8px 20px rgba(255, 95, 109, 0.4);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 95, 109, 0.5);
        }

        /* Main Content Sections */
        main {
            flex-grow: 1;
            padding-bottom: 3rem;
        }

        section {
            padding: 3rem 0;
            margin-bottom: 2rem;
        }

        section h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--background-light); /* White for contrast */
            position: relative;
            padding-bottom: 0.5rem;
        }

        section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--secondary-color);
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--card-background);
            padding: 2.5rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--box-shadow-light);
            text-align: center;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            color: var(--text-dark);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--box-shadow-hover);
        }

        .feature-card i {
            font-size: 3rem;
            color: var(--primary-gradient-end);
            margin-bottom: 1.5rem;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-gradient-start);
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

        /* About Section */
        .about-content {
            display: flex;
            align-items: center;
            gap: 3rem;
            background: var(--card-background);
            padding: 3rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--box-shadow-light);
            color: var(--text-dark);
        }

        .about-text {
            flex: 1;
        }

        .about-text h3 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary-gradient-start);
        }

        .about-text p {
            margin-bottom: 1rem;
            color: #555;
        }

        .about-image {
            flex: 1;
            text-align: center;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-md);
            box-shadow: var(--box-shadow-light);
        }

        /* CTA Section */
        .cta {
            text-align: center;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-gradient-start));
            padding: 4rem 1.5rem;
            border-radius: var(--border-radius-lg);
            margin-top: 4rem;
            box-shadow: var(--box-shadow-light);
            color: var(--text-light);
        }

        .cta h2 {
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .cta h2::after {
            background: var(--text-light);
        }

        .cta p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }

        /* Footer */
        footer {
            background: var(--background-dark);
            color: var(--text-light);
            text-align: center;
            padding: 2.5rem 0;
            margin-top: 3rem;
            font-size: 0.9rem;
            border-top-left-radius: var(--border-radius-lg);
            border-top-right-radius: var(--border-radius-lg);
        }

        footer p {
            margin: 0;
            opacity: 0.8;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .hero h1 {
                font-size: 2.8rem;
            }
            .hero p {
                font-size: 1.1rem;
            }
            section h2 {
                font-size: 2rem;
            }
            .about-content {
                flex-direction: column;
                text-align: center;
            }
            .about-image {
                margin-top: 2rem;
            }
            nav ul li {
                margin-left: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 1rem;
            }
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }
            nav ul li {
                margin: 0.5rem 1rem;
            }
            .hero {
                padding: 4rem 1rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .btn {
                padding: 0.8rem 1.8rem;
                font-size: 0.9rem;
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .feature-card {
                padding: 2rem;
            }
            .about-content {
                padding: 2rem;
            }
            .cta {
                padding: 3rem 1.5rem;
            }
            .cta p {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }
            nav ul li {
                margin: 0.5rem 0.8rem;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .hero p {
                font-size: 0.9rem;
            }
            section h2 {
                font-size: 1.8rem;
            }
            .feature-card h3 {
                font-size: 1.3rem;
            }
            .about-text h3 {
                font-size: 1.6rem;
            }
        }
    </style>
