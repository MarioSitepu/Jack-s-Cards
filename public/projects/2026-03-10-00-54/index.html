<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureTech Innovations - Project 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CSS Variables */
        :root {
            --primary-bg: #1a1a2e; /* Dark background */
            --secondary-bg: #16213e; /* Slightly lighter dark */
            --accent-gradient-start: #4facfe; /* Blue */
            --accent-gradient-end: #00f2fe; /* Cyan */
            --text-light: #e0e0e0;
            --text-dark: #333;
            --header-height: 80px;
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            --transition-speed: 0.3s ease;
        }

        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            color: var(--text-light);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            font-weight: 600;
        }

        a {
            color: var(--accent-gradient-end);
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        a:hover {
            color: var(--accent-gradient-start);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 15px 0;
            box-shadow: var(--box-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 5px rgba(79, 172, 254, 0.4);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-light);
            font-weight: 400;
            font-size: 1.1em;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            transition: width var(--transition-speed);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height));
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 10% 10%, rgba(79, 172, 254, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.1) 0%, transparent 50%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.6);
        }

        .hero p {
            font-size: 1.3em;
            margin-bottom: 30px;
            color: var(--text-light);
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            border-radius: var(--border-radius-md);
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            color: var(--primary-bg);
            font-weight: 600;
            font-size: 1.1em;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* Section Styling */
        section {
            padding: 80px 0;
            background-color: var(--primary-bg);
        }

        section:nth-of-type(even) {
            background-color: var(--secondary-bg);
        }

        .section-title {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 60px;
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .feature-item {
            background-color: var(--primary-bg);
            padding: 30px;
            border-radius: var(--border-radius-md);
            box-shadow: var(--box-shadow);
            text-align: center;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-gradient-end);
        }

        .feature-item i { /* Assuming font-awesome or similar */
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

            font-
