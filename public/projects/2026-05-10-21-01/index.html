<!DOCTYPE html>

        /* CSS Variables */
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #00d4ff;
            --text-color-light: #f0f0f0;
            --text-color-dark: #333;
            --background-gradient: linear-gradient(to right top, #6a11cb, #2575fc);
            --secondary-gradient: linear-gradient(to right top, #00d4ff, #47e2b1);
            --light-background: #ffffff;
            --dark-background: #1a1a2e;
            --card-background: #ffffff;
            --border-radius: 12px;
            --shadow-light: 0 5px 20px rgba(0, 0, 0, 0.08);
            --shadow-dark: 0 10px 30px rgba(0, 0, 0, 0.2);
            --transition-fast: all 0.3s ease-in-out;
        }

        /* Base Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.6;
            color: var(--text-color-light);
            background: var(--background-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            font-weight: 700;
            line-height: 1.2;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        a:hover {
            color: var(--text-color-light);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-dark);
            backdrop-filter: blur(10px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, var(--accent-color), var(--text-color-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-color-light);
            font-weight: 600;
            position: relative;
            opacity: 0.8;
        }

        nav ul li a:hover {
            opacity: 1;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: var(--transition-fast);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            background: var(--background-gradient);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 20px;
            background: -webkit-linear-gradient(45deg, var(--accent-color), var(--text-color-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: var(--secondary-gradient);
            color: var(--light-background);
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition-fast);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right top, #47e2b1, #00d4ff);
        }

        /* Main Content Sections */
        main {
            padding: 80px 0;
            background: var(--light-background);
            color: var(--text-color-dark);
        }

        section {
            padding: 60px 0;
        }

        section:nth-of-type(even) {
            background: #f8f8f8;
        }

        .section-title {
            text-align: center;
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 60px;
            color: var(--primary-color);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--secondary-color);
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .feature-card {
            background: var(--card-background);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-light);
            text-align: center;
            transition: var(--transition-fast);
            color: var(--text-color-dark);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .feature-card .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-color-dark);
        }

        /* About Section */
        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }

        .about-text, .about-image {
            flex: 1;
            min-width: 300px;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-light);
        }

        /* CTA Section */
        .cta {
            background: var(--background-gradient);
            color: var(--text-color-light);
            text-align: center;
            padding: 80px 0;
        }

        .cta h2 {
            color: var(--text-color-light);
            margin-bottom: 30px;
        }

        /* Footer */
        footer {
            background: var(--dark-background);
            color: rgba(255, 255, 255, 0.7);
            padding: 40px 0;
            text-align: center;
            margin-top: auto;
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .footer-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .footer-nav a {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        .footer-nav a:hover {
            color: var(--accent-color);
        }

                flex-wrap: wrap;
                justify-content: center;
