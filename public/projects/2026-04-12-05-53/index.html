<!DOCTYPE html>
<html lang="en">

    <title>Modern Project Dashboard - 2026</title>

        /* General Styles */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(135deg, #FF6B6B 0%, #FFA447 100%);
            --bg-color-light: #f8f9fa;
            --text-color-dark: #333;
            --text-color-light: #fff;
            --card-bg: #ffffff;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.08);

        body {
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--text-color-dark);
            background: var(--bg-color-light);
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
            font-weight: 700;
            color: var(--text-color-dark);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            padding: 15px 0;
            color: var(--text-color-light);
            box-shadow: var(--shadow-light);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        .logo {
            font-size: 1.8em;
            font-weight: 800;
            color: var(--text-color-light);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: var(--text-color-light);
            font-weight: 600;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background-color: var(--text-color-light);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-color-light);

            animation: rotateBackground 20s linear infinite;
        }

        @keyframes rotateBackground {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: var(--text-color-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: relative; /* To bring text above pseudo-element */
            z-index: 1;
        }

        .hero p {
            font-size: 1.3em;
            margin-bottom: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--text-color-light);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--shadow-light);
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        /* Section Styling */
        section {
            padding: 80px 0;
            background-color: var(--bg-color-light);
        }

        section:nth-of-type(even) {
            background-color: #f0f2f5; /* Slightly different background for contrast */
        }

        .section-title {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 60px;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        /* Features/Services Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .feature-card .icon {
            font-size: 3em;
            margin-bottom: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; /* Required for clip to work */
        }

        .feature-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        /* Project Info Section */
        .project-info {
            text-align: center;
            padding: 60px 0;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); /* Lighter gradient for this section */
            color: #333;
        }

        .project-info h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .project-info p {
            font-size: 1.2em;
            max-width: 700px;
            margin: 0 auto 30px auto;
        }

        .project-info .date {
            font-size: 1.8em;
            font-weight: 700;
            color: #1a1a1a;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: var(--shadow-light);
            margin-top: 20px;
        }

        /* CTA Section */
        .cta-section {
            background: var(--secondary-gradient);
            color: var(--text-color-light);
            text-align: center;
            padding: 100px 0;
        }

        .cta-section h2 {
            color: var(--text-color-light);
            font-size: 3em;
            margin-bottom: 30px;
        }

        .cta-section .btn {
            background: var(--primary-gradient); /* Inverted gradient for contrast */
            box-shadow: var(--shadow-hover);
        }

        /* Footer */
        footer {
            background-color: #222;
            color: #bbb;
            text-align: center;
            padding: 30px 0;
            font-size: 0.9em;
        }

        footer p {
            margin: 5px 0;
        }

        footer a {
            color: #fff;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        footer a:hover {
