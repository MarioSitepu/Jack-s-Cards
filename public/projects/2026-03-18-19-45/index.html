<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future-Ready Project</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        /* Basic Reset & Body Styles */
        :root {
            --primary-color: #2c3e50; /* Dark Blue-Gray */
            --accent-color: #3499db; /* Bright Blue */
            --light-color: #ecf0f1; /* Off-white */
            --gradient-start: #8e44ad; /* Purple */
            --gradient-end: #3498db; /* Blue */
            --text-dark: #333;
            --text-light: #f4f4f4;
            --card-bg: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--light-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Navigation */
        header {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-medium);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers not supporting background-clip: text */
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        /* Main Content Styling */
        main {
            flex: 1;
        }

        .hero-section {
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            color: var(--text-light);
            text-align: center;
            padding: 6rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero-section p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .btn {
            display: inline-block;
            background-color: var(--light-color);
            color: var(--primary-color);
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-light);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-medium);
            background-color: var(--accent-color);
            color: var(--text-light);
        }

        .btn.secondary-btn {
            background: var(--primary-color);
            color: var(--text-light);
            border: 2px solid var(--primary-color);
        }

        .btn.secondary-btn:hover {
            background: var(--gradient-end);
            border-color: var(--gradient-end);
        }

        .content-section {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .content-section h2 {
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            color: var(--primary-color);
            position: relative;
            display: inline-block;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card h3 {
            font-size: 1.7rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        .feature-card p {
            color: var(--text-dark);
            font-size: 1.1rem;
        }

        .about-section p {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-dark);
        }

        .cta-section {
            background: var(--primary-color);
            color: var(--text-light);
            text-align: center;
            padding: 5rem 2rem;
        }

        .cta-section h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }

        .cta-section p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Footer */
        footer {
            background: var(--primary-color);
            color: var(--text-light);
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            margin-top: auto;
            box-shadow: 0 -2px 10px var(--shadow-medium);
        }

        footer p {
            margin: 0.5rem 0;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                padding: 0 1rem;
            }

            nav .logo {
                margin-bottom: 1rem;
            }

            nav ul {
                flex-direction: column;
                width: 100%;
                text-align: center;
            }

            nav ul li {
                margin: 0.5rem 0;
            }

            .hero-section {
                padding: 4rem 1rem;
                min-height: unset;
            }

            .hero-section h1 {
                font-size: 2.5rem;
            }

            .hero-section p {
                font-size: 1.2rem;
            }

            .content-section {
                padding: 3rem 1rem;
            }

            .content-section h2 {
                font-size: 2rem;
            }

            .features
