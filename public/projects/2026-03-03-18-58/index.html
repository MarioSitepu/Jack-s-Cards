<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-color: #3498db; /* Bright Blue */
            --secondary-color: #8e44ad; /* Purple */
            --accent-color: #2ecc71; /* Green */
            --dark-bg: #1a2a3a; /* Very Dark Blue */
            --darker-bg: #2c3e50; /* Dark Blue-Grey */
            --text-color: #ecf0f1; /* Off-White */
            --light-text-color: #bdc3c7; /* Light Grey */
            --gradient-body: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            --gradient-button: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            --gradient-button-hover: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
            --border-radius: 8px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            background: var(--gradient-body);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--text-color);
        }

        h1 { font-size: clamp(2.5rem, 5vw, 4rem); }
        h2 { font-size: clamp(2rem, 4vw, 3rem); }
        h3 { font-size: clamp(1.5rem, 3vw, 2rem); }

        p {
            margin-bottom: 1rem;
            color: var(--light-text-color);
        }

        /* Header */
        header {
            background: rgba(var(--darker-bg), 0.8);
            backdrop-filter: blur(10px);
            padding: var(--spacing-md) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        nav a {
            color: var(--light-text-color);
            font-weight: 600;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--text-color);
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
            background: var(--secondary-color);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: var(--spacing-sm);
            margin-right: var(--spacing-sm);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .primary-btn {
            background: var(--gradient-button);
            color: var(--text-color);
        }

        .primary-btn:hover {
            background: var(--gradient-button-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .secondary-btn {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .secondary-btn:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        /* Main Sections */
        main {
            flex-grow: 1;
        }

        section {
            padding: var(--spacing-lg) 0;
            text-align: center;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            padding: var(--spacing-lg) 0 6rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            color: var(--text-color);
        }

        .hero-section h1 {
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto var(--spacing-md) auto;
            color: var(--light-text-color);
        }

        .hero-section p span {
            font-weight: 700;
            color: var(--accent-color);
        }

        .features-section {
            background-color: var(--dark-bg);
            padding: var(--spacing-lg) 0;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .feature-item {
            background: var(--darker-bg);
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .feature-item .icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-sm);
            display: block;
            color: var(--primary-color);
        }

        .feature-item h3 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .feature-item p {
            font-size: 0.95rem;
            color: var(--light-text-color);
        }

        .about-section {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            padding: var(--spacing-lg) 0;
        }

        .about-section p {
            max-width: 800px;
            margin: 0 auto var(--spacing-sm) auto;
            font-size: 1.1rem;
        }

        .about-section strong {
            color: var(--accent-color);
        }

        .cta-section {
            background: var(--darker-bg);
            padding: var(--spacing-lg) 0;
        }

        .cta-section h2 {
            color: var(--text-color);
        }

        .cta-section p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto var(--spacing-md) auto;
        }

        /* Footer */
        footer {
            background: var(--dark-bg);
            color: var(--light-text-color);
            padding: var(--spacing-md) 0;
            text-align: center;
            border-top: 1px solid rgba(var(--light-text-color), 0.1);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .footer-content p {
            margin: 0;
            font-size: 0.9rem;
        }

        .social-links a {
            color: var(--light-text-color);
            margin: 0 0.8rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--primary-color);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: var(--spacing-sm);
            }

            nav ul {
                flex-direction: column;
                gap: 0.5rem;
            }

            nav a {
                padding: 0.5rem 1rem;
                display: block;
                text-align: center;
            }

            .hero-section {
                padding: var(--spacing-lg) var(--spacing-sm);
            }

            .hero-section h1 {
                font-size: clamp(2rem, 8vw, 3rem);
            }

            .hero-section p {
                font-size: 1rem;
            }

            .btn {
                display: block;
                width: 100%;
                margin-right: 0;
                margin-bottom: var(--spacing-sm);
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .feature-item {
                padding: var(--spacing-md) var(--spacing-sm);
            }

            .footer-content {
                flex-direction: column;
            }

            .social-links {
                margin-top: var(--spacing-sm);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 var(--spacing-sm);
            }

            h1 { font-size: 2rem; }
            h2 { font-size: 1.8rem; }
            h3 { font-size: 1.4rem; }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }

            .logo {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">Project 2026</div>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">
</body>
</html>
