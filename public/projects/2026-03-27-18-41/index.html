<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg-start: #e0f2f7; /* Light blue */
            --primary-bg-end: #e8f5e9;   /* Light green */
            --accent-gradient-start: #6a11cb; /* Deep purple */
            --accent-gradient-end: #2575fc;   /* Bright blue */
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --card-bg: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-lg: 15px;
            --border-radius-md: 10px;
            --header-height: 80px;
        }

        /* Base Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            line-height: 1.6;
            background: linear-gradient(135deg, var(--primary-bg-start) 0%, var(--primary-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            margin-top: 0;
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: var(--accent-gradient-end);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-gradient-start);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--card-bg);
            box-shadow: 0 2px 10px var(--shadow-light);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers that don't support text-fill-color */
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            font-weight: 600;
            color: var(--text-dark);
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 40px 0;
        }

        section {
            padding: 60px 0;
            margin-bottom: 20px;
        }

        section:last-of-type {
            margin-bottom: 0;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 0;
            background: radial-gradient(circle at top left, var(--primary-bg-start) 0%, transparent 70%),
                        radial-gradient(circle at bottom right, var(--primary-bg-end) 0%, transparent 70%);
            background-blend-mode: screen;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(80px);
            z-index: -1;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--accent-gradient-end), var(--accent-gradient-start));
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(100px);
            z-index: -1;
        }


        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            color: var(--text-dark);
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            border-radius: var(--border-radius-md);
            background: linear-gradient(45deg, var(--accent-gradient-start) 0%, var(--accent-gradient-end) 100%);
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px var(--shadow-medium);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-medium);
        }

        .project-date {
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            opacity: 0.8;
        }

        /* Feature Section */
        .features {
            background-color: var(--card-bg);
            box-shadow: 0 5px 20px var(--shadow-light);
            border-radius: var(--border-radius-lg);
            padding: 80px 0;
            margin-top: -60px; /* Overlap with hero for visual flow */
            position: relative;
            z-index: 1;
        }

        .features h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            background: linear-gradient(45deg, var(--accent-gradient-end), var(--accent-gradient-start));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .feature-card {
            background-color: var(--primary-bg-start);
            padding: 30px;
            border-radius: var(--border-radius-md);
            box-shadow: 0 4px 15px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Subtle border for depth */
</body>
</html>
