        /* CSS Variables for easy theming */
        :root {
            --primary-bg-start: #e0f2f7; /* Light Blue */
            --primary-bg-end: #e8eaf6;   /* Light Purple */
            --secondary-bg: #ffffff;
            --text-color: #333d47;
            --accent-color: #4a90e2; /* Vibrant Blue */
            --accent-gradient-start: #4a90e2;
            --accent-gradient-end: #50e3c2; /* Teal */
            --border-color: #e0e0e0;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --font-family-primary: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --max-width: 1200px;
            --header-height: 80px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family-primary);
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-bg-start), var(--primary-bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            box-shadow: 0 2px 10px var(--shadow-light);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;

        }

            font-size: 1.8rem;
            font-weight: bold;

            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        /* Main Content */
        main {
            flex: 1;

        section {
            padding: 60px 0;

        section:nth-of-type(odd) {

        section:not(:first-of-type) {
             margin-top: 40px;
        }

        h1, h2, h3 {
            color: var(--text-color);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            border-radius: 2px;
        }

        p {
            margin-bottom: 15px;
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 0;
            background: linear-gradient(45deg, var(--accent-gradient-start) 0%, var(--accent-gradient-end) 100%);
            color: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px var(--shadow-medium);
            margin-bottom: 60px;
        }

        .hero h1 {
            color: #fff;
            font-size: 4rem;
        }

        .hero p {
            color: rgba(255, 255, 255, 0.9);
            max-width: 700px;
            margin: 0 auto 40px;
            font-size: 1.3rem;
        }

        /* Feature Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
            text-align: left;
        }

        .feature-card {
            background-color: var(--secondary-bg);

            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--shadow-medium);
        }

            font-size: 1.6rem;
