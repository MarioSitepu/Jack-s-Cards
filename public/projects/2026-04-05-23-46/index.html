<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Dashboard</title>
    <style>
        /* General Body & Reset */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(to right, #e0eafc, #cfdef3); /* Light gradient for overall background */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        :root {
            --primary-gradient-start: #4e54c8; /* Deep blue/purple */
            --primary-gradient-end: #8f94fb; /* Lighter blue/purple */
            --secondary-gradient-start: #00c6ff; /* Sky blue */
            --secondary-gradient-end: #0072ff; /* Deeper blue */
            --text-light: #f0f0f0;
            --text-dark: #333;
            --accent-color: #ff7e5f; /* Warm contrast for buttons/highlights */
            --dark-bg-text: #fff;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        /* Header */
        header {
            background: linear-gradient(to right, var(--primary-gradient-start), var(--primary-gradient-end));
            color: var(--dark-bg-text);
            padding: 1rem 0;
            box-shadow: var(--shadow-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            flex-wrap: wrap; /* Allow items to wrap on smaller screens */
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-right: auto; /* Push nav items to the right */
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap; /* Allow nav links to wrap */
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul a {
            color: var(--dark-bg-text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
            display: block;
            padding: 0.5rem 0;
        }

        nav ul a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .nav-button {
            background: linear-gradient(to right, var(--secondary-gradient-start), var(--secondary-gradient-end));
            color: var(--dark-bg-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-left: 2rem; /* Space from nav links */
        }

        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            color: var(--dark-bg-text);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 80vh; /* viewport height */
            padding: 2rem;
            box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.1);
            flex-grow: 1; /* Allow hero to take available space */
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .hero-content p span {
            font-weight: bold;
            color: var(--accent-color);
        }

        .cta-button {
            background: linear-gradient(to right, var(--accent-color), #ff9a8d); /* A slightly different gradient for CTA */
            color: var(--dark-bg-text);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 700;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        /* Main Content Sections */
        main {
            flex-grow: 1; /* Allow main to take available space */
        }

        main section {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        main section h2 {
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            color: var(--text-dark);
            position: relative;
            display: inline-block;
        }

        main section h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, var(--secondary-gradient-start), var(--secondary-gradient-end));
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* Features Section */
        .features-section {
            background-color: var(--text-light); /* Lighter background for contrast */
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-gradient-start);
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

        /* About Section */
        .about-section {
            background: linear-gradient(to right, #f8f9fa, #e9ecef); /* Another light gradient */
            color: var(--text-dark);
        }

        .about-section p {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 1rem auto;
            text-align: center;
            color: #444;
        }

        /* Contact Section */
        .contact-section {
            background: linear-gradient(135deg, var(--secondary-gradient-start) 0%, var(--secondary-gradient-end) 100%);
            color: var(--dark-bg-text);
            padding: 5rem 2rem;
        }

        .contact-section h2 {
            color: var(--dark-bg-text);
        }

        .contact-section h2::after {
            background: var(--accent-color);
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
            margin: 2.5rem auto 0;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 1rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background-color: rgba(255
