<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureTech Project 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        :root {
            --primary-bg: #0f0f1a;
            --secondary-bg: #1a1a2e;
            --text-color: #e0e0e0;
            --accent-color-1: #6a11cb; /* Purple */
            --accent-color-2: #2575fc; /* Blue */
            --gradient-1: linear-gradient(to right, var(--accent-color-1) 0%, var(--accent-color-2) 100%);
            --gradient-2: linear-gradient(to right, #1ddb6e 0%, #17a2b8 100%); /* Green to Teal */
            --shadow-color: rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease, background-image 0.3s ease;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--gradient-1);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-bg);
            text-align: center;
            padding: 8rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 80%, rgba(106, 17, 203, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(37, 117, 252, 0.15) 0%, transparent 50%);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            color: #c0c0c0;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--gradient-2);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(29, 219, 110, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(29, 219, 110, 0.6);
        }

        /* Sections */
        section {
            padding: 6rem 0;
            background-color: var(--secondary-bg);
            margin-bottom: 2px; /* Small separator */
        }

        section:nth-of-type(even) {
            background-color: var(--primary-bg);
        }

        h2 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-item {
            background-color: var(--secondary-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: 0 5px 15px var(--shadow-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient-1);
            transition: height 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--shadow-color);
        }

        .feature-item:hover::before {
            height: 100%;
            opacity: 0.1;
        }

        .feature-item h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            position: relative;
            z-index: 1;
        }

        .feature-item p {
            color: #c0c0c0;
            position: relative;
            z-index: 1;
        }

        /* About Section */
        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 3rem;
            justify-content: center;
        }

        .about-text {
            flex: 1 1 500px;
            max-width: 600px;
        }

        .about-text h3 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: left;
        }

        .about-text p {
            margin-bottom: 1rem;
            color: #c0c0c0;
        }

        .about-image {
            flex: 1 1 300px;
            max-width: 400px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow-color);
            background: var(--gradient-1); /* Placeholder for image, or a gradient box */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: var(--border-radius);
            opacity: 0.8; /* If you use an actual image, blend it with the gradient */
        }

        /* Footer */
        footer {
            background-color: var(--secondary-bg);
            color: #a0a0a0;
            text-align: center;
            padding: 3rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer p {
            margin: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
            }

            nav ul {
                margin-top: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav ul li {
                margin: 0.5rem 1rem;
            }

            .hero {
                padding: 6rem 0;
                min-height: 60vh;
            }

            .hero h1 {
                font-size: 2.8rem;
            }

            .hero p {
                font-size: 1.2rem;
            }

            h2 {
                font-size: 2.5rem;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }

            .about-content {
                flex-direction: column;
            }

            .about-text, .about-image {
                max-width: 100%;
                text-align: center;
            }

            .about-text h3 {
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .btn {
                padding: 0.8rem 2rem;
                font-size: 0.9rem;
            }

            h2 {
                font-size: 2rem;
            }

            .feature-item {
                padding: 1.5rem;
            }

            .feature-item h3 {
                font-size: 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">FutureTech</a>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Unleash Tomorrow's Potential Today</h1>
                <p>Driving innovation with cutting-edge solutions for a brighter future.</p>
                <p>Project Date: <span style="background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600;">2026-04-26</span></p>
                <a href="#features" class="btn">
