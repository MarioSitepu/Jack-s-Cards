<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase - 2026</title>
    <style>
        /* General Styling */
        :root {
            --primary-color: #6A00FF; /* Deep Purple */
            --secondary-color: #00C4FF; /* Vibrant Cyan */
            --gradient-start: #6A00FF;
            --gradient-end: #4A00B7;
            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #f9f9f9;
            --bg-dark: #2c3e50; /* For footer or darker sections */
            --card-bg: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.2);
        }

        /* Basic Reset & Box-Sizing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body & Typography */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            scroll-behavior: smooth;
        }

        /* Container for Centering Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styling */
        header {
            background: var(--bg-dark); /* Dark background for header */
            color: var(--text-light);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--secondary-color), var(--text-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; /* Standard property */
            color: transparent; /* Fallback for older browsers */
        }

        header nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        header nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        header nav a:hover {
            color: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* Button Styling */
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: var(--text-light);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, var(--gradient-end), var(--gradient-start)); /* Invert gradient on hover */
        }

        /* Section Base Styling */
        section {
            padding: 80px 0;
            text-align: center;
        }

        section h2, section h3 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        section p {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto 30px auto;
            line-height: 1.8;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--text-light);
            padding: 120px 0;
        }

        .hero-section h2 {
            font-size: 3.5rem;
            margin-bottom: 25px;
            color: var(--text-light);
            text-shadow: 0 2px 5px var(--shadow-medium);
        }

        .hero-section p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            color: var(--text-light);
            opacity: 0.9;
        }

        /* Feature Section */
        .feature-section {
            background-color: var(--bg-light);
            padding-top: 60px; /* Slightly less padding at top */
        }
        .feature-section h3 {
            color: var(--text-dark);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .feature-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .feature-item .icon {
            font-size: 3rem;
            color: var(--primary-color); /* Fallback */
            margin-bottom: 20px;
            display: inline-block;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .feature-item h4 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .feature-item p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0;
        }

        /* About Section */
        .about-section {
            background-color: #f0f4f8; /* Slightly different light background */
        }
        .about-section h3 {
            color: var(--text-dark);
        }
        .about-section p {
            color: #555;
            margin-bottom: 20px;
        }

        /* Services Section */
        .services-section {
            background-color: var(--bg-light);
        }
        .services-section h3 {
            color: var(--text-dark);
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .service-item {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            border-left: 5px solid var(--primary-color); /* Accent border */
        }

        .service-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .service-item h4 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .service-item p {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 0;
            max-width: none; /* Override section p max-width */
        }

        /* Contact Section */
        .contact-section {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #34495e 100%); /* Darker gradient */
            color: var(--text-light);
        }
        .contact-section h3 {
            color: var(--text-light);
        }
        .contact-section p {
            color: var(--text-light);
            opacity: 0.9;
        }

        .contact-form {
            max-width: 600px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--text-dark);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 196, 255, 0.2);
            outline: none;
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Footer Styling */
        footer {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 40px 0;
            font-size: 0.9rem;
            text-align: center;
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        footer p {
            margin: 0;
            color: #bbb;
        }

        .social-links {
            display: flex;
            gap: 20px;
        }

        .social-links a {
            color: var(--text-light);
            font-size: 1.5rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--secondary-color);
            transform: translateY(-3px);
        }

        @media (max-width: 992px) {
