<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-bg-start: #283048; /* Dark Blue/Purple */
            --primary-bg-end: #859398;   /* Light Grey/Blue */
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #f0f4f8;
            --heading-color: #ffffff;
            --accent-color: #00c6ff;     /* Vibrant Blue */
            --button-hover-color: #0093d9;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --border-radius: 10px;
            --max-width: 1200px;
            --padding-section: 4rem 2rem;
            --spacing-medium: 1.5rem;
            --spacing-large: 2.5rem;
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-bg-start) 0%, var(--primary-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Typography */
        h1, h2, h3, h4 {
            color: var(--heading-color);
            margin-bottom: var(--spacing-medium);
            font-weight: 600;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 600;
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--button-hover-color);
        }

        /* Layout */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem 0;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--heading-color);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-medium);
        }

        nav a {
            color: var(--heading-color);
            font-weight: 400;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            transition: background 0.3s ease, color 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--accent-color);
            color: var(--heading-color);
        }

        /* Main Sections */
        main {
            flex: 1;
        }

        section {
            padding: var(--padding-section);
            margin-bottom: 2rem;
        }

        .hero {
            text-align: center;
            padding: var(--padding-section);
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            margin-bottom: 0; /* No margin-bottom for hero */
        }

        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--accent-color), #a2d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .hero p {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 0 auto 2.5rem auto;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: var(--heading-color);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
        }

        .btn:hover {
            background: var(--button-hover-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.6);
        }

        .section-title {
            text-align: center;
            margin-bottom: var(--spacing-large);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-medium);
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            padding: var(--spacing-large);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px var(--shadow-color);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        .card p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .status-section .card {
            text-align: center;
        }

        .status-section .date {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--accent-color), #a2d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .status-section .label {
            font-size: 1.2rem;
            opacity: 0.9;
            display: block;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.2);
            padding: 2rem 0;
            text-align: center;
            margin-top: var(--spacing-large);
            box-shadow: 0 -2px 10px var(--shadow-color);
            backdrop-filter: blur(5px);
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            h1 {
                font-size: 3.5rem;
            }
            h2 {
                font-size: 2rem;
            }
            .hero p {
                font-size: 1.2rem;
            }
            .card-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
            nav ul {
                gap: 1rem;
            }
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }
            header .logo {
                margin-bottom: 1rem;
            }
            nav ul {
                flex-direction: column;
                gap: 0.5rem;
                width: 100%;
            }
            nav li {
                width: 100%;
            }
            nav a {
                display: block;
                width: 100%;
            }
            h1 {
                font-size: 2.8rem;
            }
            h2 {
                font-size: 1.8rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .btn {
                padding: 0.8rem 2rem;
                font-size: 0.9rem;
            }
            .status-section .date {
                font-size: 2rem;
            }
            .status-section .label {
                font-size:
