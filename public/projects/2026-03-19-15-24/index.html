<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future-Forward Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* General styles */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%); /* Deep Purple */
            --secondary-gradient: linear-gradient(135deg, #d81b60 0%, #8e24aa 100%); /* Pink to Purple */
            --accent-color: #00bcd4; /* Teal */
            --text-light: #e0e0e0;
            --text-dark: #333;
            --bg-dark: #1e1e2f; /* Dark background */
            --card-bg-light: rgba(255, 255, 255, 0.05); /* Semi-transparent white for cards on dark bg */
            --border-radius-lg: 15px;
            --border-radius-sm: 8px;
            --box-shadow-light: 0 10px 30px rgba(0, 0, 0, 0.2);
            --box-shadow-dark: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
            text-align: center;
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-light);
        }

        h1 {
            font-size: 3.5em;
            line-height: 1.2;
        }

        h2 {
            font-size: 2.5em;
            margin-bottom: 40px;
        }

        h3 {
            font-size: 1.8em;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1em;
            color: var(--text-light);
        }

        a {
            text-decoration: none;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: #00e5ff; /* Lighter teal */
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 15px 0;
            box-shadow: var(--box-shadow-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00bcd4, #00e5ff); /* Teal gradient for logo */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.1em;
            position: relative;
            padding: 5px 0;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 15px 30px;
            border-radius: var(--border-radius-lg);
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
        }

        .primary-btn {
            background: var(--secondary-gradient);
            color: var(--text-light);
            box-shadow: var(--box-shadow-dark);
        }

        .primary-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .secondary-btn {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .secondary-btn:hover {
            background: var(--accent-color);
            color: var(--bg-dark); /* Dark text on hover */
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 188, 212, 0.3);
        }

        /* Hero Section */
        .hero-section {
            background: var(--bg-dark); /* Dark background for hero */
            padding: 150px 0;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 10% 10%, rgba(106, 27, 154, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(216, 27, 96, 0.2) 0%, transparent 50%);
            z-index: 1;
        }

        .hero-section .container {
            position: relative;
            z-index: 2;
        }

        .hero-section h1 {
            font-size: 4.5em;
            margin-bottom: 25px;
            background: linear-gradient(45deg, #FFD700, #FFA07A); /* Gold to Light
