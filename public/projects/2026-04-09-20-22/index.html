<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa; /* Light background */
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 1rem;
            color: #2c3e50; /* Darker heading color */
        }

        h1 { font-size: 2.8rem; }
        h2 { font-size: 2.2rem; }
        h3 { font-size: 1.6rem; }

        p {
            margin-bottom: 1rem;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Gradient header */
            color: #fff;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: #fff;
            transition: width 0.3s ease;
        }

        nav ul li a:hover {
            color: #e0e0e0;
            transform: translateY(-2px);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); /* Stronger gradient for hero */
            color: #fff;
            text-align: center;
            padding: 8rem 2rem;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.2);
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-content p {
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }

        .cta-button {
            background: linear-gradient(to right, #00c6ff 0%, #0072ff 100%); /* Button gradient */
            color: #fff;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: inline-block; /* Ensures padding and shadow work */
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #0072ff 0%, #00c6ff 100%); /* Invert gradient on hover */
        }

        /* Content Sections */
        .content-section {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .content-section:nth-of-type(even) {
            background-color: #f0f2f5; /* Subtle alternating background */
        }

        .content-section h2 {
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            border-radius: 5px;
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid transparent; /* For a subtle colored top border */
            border-image: linear-gradient(to right, #6a11cb, #2575fc) 1; /* Gradient border */
            border-image-slice: 1;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            color: #2575fc; /* Feature title color */
            margin-bottom: 1rem;
        }

        /* About Section */
        .about-section p {
            max-width: 800px;
            margin: 0 auto 1.5rem auto;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
        }

        /* Contact Section */
        .contact-section {
            background: linear-gradient(to top, #eef2f3 0%, #8e9eab 100%); /* Light gradient background */
            padding-bottom: 8rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
            margin: 3rem auto 0 auto;
            background-color: #fff;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #2575fc;
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.2);
        }

        .contact-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Footer */
        footer {
            background: #2c3e50; /* Dark footer */
            color: #ecf0f1;
            padding: 3rem 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        footer p {
            margin-bottom: 1rem;
        }

        .social-links a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 0.8rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: #2575fc; /* Accent color on hover */
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.8rem; }
            .hero-content { padding: 0 1rem; }
            .hero-content h1 { font-size: 2.8rem; }
            .hero-content p { font-size: 1.1rem; }
            .features-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            nav { flex-direction: column; }
            nav .logo { margin-bottom: 1rem; }
            nav ul { margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
            nav ul li { margin: 0.5rem 1rem; }

            .hero-section { padding: 6rem 1rem; min-height: 50vh; }
            .hero-content h1 { font-size: 2.2rem; }
            .hero-content p { font-size: 1rem; }
            .cta-button { padding: 0.8rem 2rem; font-size: 1rem; }

            .content-section { padding: 4rem 1rem; }
            .content-section h2 { font-size: 1.8rem; margin-bottom: 2rem; }
            .features-grid {
                grid-template-columns: 1fr; /* Stack features on mobile */
            }
            .feature-card { padding: 2rem; }
            .contact-form { padding: 2rem; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }
            h3 { font-size: 1.4rem; }
