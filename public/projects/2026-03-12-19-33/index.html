<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Web Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-bg: #f8f9fa;
            --secondary-bg: #ffffff;
            --text-color: #343a40;
            --heading-color: #212529;
            --accent-color-1: #6a0dad; /* Dark Purple */
            --accent-color-2: #8a2be2; /* Blue Violet */
            --accent-color-3: #9370db; /* Medium Purple */
            --gradient-start: #6a0dad;
            --gradient-end: #8a2be2;
            --button-text-color: #ffffff;
            --border-radius: 8px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s ease;
        }

        /* Base styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            color: var(--accent-color-2);
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        a:hover {
            color: var(--accent-color-1);
        }

        /* Headings */
        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-top: 0;
            margin-bottom: 0.5em;
            font-weight: 600;
        }

        h1 { font-size: 3em; font-weight: 700; }
        h2 { font-size: 2.5em; font-weight: 600; margin-bottom: 1em; }
        h3 { font-size: 1.8em; font-weight: 600; }

        section {
            padding: 80px 0;
            text-align: center;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            transition: all var(--transition-speed);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow);
        }

        .primary-btn {
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: var(--button-text-color);
            border: none;
        }

        .primary-btn:hover {
            background: linear-gradient(45deg, var(--accent-color-3), var(--gradient-start));
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .secondary-btn {
            background-color: var(--secondary-bg);
            color: var(--accent-color-1);
            border: 2px solid var(--accent-color-1);
        }

        .secondary-btn:hover {
            background-color: var(--accent-color-1);
            color: var(--button-text-color);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 20px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--accent-color-1);
            letter-spacing: -0.5px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: var(--heading-color);
            font-weight: 600;
            font-size: 1.1em;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            left: 0;
            bottom: 0;
            transition: width var(--transition-speed);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--button-text-color);
            padding: 120px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: rotate(45deg);
            animation: float1 10s infinite ease-in-out;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: rotate(-30deg);
            animation: float2 12s infinite ease-in-out;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) rotate(45deg); }
            50% { transform: translate(20px, 20px) rotate(50deg); }
            100% { transform: translate(0, 0) rotate(45deg); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0) rotate(-30deg); }
            50% { transform: translate(-20px, -20px) rotate(-35deg); }
            100% { transform: translate(0, 0) rotate(-30deg); }
        }


        .hero h1 {
            color: var(--button-text-color);
            font-size: 4em;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .hero p {
            font-size: 1.4em;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        /* Features Section */
        .features-section {
            background-color: var(--secondary-bg);
            padding-top: 100px;
            padding-bottom: 100px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .feature-item {
            background-color: var(--primary-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .feature-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .feature-item h3 {
            margin-top: 20px;
            margin-bottom: 15px;
            color: var(--accent-color-1);
        }

        /* CSS-based icons using emojis/text */
        .icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg
