        /* CSS Reset & Variables */
        :root {
            --primary-color: #6a11cb; /* Deep Purple */
            --secondary-color: #2575fc; /* Bright Blue */
            --accent-color: #00e0ff; /* Electric Cyan */
            --text-color: #333;
            --light-text-color: #f0f0f0;
            --background-gradient-start: #f8f9fa; /* Light Gray */
            --background-gradient-end: #e2e3e5; /* Slightly darker Gray */

            --border-radius: 12px;
            --spacing-unit: 1rem;
            --header-height: 60px;

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;

            flex-direction: column;
            overflow-x: hidden; /* Prevent horizontal scroll on small devices */

        }

        .header {

            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;

            background-color: rgba(255, 255, 255, 0.7); /* Slightly different background for visual break */
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: calc(2 * var(--spacing-unit));
            color: var(--primary-color);
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';

        /* Hero Section */
        .hero-section {

            justify-content: center;
            align-items: center;
            min-height: 70vh;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-section h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: var(--spacing-unit);
            font-weight: 700;
            line-height: 1.1;
        }

        .hero-section p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            margin-bottom: calc(3 * var(--spacing-unit));
            max-width: 800px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--accent-color), #4CAF50); /* Greenish accent */
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn:hover {

        }

        .features-grid {

        }

            display: flex;

        .feature-card:hover {

        }

        .feature-card .icon {

            color: transparent; /* Standard property */

            color: var(--primary-color);
            font-weight: 600;
        }

        .feature-card p {
            font-size: 0.95rem;
            color: var(--text-color);
        }
