<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* General Styles & Reset */
        :root {
            --primary-gradient: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(to right, #fc6767 0%, #ec008c 100%);
            --background-light: #f4f7f6;
            --text-dark: #333;
            --text-light: #fefefe;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-lg: 12px;
            --spacing-unit: 1rem;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--background-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Utility Classes */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 calc(var(--spacing-unit) * 1.5);
        }

        .text-center {
            text-align: center;
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: var(--spacing-unit);
            line-height: 1.2;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        h2 {
            font-size: 2.5rem;
            margin-top: calc(var(--spacing-unit) * 3);
        }

        h3 {
            font-size: 1.8rem;
        }

        p {
            margin-bottom: var(--spacing-unit);
            font-size: 1.1rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-medium);
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: var(--text-light);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
            opacity: 0.9;
        }

        .btn-secondary {
            background: var(--secondary-gradient);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
            opacity: 0.9;
        }

        /* Header */
        header {
            background: var(--text-light);
            padding: calc(var(--spacing-unit) * 1.2) 0;
            box-shadow: 0 2px 10px var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: calc(var(--spacing-unit) * 2);
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: color 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        nav ul li a:hover {
            color: #2575fc;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: calc(var(--spacing-unit) * 6) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: moveShape 15s infinite alternate ease-in-out;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -70px;
            right: -70px;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: moveShape 18s infinite alternate-reverse ease-in-out;
        }

        @keyframes moveShape {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            margin: var(--spacing-unit) auto calc(var(--spacing-unit) * 2);
        }

        /* Section Styling */
        section {
            padding: calc(var(--spacing-unit) * 4) 0;
        }

        section:nth-of-type(even) {
            background-color: #fcfcfc;
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: calc(var(--spacing-unit) * 2);
            margin-top: calc(var(--spacing-unit) * 3);
        }

        .feature-card {
            background: var(--text-light);
            padding: calc(var(--spacing-unit) * 2);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card i {
            font-size: 3rem;
            color: #6a11cb;
            margin-bottom: var(--spacing-unit);
        }

        /* About Section */
        .about-content {
            display: flex;
            align-items: center;
            gap: calc(var(--spacing-unit) * 3);
            margin-top: calc(var
