<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureFlow Innovations - Project Horizon</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --primary-bg: #f8f9fa;
            --secondary-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-gradient-start: #6dd5ed; /* Light Blue */
            --accent-gradient-end: #2193b0;   /* Darker Blue */
            --button-gradient-start: #8e44ad; /* Purple */
            --button-gradient-end: #c0392b;   /* Red */
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius: 12px;
        }

        /* Basic Reset & Box-sizing */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--primary-bg);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styling */
        header {
            background: var(--secondary-bg);
            padding: 20px 0;
            box-shadow: 0 2px 10px var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        header h1 {
            font-size: 1.8em;
            margin: 0;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            padding: 8px 0; /* Adjust padding for underline effect */
            transition: color 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        #hero {
            background: linear-gradient(135deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: #fff;
            text-align: center;
            padding: 100px 20px;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(40px);
            transform: rotate(20deg);
        }

        #hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(30px);
            transform: rotate(-30deg);
        }

        #hero h2 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #hero p {
            font-size: 1.3em;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .button {
            display: inline-block;
            background: linear-gradient(45deg, var(--button-gradient-start), var(--button-gradient-end));
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        /* Main Content Sections */
        main section {
            padding: 60px 0;
            margin-bottom: 20px;
        }

        main section h2 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            color: var(--text-color);
            font-weight: 700;
        }

        main section h2::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
            border-radius: 2px;
        }

        /* Features Section */
        #features .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: var(--secondary-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card .icon {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; /* Required for gradient text to work */
        }

        .feature-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .feature-card p {
            font-size: 0.95em;
            color: #555;
        }

        /* About Section */
        #about {
            background: var(--secondary-bg);
            padding: 80px 0;
            border-radius: var(--border-radius);
            margin-top: 40px;
            box-shadow: 0 4px 15px var(--shadow-light);
        }

        #about .container {
            max-width: 800px;
            text-align: center;
        }

        #about p {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #555;
        }

        /* Footer Styling */
        footer {
            background: var(--text-color); /* Dark background for footer */
            color: #ecf0f1;
            padding: 40px 0;
            text-align: center;
            margin-top: 60px;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
        }

        footer p {
            margin: 0;
            font-size: 0.9em;
            opacity: 0.8;
        }

        footer .social-links {
            margin-top: 20px;
        }

        footer .social-links a {
            color: #ecf0f1;
            font-size: 1.5em;
            margin: 0 10px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer .social-links a:hover {
            color: var(--accent-gradient-start);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            header nav {
                margin-top: 20px;
            }

            nav ul {
                flex-direction: column;
                gap: 15px;
            }

            #hero {
