<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40JuKAK6bIHNkE8XlyJgkjhVfQJqJ+ay/yqU8DKM/K9tJ28+Jc9n0S5E7Dq9Q5N4v0L7aG4vE9Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6DD5ED, #2193B0);
            --secondary-gradient: linear-gradient(135deg, #FF7E5F, #FEB47B);
            --text-dark: #333;
            --text-light: #f8f8f8;
            --bg-light: #f0f4f8;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
            --font-family-poppins: 'Poppins', sans-serif;
        }

        /* Base Styles */
        body {
            font-family: var(--font-family-poppins);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            font-weight: 700;
            color: var(--text-dark);
        }

        p {
            margin-bottom: 1em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 15px 0;
            box-shadow: 0 2px 10px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-light);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: var(--text-light);
            font-weight: 600;
            padding: 5px 0;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        nav a:hover {
            color: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero-section {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 100px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            line-height: 1.1;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .hero-content p {
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--text-light);
            padding: 15px 30px;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* Section Styling */
        section {
            padding: 80px 0;
        }

        section:nth-of-type(even) {
            background-color: #eef2f7;
        }

        .section-title {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 60px;
            color: var(--text-dark);
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--secondary-gradient);
            border-radius: 2px;
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: #fff;
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .feature-card i {
            font-size: 3em;
            color: #2193B0;
            margin-bottom: 20px;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .feature-card p {
            color: #555;
        }

        /* About Section */
        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }

        .about-text {
            flex: 2;
            min-width: 300px;
        }

        .about-image {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .about-image img {
            max-width: 100%;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        /* Contact Section */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            text-align: center;
        }

        .contact-info {
            background: #fff;
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 5px 20px var(--shadow-light);
        }

        .contact-info i {
            font-size: 2.5em;
            color: #2193B0;
            margin-bottom: 15px;
        }

        .contact-info h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .contact-info p {
            color: #555;
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 40px 0;
            text-align: center;
            font-size: 0.9em;
        }

        footer p {
            margin: 0;
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #ecf0f1;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #6DD5ED;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5em;
            }
            .hero-content p {
                font-size: 1.1em;
            }
            .section-title {
                font-size: 2em;
            }

            nav ul {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            header .container {
                flex-direction: column;
                gap: 15px;
            }
            .logo {
                margin-bottom: 10px;
            }

            .about-content {
                flex-direction: column;
            }
            .about-text, .about-image {
                min-width: unset;
                width: 100%;
            }
        }
