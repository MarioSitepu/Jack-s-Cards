<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Horizon - Launching 2026</title>
    <style>
        /* Import Google Font - Inter for a modern look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        /* CSS Variables for consistent theming */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a82fb, #fc5c7d); /* Blue to Pink/Red */
            --secondary-gradient: linear-gradient(135deg, #a1c4fd, #c2e9fb); /* Light Blue */
            --dark-text: #2c3e50;
            --light-text: #ecf0f1;
            --background-light: #f4f7fa;
            --card-background: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius: 12px;
            --transition-speed: 0.3s ease;
        }

        /* Modern CSS Reset & Base Styles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--background-light);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Typography */
        h1, h2, h3 {
            margin-bottom: 0.8em;
            font-weight: 700;
        }

        h1 {
            font-size: 3.2em;
            background-image: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; /* Essential for text gradient */
            line-height: 1.1;
        }

        h2 {
            font-size: 2.5em;
            color: var(--dark-text);
        }
        h3 {
            font-size: 1.8em;
            color: var(--dark-text);
        }

        p {
            margin-bottom: 1em;
            font-size: 1.1em;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color var(--transition-speed);
        }
        a:hover {
            opacity: 0.8;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            text-align: center;
            cursor: pointer;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            border: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-primary {
            background-image: var(--primary-gradient);
            color: var(--light-text);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }
        /* Gradient hover effect for primary button */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fc5c7d, #6a82fb); /* Reverse gradient for hover */
            z-index: -1;
            opacity: 0;
            transition: opacity var(--transition-speed);
        }
        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-secondary {
            background-color: var(--card-background);
            color: #6a82fb;
            border: 2px solid #6a82fb;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }


        /* Header */
        header {
            background-color: var(--card-background);
            padding: 20px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 800;
            background-image: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            font-weight: 600;
            color: var(--dark-text);
            position: relative;
        }
        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -5px;
            left: 0;
            background-image: var(--primary-gradient);
            transition: width var(--transition-speed);
        }
        nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background-image: var(--secondary-gradient);
            padding: 100px 0;
            text-align: center;
            color: var(--dark-text);
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            z-index: 0;
            pointer-events: none;
        }

        .hero h1 {
            font-size: 4.5em;
            margin-bottom: 0.3em;
            position: relative;
            z-index: 1;
        }

        .hero p {
            font-size: 1.5em;
            max-width: 800px;
            margin: 0 auto 40px auto;
            position: relative;
            z-index: 1;
            color: #4a5d73;
        }
        .hero .btn {
            z-index: 1;
            position: relative;
        }

        /* Main Content Sections
</body>
</html>
