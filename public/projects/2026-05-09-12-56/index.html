<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase 2026</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --primary-color: #6a11cb; /* Deep Purple */
            --secondary-color: #2575fc; /* Bright Blue */
            --accent-color-light: #a7a1e0; /* Lighter purple/blue tint */
            --text-color: #333;
            --text-color-light: #f9f9f9;
            --bg-light: #f0f2f5;
            --bg-dark: #2c3e50;
            --gradient-body: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%);
            --gradient-hero: linear-gradient(45deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-button: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-deep: 0 8px 30px rgba(0, 0, 0, 0.2);
            --border-radius-soft: 15px;
            --border-radius-pill: 50px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--gradient-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            font-weight: 500;
            color: var(--text-color);
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--secondary-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero-section {
            background: var(--gradient-hero);
            color: var(--text-color-light);
            padding: 120px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1; /* Allows hero to take available vertical space */
            position: relative;
            overflow: hidden;
        }

        .hero-section h1 {
            font-size: 3.8rem;
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            border-radius: var(--border-radius-pill);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-light);
            cursor: pointer;
        }

        .primary-btn {
            background: var(--gradient-button);
            color: var(--text-color-light);
            border: none;
        }

        .primary-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-deep);
            background: linear-gradient(90deg, var(--secondary-color) 0%, var(--primary-color) 100%); /* Reverse gradient on hover */
        }

        .secondary-btn {
            background: var(--text-color-light);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .secondary-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-deep);
            background: var(--primary-color);
            color: var(--text-color-light);
        }

        /* Content Sections */
        .content-section {
            padding: 100px 0;
            text-align: center;
        }

        .content-section:nth-of-type(even) { /* Alternate background for sections */
            background: linear-gradient(135deg, #f8faff 0%, #eef1f4 100%);
        }

        .content-section h2 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            color: var(--primary-color);
            position: relative;
            display: inline-block;
            font-weight: 700;
        }

        .content-section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--secondary-color);
            border-radius: 5px;
        }

        .content-section p {
            font-size: 1.15rem;
            max-width: 800px;
            margin: 0 auto 20px auto;
            color: #555;
        }

        /* Features Section */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .feature-item {
            background: #fff;
            padding: 35px;
            border-radius: var(--border-radius-soft);
            box-shadow: var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .feature-item:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-deep);
        }

        .feature-item h3 {
            font-size: 1.6rem;
            margin-bottom: 18px;
            color: var(--primary-color);
            position: relative;
            padding-left: 50px;
            font-weight: 600;
        }

        .feature-item h3::before {
            content: '🚀'; /* Using an emoji for icon, replace with SVG/font icon for production */
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
        }

        .feature-item p {
            font-size: 1rem;
            color: #666;
            margin: 0;
            line-height: 1.7;
        }

        /* Call to Action Section */
        .cta-section {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: var(--text-color-light);
            padding: 100px 0;
            text-align: center;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2);
        }

        .cta-section h2 {
            color: var(--text-color-light);
            margin-bottom: 25px;
        }

        .cta-section h2::after {
            background: var(--text-color-light);
        }

        .cta-section p {
            color: var(--text-color-light);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        /* Footer */
        footer {
            background: var(--bg-dark);
            color: var(--text-color-light);
            padding: 50px 0;
            text-align: center;
            font-size: 0.9rem;
            margin-top: auto; /* Push footer to the bottom */
        }

        footer p {
            margin-bottom: 8px;
            opacity: 0.8;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .hero-section h1 {
                font-size: 3rem;
            }
            .hero-section p {
                font-size: 1.2rem;
            }
            .content-section h2 {
                font-size: 2.4rem;
            }
            .feature-item h3 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            .logo {
                margin-bottom: 15px;
            }

                gap: 12px;
            }

                margin-left: 0;
