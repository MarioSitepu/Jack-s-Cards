        :root {

        }

        /* Base styles */
        body {
            font-family: 'Poppins', sans-serif;

            background: var(--bg-light-alt);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        h1, h2, h3 {
            margin-top: 0;
            font-weight: 600;
        }

        a {
            text-decoration: none;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: #1a56c0; /* Darker accent on hover */

        header nav a::after {

        /* Hero Section */

        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--text-light);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        /* Features Section */
        .features .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .feature-card {
            flex: 1 1 calc(33% - 40px); /* 3 cards per row, accounting for gap */

            box-shadow: 0 5px 20px var(--shadow-light);

        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card h3 {
            color: var(--accent-color);
            margin-bottom: 15px;

        }

        .feature-card p {

        }

            align-items: center;
        }

        .about h2 {

        }

        .about-content {

        }

        /* Call to Action Section */
        .cta {

            color: var(--text-light);
            padding: 80px 20px;
        }

        .cta h2 {
            font-size: 2.8em;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .cta p {
            font-size: 1.2em;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .cta .btn {
            background: var(--bg-light); /* White button for contrast */
            color: var(--accent-color);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .cta .btn:hover {
            background: var(--bg-light-alt);
            color: #1a56c0;
        }

        /* Footer */
        footer {
            background: var(--text-dark);
            color: var(--text-light);
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
            font-size: 0.9em;
        }

        footer p {
            margin: 0;
        }

                flex: 1 1 100%;

        }
