<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Showcase</title>

        /* Basic Reset & Typography */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --accent-color: #ff6b6b; /* Vibrant red-orange */
            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-bottom: 0.8em;
            font-weight: 700;
            line-height: 1.2;
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--secondary-gradient); /* This will be overridden by specific elements */
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        header .logo a {
            color: var(--text-light);
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 1.5rem;
        }

        nav ul li a {
            color: var(--text-light);
            font-weight: 600;
            font-size: 1.05rem;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        /* Main Content */
        main {
            flex: 1; /* Allows main to grow and push footer down */
        }

        section {
            padding: 4rem 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background-color: #f9f9f9;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 6rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 3.5rem;
            margin-bottom: 0.5em;
            font-weight: 900;
            text-shadow: 2px 2px 4px var(--shadow-dark);
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 1px 1px 2px var(--shadow-dark);
        }

        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: var(--text-light);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: #ff4747; /* Slightly darker on hover */
        }

        .btn-secondary {
            background: var(--secondary-gradient);
            margin-left: 1rem;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #00b0e6 0%, #0056cc 100%); /* Slightly darker on hover */
        }

        /* Features Section */
        .features h3 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 2rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: var(--bg-light);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 8px 25px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            border: 1px solid #eee;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px var(--shadow-dark);
        }

        .feature-card .icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
            display: block;
            text-align: center;
        }

        .feature-card h4 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .feature-card p {
            font-size: 1rem;
            color: #555;
        }

</html>
