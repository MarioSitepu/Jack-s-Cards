<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a11cb; /* Deep Purple */
            --secondary-color: #2575fc; /* Royal Blue */
            --accent-color: #00c6ff; /* Bright Sky Blue */
            --text-light: #f4f4f4;
            --text-dark: #333;
            --bg-light: #ffffff;
            --bg-dark: #1a1a2e;
            --gradient-hero: linear-gradient(135deg, #6e8efb, #a777e3); /* Lighter Blue to Lighter Purple */
            --gradient-button-primary: linear-gradient(45deg, #00c6ff, #0072ff); /* Sky Blue to Darker Blue */
            --gradient-button-secondary: linear-gradient(45deg, #a777e3, #6e8efb); /* Lighter Purple to Lighter Blue */
            --shadow: rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--bg-light);
            box-shadow: 0 2px 10px var(--shadow);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: color 0.3s ease, background-image 0.3s ease;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-image: var(--gradient-button-primary);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--secondary-color); /* Fallback */
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .primary-btn {
            background-image: var(--gradient-button-primary);
            color: var(--text-light);
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
            opacity: 0.9;
        }

        .secondary-btn {
            background-image: var(--gradient-button-secondary);
            color: var(--text-light);
            box-shadow: 0 4px 15px rgba(167, 119, 227, 0.3);
        }

        .secondary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(167, 119, 227, 0.4);
            opacity: 0.9;
        }

        /* Main Content */
        main {
            flex: 1;
        }

        section {
            padding: 80px 0;
            text-align: center;
        }

        h1, h2 {
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        h1 {
            font-size: 3.5rem;
            color: var(--text-light);
            line-height: 1.2;
            background: -webkit-linear-gradient(45deg, #e0e0e0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 2.5rem;
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #555;
        }

        /* Hero Section */
        .hero-section {
            background-image: var(--gradient-hero);
            color: var(--text-light);
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Features Section */
        .features-section {
            background-color: var(--bg-light);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background-color: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 5px 20px var(--shadow);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid transparent;
            border-image: var(--gradient-button-primary);
            border-image-slice: 1;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .feature-card h3 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: var(--primary-color);
            background: -webkit-linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-card p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0;
        }

        /* About Section */
        .about-section {
            background-color: #f9f9f9;
            padding-bottom: 50px;
        }
        .about-section p {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            color: #555;
        }

        /* Contact Section */
        .contact-section {
            background-image: var(--gradient-button-secondary);
            color: var(--text-light);
            padding: 100px 0;
        }
        .contact-section h2 {
            color: var(--text-light);
            background: none;
            -webkit-background-clip: initial;
            -webkit-text-fill-color: initial;
        }
        .contact-section p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        /* Footer */
        footer {
            background-color: var(--bg-dark);
            color: rgba(255, 255, 255, 0.7);
            padding: 30px 0;
            text-align: center;
            font-size: 0.9rem;
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent-color);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
            }

            nav ul {
                margin-top: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav ul li {
                margin: 0 15px 10px;
            }

            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 2rem;
            }

            .hero-section {
                padding: 80px 0;
                min-height: 60vh;
            }

            .hero-section p {
