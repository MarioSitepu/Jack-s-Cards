<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase - 2026</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Basic Reset & Variables */
        :root {
            --primary-color: #4A00E0; /* Deep Purple */
            --secondary-color: #8E2DE2; /* Lighter Purple */
            --accent-color: #00BCD4; /* Cyan */
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --bg-light: #ffffff;
            --bg-dark: #2c3e50; /* Dark Blue Grey */
            --gradient-header: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --gradient-hero: linear-gradient(45deg, #6DD5ED 0%, #2193B0 100%); /* Light Blue to Darker Blue */
            --gradient-button: linear-gradient(90deg, #FFD700 0%, #FFA500 100%); /* Gold to Orange */
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
            --font-family-sans: 'Roboto', sans-serif;
            --font-family-serif: 'Playfair Display', serif;
        }

        /* Google Fonts Import */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-sans);
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        ul {
            list-style: none;
        }

        h1, h2, h3 {
            font-family: var(--font-family-serif);
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        h1 { font-size: 3rem; }
        h2 { font-size: 2.5rem; }
        h3 { font-size: 1.8rem; }

        p {
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--gradient-hero);
            color: var(--text-light);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 188, 212, 0.4);
            background: var(--gradient-header); /* Change gradient on hover */
        }

        /* Header */
        header {
            background: var(--gradient-header);
            color: var(--text-light);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--box-shadow);
        }
</body>
</html>
