<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Revolutionizing Tomorrow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(135deg, #fc6767 0%, #ec008c 100%);
            --bg-light: #f8faff; /* Very light blue-grey */
            --bg-dark: #1a202c; /* Dark charcoal */
            --text-dark: #2d3748; /* Dark grey */
            --text-light: #ffffff;
            --accent-color: #00bcd4; /* Teal */
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 48px;
            --spacing-xl: 96px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        h1, h2, h3 {
            margin-bottom: var(--spacing-md);
            font-weight: 700;
            color: var(--text-dark);
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.1;
        }

        h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        h3 {
            font-size: clamp(1.5rem, 3vw, 2rem);
        }

        p {
            margin-bottom: var(--spacing-sm);
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #008c9e; /* Darker teal */
        }

        .btn {
            display: inline-block;
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-sm);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-medium);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-medium);
        }

        /* Header */
        header {
            background: var(--bg-dark); /* Solid dark for nav */
            color: var(--text-light);
            padding: var(--spacing-sm) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--shadow-medium);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for older browsers */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);
        }

        nav a {
            color: var(--text-light);
            font-weight: 500;
            padding: var(--spacing-xs) 0;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: var(--spacing-xl) 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
            animation: pulse 15s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.7; }
        }

        .hero .container {
            max-width: 800px;
            z-index: 1;
        }

        .hero h1 {
            color: var(--text-light);
            margin-bottom: var(--spacing-md);
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: var(--spacing-lg);
            opacity: 0.9;
        }

        /* Section Styling */
        section {
            padding: var(--spacing-xl) 0;
        }

        .features-section, .contact-section {
            background-color: var(--bg-light);
        }

        .about-section {
            background-color: var(--text-light);
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }

        .feature-item {
            background-color: var(--text-light);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .feature-item .icon {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-light);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Simple icon placeholders using pseudo-elements (emojis) */
        .icon-design::before { content: '✨'; }
        .icon-performance::before { content: '🚀'; }
        .icon-security::before { content: '🔒'; }
        .icon-scalable::before { content: '📈'; }


        /* About Section */
        .about-section p {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        /* Contact Form */
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            background-color: var(--text-light);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 20px var(--shadow-light);
        }

        .contact-form input,
        .contact-form textarea {
            padding: var(--spacing-sm);
            border: 1px solid #e2e8f0; /* Light grey border */
            border-radius: var(--border-radius-sm);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.2);
        }

        .contact-form button.btn {
            width: auto;
            align-self: flex-start;
            margin-top: var(--spacing-sm);
        }
</body>
</html>
