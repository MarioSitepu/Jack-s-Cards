<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --primary-bg-start: #0f0c29; /* Dark Blue-Purple */
            --primary-bg-end: #24243e; /* Darker Purple */
            --secondary-bg: #1a1a2e; /* Very Dark Blue-Purple */
            --accent-gradient-start: #6a11cb; /* Bright Purple */
            --accent-gradient-end: #2575fc; /* Bright Blue */
            --text-color-light: #e0e0e0; /* Off-white for general text */
            --text-color-dark: #f0f0f0; /* Lighter off-white for contrast */
            --header-bg: rgba(15, 12, 41, 0.9); /* Semi-transparent dark header */
            --card-bg: rgba(255, 255, 255, 0.05); /* Slightly transparent white for cards */
            --shadow-color: rgba(0, 0, 0, 0.5); /* Dark shadow for depth */
            --border-color-input: rgba(255, 255, 255, 0.2); /* Light border for inputs */
            --input-bg: rgba(255, 255, 255, 0.08); /* Light transparent background for inputs */
            --input-bg-focus: rgba(255, 255, 255, 0.15); /* Slightly brighter on focus */
        }

        /* Global Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color-light);
            background: linear-gradient(135deg, var(--primary-bg-start), var(--primary-bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--text-color-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-gradient-end);
        }

        /* Header */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--shadow-color);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text; /* For gradient text */
            -webkit-text-fill-color: transparent; /* For gradient text */
            background-clip: text;
            color: transparent; /* Fallback for browsers not supporting -webkit-text-fill-color */
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2.5rem;
        }

        nav ul li a {
            font-size: 1.1rem;
            font-weight: 500;
            padding: 0.5rem 0;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: var(--accent-gradient-end);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
        }

        section {
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1, h2 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text; /* For gradient text */
            -webkit-text-fill-color: transparent; /* For gradient text */
            background-clip: text;
            color: transparent; /* Fallback */
            line-height: 1.2;
        }

        h2 {
            font-size: 2.8rem;
            margin-top: 3rem;
        }

        p {
            font-size: 1.15rem;
            margin-bottom: 1rem;
            color: var(--text-color-dark);
        }

        /* Hero Section */
        .hero {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 4rem; /* Adjust for sticky header */
        }

        .hero-content h1 {
            font-size: 4.5rem;
            margin-bottom: 1rem;
        }

        .hero-content p {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 0 auto 2rem auto;
            color: var(--text-color-dark);
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
        }

        /* Features Section */
        .features-section {
            background: var(--secondary-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            margin-bottom: 4rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .feature-card h3 {
            font-size: 1.7rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--accent-gradient-start), var(--accent-gradient-end));
            -webkit-background-clip: text; /* For gradient text */
            -webkit-text-fill-color: transparent; /* For gradient text */
            background-clip: text;
            color: transparent; /* Fallback */
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-color-light);
        }

        /* About Section */
        .about-section {
            padding-bottom: 8rem;
        }
        .about-section p {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            text-align: justify;
            margin-bottom: 1.5rem;
        }

        /* Contact Section */
        .contact-section {
            background: var(--secondary-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            padding-bottom: 4rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 600px;
            margin: 3rem auto 0 auto;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 1rem 1.2rem;
            border: 1px solid var(--border-color-input);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color-light);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: var(--text-color-light);
            opacity: 0.7;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: var(--accent-gradient-end);
            background-color: var(--input-bg-focus);
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .contact-form .btn {
            width: fit-content;
            align-self: center;
            margin-top: 1rem;
        }

        /* Footer */
        footer {
            background: var(--primary-bg-start);
            color: var(--text-color-light);
            text-align: center;
            padding: 2.5rem 1rem;
            margin-top: auto;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            margin: 0.5rem 0;
            color: var(--text-color-light);
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            nav {
                padding: 0 1.5rem;

                font-size: 1.3rem;
            }
            h2 {
                font-size: 2.5rem;
            }
