        /* CSS Variables */
        :root {
            --primary-bg: #1a1a2e; /* Deep Violet-Blue */
            --secondary-bg: #16213e; /* Slightly lighter Violet-Blue */
            --tertiary-bg: #0f3460; /* Darker Blue for depth */
            --text-color: #e0e0e0; /* Off-white */
            --heading-color: #ffffff; /* White for headings */
            --accent-color-1: #e94560; /* Vibrant Pinkish-Red */
            --accent-color-2: #fc354c; /* Brighter Red */
            --shadow-color: rgba(0, 0, 0, 0.4); /* Dark shadow */
            --border-radius-sm: 8px;
            --border-radius-lg: 12px;
            --gradient-hero: linear-gradient(135deg, var(--tertiary-bg) 0%, var(--primary-bg) 100%);
            --gradient-section: linear-gradient(45deg, var(--secondary-bg) 0%, var(--primary-bg) 100%);
            --gradient-button: linear-gradient(45deg, var(--accent-color-1) 0%, var(--accent-color-2) 100%);
            --gradient-button-hover: linear-gradient(45deg, var(--accent-color-2) 0%, var(--accent-color-1) 100%);
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

            margin: 0 auto;
            padding: 0 20px;
        }

            color: var(--heading-color);

            line-height: 1.2;

            font-size: 3.5rem;
            text-align: center;
        }

            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
