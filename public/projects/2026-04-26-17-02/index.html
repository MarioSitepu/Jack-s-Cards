<!DOCTYPE html>
<html lang="en">

        /* CSS Variables */
        :root {
            --primary-color: #2575fc; /* Blue */
            --secondary-color: #6a11cb; /* Purple */
            --accent-color: #00f2fe; /* Cyan */
            --text-color: #333;
            --light-text-color: #f0f0f0;
            --bg-light: #ffffff;
            --bg-dark: #f5f7fa;
            --gradient-primary: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            --gradient-accent: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); /* Lighter blue gradient for buttons */
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-medium: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-dark);
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            margin-top: 0;
            color: var(--primary-color);
        }

        h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        /* Header */
        header {
            background: var(--gradient-primary);
            color: var(--light-text-color);
            padding: 15px 0;
            box-shadow: var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            color: var(--light-text-color);
            font-size: 1.8em;
            letter-spacing: 0.5px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: var(--light-text-color);
            font-weight: 500;
            font-size: 1.1em;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 50px;
            background: var(--gradient-accent);
            color: var(--light-text-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 114, 255, 0.4);
            opacity: 0.95;
        }

        /* Hero Section */
        .hero-section {
            background: var(--gradient-primary);
            color: var(--light-text-color);
            text-align: center;
            padding: 100px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .hero-section h2 {
            color: var(--light-text-color);
            font-size: 3.5em;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.3em;
            max-width: 700px;
            margin: 0 auto 30px auto;
            opacity: 0.9;
        }

        .hero-section strong {
            color: var(--accent-color);
        }

        /* Content Sections */
        .content-section {
            padding: 80px 0;
            background-color: var(--bg-light);
            text-align: center;
        }

        .content-section:nth-of-type(even) {
            background-color: var(--bg-dark);
        }

        .content-section h3 {
            font-size: 2.2em;
            margin-bottom: 40px;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background-color: var(--bg-light);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-medium);
        }

        .card h4 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .card p {
            color: #666;
        }

        /* Gradient Section (Features) */
        .gradient-section {
            background: var(--gradient-primary);
            color: var(--light-text-color);
            padding: 80px 0;
            text-align: center;
        }

        .gradient-section h3 {
            color: var(--light-text-color);
            margin-bottom: 40px;
            font-size: 2.2em;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.15);
        }

        .feature-item .icon {
            font-size: 3em;
            margin-bottom: 15px;
            line-height: 1;
        }

        .feature-item h4 {
            color: var(--light-text-color);
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .feature-item p {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Contact Form */
        .contact-form {
            max-width: 600px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.2);
            outline: none;
        }

        .contact-form textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: var(--light-text-color);
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9em;
        }

        footer p {
            margin: 0;
            opacity: 0.8;
        }

        footer span {
            color: var(--accent-color);
            font-weight: bold;
        }

                margin: 0;
