<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nova - Modern Showcase</title>
    <style>
        /* Import Google Fonts and Font Awesome */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css');

        /* CSS Variables */
        :root {
            --primary-bg-dark: #1A202C;
            --secondary-bg-light: #F7FAFC;
            --text-color-light: #E2E8F0;
            --text-color-dark: #2D3748;
            --accent-color-1: #667EEA; /* Blue-purple */
            --accent-color-2: #764BA2; /* Darker purple */
            --gradient-start: #6a11cb; /* Vivid Violet */
            --gradient-end: #2575fc; /* Dodger Blue */
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --border-radius: 8px;
            --transition-speed: 0.3s ease;
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color-light);
            background-color: var(--primary-bg-dark);
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        h1, h2, h3, h4 {
            margin-bottom: 1rem;
            font-weight: 700;
        }

        h1 { font-size: 2.8rem; }
        h2 { font-size: 2.2rem; }
        h3 { font-size: 1.8rem; }
        h4 { font-size: 1.4rem; }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color-1);
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        a:hover {
            color: var(--accent-color-2);
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: var(--text-color-light);
            padding: 0.8rem 2rem;
            border-radius: var(--border-radius);
            text-transform: uppercase;
            font-weight: 600;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            box-shadow: 0 4px 15px var(--shadow-dark);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-dark);
            color: var(--text-color-light); /* Keep text color on hover */
        }

        /* Header */
        header {
            background-color: var(--primary-bg-dark);
            color: var(--text-color-light);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--shadow-dark);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on small screens */
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header nav ul {
            list-style: none;
            display: flex;
        }

        header nav ul li {
            margin-left: 1.5rem;
        }

        header nav ul li a {
            color: var(--text-color-light);
            font-weight: 600;
            position: relative;
            padding-bottom: 0.25rem;
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color-1);
            transition: width var(--transition-speed);
        }

        header nav ul li a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--text-color-light);
            text-align: center;
            padding: 8rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            transform: rotate(45deg);
        }

        .hero-section::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .hero-section h2 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 10px var(--shadow-dark);
        }

        .hero-section p {
            font-size: 1.5rem;
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        /* Content Sections */
        .content-section {
            padding: 6rem 0;
            background-color: var(--secondary-bg-light);
            color: var(--text-color-dark);
            text-align: center;
        }

        .content-section:nth-of-type(odd) {
            background-color: var(--primary-bg-dark);
            color: var(--text-color-light);
        }

        .content-section h3 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .content-section h3::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -10px;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color-1), var(--accent-color-2));
            border-radius: 2px;
        }

        .content-section p {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.1rem;
        }

        /* Gradient Background Section for Features */
        .gradient-bg-section {
            padding: 6rem 0;
            background: linear-gradient(135deg, var(--accent-color-2) 0%, var(--accent-color-1) 100%);
            color: var(--text-color-light);
            text-align: center;
        }

        .gradient-bg-section h3::after {
            background: linear-gradient(90deg, var(--text-color-light), var(--text-color-light)); /* Solid white underline */
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-item {
            background-color: rgba(255, 255, 255, 0.1); /* Slightly transparent white for features on gradient bg */
            padding: 2.5rem;
            border-radius: var(--border-radius);
            text-align: center;
            transition: transform var(--transition-speed), background-color var(--transition-speed), box-shadow var(--transition-speed);
