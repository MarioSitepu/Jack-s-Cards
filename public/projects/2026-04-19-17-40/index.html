<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase 2026</title>
    <style>
        /* CSS Reset & Global Styles */
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e0e0e0;
            --heading-color: #ffffff;
            --button-primary-gradient: linear-gradient(45deg, #e94560, #ff829b);
            --button-secondary-gradient: linear-gradient(45deg, #533483, #9d68f2);
            --card-bg: #2b2b4d;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.2);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.4);
            --font-family-primary: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-primary), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--primary-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1rem 0;
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            color: var(--heading-color);
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            margin: 0;
            letter-spacing: 0.5px;
        }

        header nav ul {
            list-style: none;
            display: flex;
        }

        header nav ul li {
            margin-left: 25px;
        }

        header nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--button-primary-gradient);
            transition: width 0.3s ease;
        }

        header nav ul li a:hover::after {
            width: 100%;
        }

        header nav ul li a:hover {
            color: #fff;
        }

        /* Main content */
        main {
            flex: 1;
        }

        section {
            padding: 80px 0;
            text-align: center;
        }

        section:nth-of-type(odd) {
            background-color: var(--primary-bg);
        }
        section:nth-of-type(even) {
            background-color: var(--accent-color);
        }

        h2, h3 {
            color: var(--heading-color);
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        h2::after, h3::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -10px;
            width: 60px;
            height: 4px;
            background: var(--button-primary-gradient);
            border-radius: 2px;
        }

        p {
            margin-bottom: 15px;
            font-size: 1.1rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            display: inline-block;
            padding: 14px 30px;
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--button-primary-gradient);
            color: var(--heading-color);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: var(--button-secondary-gradient);
            color: var(--heading-color);
            box-shadow: 0 6px 20px rgba(83, 52, 131, 0.4);
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--accent-color) 100%);
            color: var(--heading-color);
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        .hero-section h2 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 25px;
        }

        .hero-section p {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* Features Section */
        .features-section {
            background-color: var(--secondary-bg);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-dark);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .feature-card .icon {
            font-size: 3rem;
            color: #e94560; /* Accent color for icons */
            margin-bottom: 20px;
            display: inline-block;
            line-height: 1; /* Ensure emoji is vertically centered */
        }

        .feature-card h4 {
            color: var(--heading-color);
            font-size: 1.5rem;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-color);
            margin-bottom: 0;
        }

        /* About & Contact Sections */
        .about-section, .contact-section {
            background-color: var(--primary-bg);
        }

        .contact-section p {
            margin-bottom: 30px;
        }

        /* Footer */
        footer {
            background-color: var(--secondary-bg);
            color: var(--text-color);
            text-align: center;
            padding: 30px 0;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            font-size: 0.9rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            header h1 {
                margin-bottom: 15px;
            }

            header nav ul {
                flex-direction: column;
                width: 100%;
            }

            header nav ul li {
                margin: 10px 0;
            }

            section {
                padding: 60px 0;
            }
</body>
</html>
