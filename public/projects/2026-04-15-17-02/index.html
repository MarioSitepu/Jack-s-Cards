<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg-start: #1a2a6c; /* Dark blue */
            --primary-bg-end: #b21f1f;   /* Dark red */
            --secondary-bg-start: #5a3f8c; /* Purple */
            --secondary-bg-end: #3b2a5c; /* Darker purple */
            --accent-color-1: #ff7e5f;   /* Coral */
            --accent-color-2: #feb47b;   /* Peach */
            --text-light: #f0f0f0;
            --text-dark: #333;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
            --box-shadow-light: 0 5px 15px rgba(0, 0, 0, 0.2);
            --box-shadow-heavy: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--primary-bg-start), var(--primary-bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-light);
            text-decoration: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color-2);
            text-shadow: 0 0 8px var(--accent-color-2);
        }

        /* Main Content */
        main {
            flex-grow: 1;
        }

        section {
            padding: 80px 0;
            text-align: center;
            position: relative;
            overflow: hidden; /* For potential background elements */
        }

        section h2 {
            font-size: 2.8rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: var(--text-light);
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        }

        section p {
            font-size: 1.1rem;
            max-width: 800px;
            margin: 0 auto 2rem auto;
            color: var(--text-light);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(45deg, var(--primary-bg-start), var(--primary-bg-end));
            padding: 120px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero-section h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-light);
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-section .btn {
            background: linear-gradient(90deg, var(--accent-color-1), var(--accent-color-2));
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: var(--border-radius-lg);
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--box-shadow-light);
            display: inline-block;
        }

        .hero-section .btn:hover {
            transform: translateY(-5px);
            box-shadow: var(--box-shadow-heavy);
        }

        /* Features Section */
        .features-section {
            background: linear-gradient(135deg, var(--secondary-bg-start), var(--secondary-bg-end));
            padding: 100px 0;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 4rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            padding: 30px;
            text-align: left;
            box-shadow: var(--box-shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--box-shadow-heavy);
        }

        .feature-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--accent-color-2);
            font-weight: 600;
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-light);
            margin: 0; /* Override section p margin */
            text-align: left;
        }

        /* About Section */
        .about-section {
            background: linear-gradient(45deg, var(--primary-bg-end), var(--primary-bg-start));
        }

        .about-content {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .about-text, .about-image {
            flex: 1;
            min-width: 300px;
        }

        .about-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--box-shadow-heavy);
            border: 3px solid var(--accent-color-1);
        }

        .about-text {
            text-align: left;
        }

        .about-text h2 {
            text-align: left;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .about-text p {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--accent-color-1), var(--accent-color-2));
            padding: 100px 0;
            color: white;
        }

        .cta-section h2 {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
        }

        .cta-section p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
        }

        .cta-section .btn {
            background: var(--secondary-bg-start);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: var(--border-radius-lg);
            font-weight: 700;
            font-size: 1.2rem;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--box-shadow-light);
            display: inline-block;
        }

        .cta-section .btn:hover {
            transform: translateY(-7px);
            background: var(--secondary-bg-end);
            box-shadow: var(--box-shadow-heavy);
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-light);
            text-align: center;
            padding: 2.5rem 0;
            margin-top: auto; /* Pushes footer to the bottom */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        footer a {
            color: var(--accent-color-2);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--accent-color-1);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
            }

            nav ul {
                margin-top: 1rem;
                flex-direction: column;
                align-items: center;
            }

            nav ul li
