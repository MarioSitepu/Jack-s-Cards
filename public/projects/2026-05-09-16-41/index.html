        /* CSS Variables for easy theme management */
        :root {
            --primary-gradient-start: #4A90E2; /* Bright Blue */

            --secondary-gradient-start: #5AD1CD; /* Teal */
            --secondary-gradient-end: #4A90E2;   /* Bright Blue */
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --bg-light: #F8F9FA;
            --card-bg: #FFFFFF;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
        }

        /* Base Styles & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-light) 0%, #E0E7ED 100%); /* Subtle body gradient */
        }

        a {
            color: var(--primary-gradient-start);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-gradient-end);
        }

        /* Utility Classes */
        .container {

            padding: var(--spacing-sm) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-gradient-start), var(--primary-gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: var(--spacing-md);

        nav a {
            font-weight: 600;

            position: relative;
            padding-bottom: 5px;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(45deg, var(--secondary-gradient-start), var(--secondary-gradient-end));
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: var(--spacing-lg) 0;
        }

        section {
            padding: var(--spacing-lg) 0;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            color: var(--text-light);
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-sm);
            border-radius: var(--border-radius-md);
            margin: var(--spacing-md) auto;
            max-width: 1000px; /* Constrain hero width slightly */
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: var(--spacing-md);
            opacity: 0.9;
        }

        .hero .project-date {
            font-weight: 600;
            color: var(--secondary-gradient-start); /* Accent color for the date */
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, var(--secondary-gradient-start) 0%, var(--secondary-gradient-end) 100%);
            color: var(--text-light);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .cta-button.secondary {
            background: var(--card-bg);
            color: var(--primary-gradient-start);
            border: 2px solid var(--primary-gradient-start);
            box-shadow: none;

        }

            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--shadow-medium);
        }

        .features {

            background-color: var(--card-bg);
            padding: var(--spacing-lg) 0;
            margin: var(--spacing-md) auto;
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 20px var(--shadow-light);
            max-width: 1000px;
        }

            -webkit-text-fill-color: transparent;
        }

        }

            background-color: var(--card-bg);
