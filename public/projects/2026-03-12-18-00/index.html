<!DOCTYPE html>

        /* CSS Variables for easy theme management */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); /* Deep purple to blue */
            --secondary-gradient: linear-gradient(135deg, #88d49e 0%, #d0f4de 100%); /* Light green/teal */
            --button-gradient: linear-gradient(45deg, #00c6ff 0%, #0072ff 100%); /* Bright blue */
            --button-hover-gradient: linear-gradient(45deg, #0072ff 0%, #00c6ff 100%);
            --text-light: #f0f2f5;
            --text-dark: #2c3e50;
            --text-medium: #555;
            --bg-light: #f9f9f9;
            --bg-dark: #2c3e50;
            --card-bg: #ffffff;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
            --border-radius: 12px;
            --spacing-unit: 1rem;
        }

        /* Base Reset & Typography */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-medium);
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(to bottom right, #f0f2f5, #e0e2e5); /* Subtle body gradient */
        }

        a {
            text-decoration: none;
            color: var(--text-dark);
            transition: color 0.3s ease;
        }

        a:hover {
            color: #0072ff; /* Accent color from button gradient */
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 calc(2 * var(--spacing-unit));
        }

        /* Header Styling */
        header {
            background: var(--card-bg);
            padding: var(--spacing-unit) 0;
            box-shadow: 0 2px 10px var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers not supporting background-clip */
        }

        nav ul {
            display: flex;
            gap: calc(2 * var(--spacing-unit));
        }

        nav a {
            font-weight: 600;
            color: var(--text-dark);
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background: #0072ff; /* Accent color */
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 6rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hero::before { /* Decorative overlay */
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .hero-content {
            max-width: 800px;
            z-index: 1;
        }

        .hero h1 {
            font-size: 3.8rem;
            margin-bottom: var(--spacing-unit);
            font-weight: 700;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: calc(2 * var(--spacing-unit));
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: var(--button-gradient);
            color: var(--text-light);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }

        .btn:hover {
            background: var(--button-hover-gradient);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Section General Styling */
        section {
            padding: 4rem 0;
            text-align: center;
        }

        section:nth-of-type(even) {
            background: var(--bg-light);
        }

        h2 {
            font-size: 2.8rem;
            margin-bottom: calc(3 * var(--spacing-unit));
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -10px;
            width: 80px;
            height: 4px;
            background: #0072ff; /* Accent color */
            border-radius: 2px;
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: calc(2 * var(--spacing-unit));
            margin-top: calc(3 * var(--spacing-unit));
        }

        .feature-card {
            background: var(--card-bg);
            padding: calc(2 * var(--spacing-unit));
            border-radius: var(--border-radius);
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-medium);
        }

        .feature-card .icon {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-unit);
            background: var(--button-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .feature-card p {
            font-size: 0.95rem;
            color: var(--text-medium);
        }

        /* About Section */
        .about-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-medium);
        }

        .about-content p {
            margin-bottom: var(--spacing-unit);
