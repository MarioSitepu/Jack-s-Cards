        /* Universal Styles & Reset */
        :root {
            --primary-gradient: linear-gradient(to right, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(to right, #ff7e5f 0%, #feb47b 100%);
            --dark-bg: #1a1a2e;
            --darker-bg: #0f0f1d;
            --text-light: #f0f0f0;
            --text-dark: #333333;
            --accent-color: #ff7e5f;
            --font-family-sans: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --box-shadow-light: 0 4px 15px rgba(0, 0, 0, 0.2);

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-sans);

            color: var(--text-light);
            background-color: var(--dark-bg);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        ul {
            list-style: none;
        }

        }

            margin-bottom: 1em;
        }

        /* Header */
        header {
            background: var(--darker-bg);

            box-shadow: var(--box-shadow-dark);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 1.8rem;
            font-weight: 800;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        .logo a:hover {
            transform: scale(1.05);
        }

        nav ul {
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            font-weight: 600;
            padding: 5px 0;
            position: relative;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: var(--box-shadow-light);
        }

        .primary-btn {
            background: var(--primary-gradient);
            color: var(--text-light);
            border: 2px solid transparent;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.4);
        }

        .secondary-btn {
            background: var(--secondary-gradient);
            color: var(--text-light);
            border: 2px solid transparent;
        }

        .secondary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 126, 95, 0.4);
        }

        /* Sections */
        section {
            padding: 80px 0;

        /* Hero Section */
        .hero-section {

            background-position: center;

            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Dark overlay */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-content h2 {
            font-size: 3.5rem;
            margin-bottom: 0.5em;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        .project-date {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .project-date span {
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Features Section */
        .features-section {
            background-color: var(--darker-bg);
            color: var(--text-light);
            padding-bottom: 100px;
        }

        .features-section h3 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: var(--secondary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .feature-item {
            background-color: var(--dark-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--box-shadow-dark);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .feature-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        .feature-item .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            line-height: 1; /* Ensure icon doesn't add extra line height */
        }

        .feature-item h4 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .feature-item p {
            font-size: 1rem;
            color: #ccc;
        }

        /* About Section */
        .about-section {
            background-color: var(--dark-bg);
            color: var(--text-light);
        }

        .about-section h3 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .about-content {
            max-width: 900px;
            margin: 0 auto;
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: left;
            color: #e0e0e0;
        }

        .about-content p:last-child {
            margin-bottom: 0;
        }

        /* Call to Action Section */
        .cta-section {
            background: var(--secondary-gradient);
            color: var(--text-light);
            padding: 60px 0;
        }

        .cta-section h3 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-light); /* Override gradient for better contrast on this gradient background */
        }

        .cta-section p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* Footer */
        footer {
            background-color: var(--darker-bg);
            color: #aaa;
            padding: 40px 0;
            font-size: 0.9rem;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.2);
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        footer p {
            margin-bottom: 15px;
        }

        .social-links {
            margin-top: 10px;
        }

        .social-links a {
            font-size: 1.5rem;
            margin: 0 10px;
            color: #aaa;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

                font-size: 3rem;
