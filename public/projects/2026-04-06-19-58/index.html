        /* CSS Variables */
        :root {
            --primary-gradient: linear-gradient(to right, #6A82FB, #FC5C7D); /* Blue to Pink/Red */

            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #ffffff;
            --bg-dark: #2c3e50;
            --accent-color: #FC5C7D;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.3);
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Roboto', sans-serif;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--bg-light);
            overflow-x: hidden; /* Prevent horizontal scroll on some gradient effects */
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            margin-bottom: 0.8em;
            color: var(--text-dark);
        }

        p {
            margin-bottom: 1em;
        }

        a {
            text-decoration: none;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: #6A82FB; /* A contrasting accent from the primary gradient */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--bg-dark);

            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-light);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--text-light);
            margin: 0;
            font-size: 1.8em;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: var(--text-light);
            font-weight: 600;
            padding: 5px 0;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            left: 0;
            bottom: -5px;
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            font-family: var(--font-heading);
            font-size: 1em;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #hero {

            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;

            border-radius: 50%;
            transform: rotate(45deg);
            animation: pulse 10s infinite alternate;
            z-index: 1;
        }

            0% { transform: scale(0.9) rotate(45deg); opacity: 0.05; }

        }
