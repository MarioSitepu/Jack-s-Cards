<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase - 2026</title>
    <style>
        /* CSS Variables */
        :root {
            --primary-bg: #1a1a2e; /* Dark background */
            --secondary-bg: #16213e; /* Slightly lighter dark */
            --accent-color-1: #0f3460; /* Darker blue accent */
            --accent-color-2: #e94560; /* Reddish accent */
            --text-color: #e0e0e0; /* Light text */
            --highlight-color: #533483; /* Purple highlight */
            --button-gradient-start: #e94560;
            --button-gradient-end: #b82e46;
        }

        /* Base Styles & Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-attachment: fixed; /* Ensures gradient covers full height */
        }

        a {
            color: var(--accent-color-2);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--text-color);
        }

        h1, h2, h3 {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        h1 { font-size: 2.8rem; }
        h2 { font-size: 2.2rem; }
        h3 { font-size: 1.8rem; }
        p { margin-bottom: 1rem; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        header {
            background-color: var(--secondary-bg);
            padding: 1.5rem 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color-2);
            transition: width 0.3s ease-in-out;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex-grow: 1;
        }

        section {
            padding: 5rem 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        section:nth-of-type(even) {
            background-color: rgba(0, 0, 0, 0.1); /* Subtle alternate section background */
        }

        /* Hero Section */
        #hero {
            background: linear-gradient(135deg, var(--accent-color-1), var(--highlight-color));
            color: var(--text-color);
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        #hero h2 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
        }

        #hero p {
            font-size: 1.5rem;
            max-width: 800px;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(to right, var(--button-gradient-start), var(--button-gradient-end));
            color: var(--text-color);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
</body>
</html>
