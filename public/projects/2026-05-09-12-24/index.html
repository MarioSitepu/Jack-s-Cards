<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Dashboard</title>
    <style>
        /* Modern CSS with Gradient Styling */

        /* Variables for easy theme management */
        :root {
            --primary-color: #4A00E0; /* Deep Violet */
            --secondary-color: #8E2DE2; /* Lighter Violet */
            --accent-color: #00C9FF; /* Bright Blue */
            --text-dark: #333;
            --text-light: #f4f4f4;
            --bg-light: #fdfdfd;
            --bg-gradient-start: #ece9e6; /* Light grey for subtle background */
            --bg-gradient-end: #ffffff; /* White for subtle background */
            --card-bg: #ffffff;
            --border-color: #eee;
            --shadow-light: rgba(0, 0, 0, 0.05);
        }

        /* General Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Modern sans-serif stack */
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styling */
        header {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            padding: 1rem 0;
            box-shadow: 0 2px 10px var(--shadow-light);
            z-index: 1000;
            position: relative;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows items to wrap on smaller screens */
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        header nav ul {
            list-style: none;
            display: flex;
        }

        header nav ul li {
            margin-left: 20px;
        }

        header nav ul li a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        header nav ul li a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Main Content Styling */
        main {
            flex: 1; /* Allows main to grow and push the footer down */
        }

        section {
            padding: 60px 0;
            margin-bottom: 20px;
        }

        section:nth-of-type(odd) {
            background-color: var(--bg-light);
        }

        h2, h3 {
            text-align: center;
            margin-bottom: 40px;
            color: var(--primary-color);
            font-weight: 700;
        }

        h2 {
            font-size: 2.8rem;
        }

        h3 {
            font-size: 2.2rem;
        }

        /* Hero Section */
        #hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1519389950473-47576a19d53d?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1974&q=80') no-repeat center center/cover;
            color: var(--text-light);
            text-align: center;
            padding: 120px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }

        #hero .container {
            max-width: 900px;
        }

        #hero h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: var(--text-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #hero p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(to right, var(--accent-color), #00A6FF);
            color: var(--text-light);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 201, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 201, 255, 0.6);
        }

        /* Card Grid for Overview */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid var(--primary-color);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h4 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .card p {
            color: #555;
            font-size: 1rem;
        }

        /* Features Section */
        #features ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        #features ul li {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow-light);
            text-align: center;
            font-weight: 500;
            color: var(--primary-color);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        #features ul li:hover {
            background-color: var(--primary-color);
            color: var(--text-light);
            transform: translateY(-5px);
        }

        /* Roadmap Section */
        .roadmap-item {
            background-color: var(--card-bg);
            padding: 25px;
            border-left: 5px solid var(--secondary-color);
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .roadmap-item:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .roadmap-item h4 {
            color: var(--primary-color);
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .roadmap-item p {
            color: #666;
        }

        .current-milestone {
            border-left-color: var(--accent-color);
            box-shadow: 0 2px 15px rgba(0, 201, 255, 0.2);
        }

        .current-milestone h4 {
            color: var(--accent-color);
        }

        /* Footer Styling */
        footer {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: var(--text-light);
            padding: 2rem 0;
            text-align: center;
            margin-top: auto; /* Pushes footer to the bottom */
        }

        footer .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        footer p {
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .social-links a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                text-align: center;
            }

            header h1 {
                margin-bottom: 15px;
                font-size: 1.6rem;
            }

            header nav ul {
                flex-direction: column;
                width: 100%;
            }

            header nav ul li {
                margin: 10px 0;
            }

            #hero {
                padding: 80px 20px;
                min-height: 50vh;
            }

            #hero h2 {
                font-size: 2.5rem;
            }

            #hero p {
                font-size: 1.1rem;
            }

            h2 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.8rem;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            #features ul {
                grid-template-columns: 1fr;
            }

            footer .container {
                padding: 0 15px;
            }

            .social-links a {
                margin: 0 8px;
            }
        }

        @media (max-width: 480px) {
            section {
                padding: 40px 0;
            }

            #hero h2 {
                font-size: 2rem;
            }

            #hero p {
                font-size: 1rem;
            }

            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .card {
                padding: 20px;
            }

            .card h4 {
                font-size: 1.3rem;
            }

            .roadmap-item {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Project Phoenix</h1>
            <nav>
                <ul>
                    <li><a href="#overview">Overview</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#roadmap">Roadmap</a></li>
                    <li><a href="#contact">Contact</a></li>
</body>
</html>
