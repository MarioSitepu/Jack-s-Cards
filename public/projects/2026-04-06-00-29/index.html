<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureFlow Innovations - Modern Project Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Modern CSS with gradient styling and responsiveness */

        :root {
            --primary-gradient-start: #4A00B7; /* Deep Purple */
            --primary-gradient-end: #00D2FF;   /* Bright Cyan */
            --secondary-gradient-start: #FF6B6B; /* Coral */
            --secondary-gradient-end: #F4E8C1; /* Light Peach */
            --dark-bg: #1A1A2E; /* Very Dark Blue/Purple */
            --light-bg: #2C2C4A; /* Slightly lighter Dark Blue/Purple */
            --text-color: #E0E0E0; /* Light Grey */
            --heading-color: #FFFFFF; /* White */
            --accent-color: #FFD700; /* Gold for highlights */
            --card-bg: rgba(44, 44, 74, 0.7); /* Light BG with transparency */
        }

        /* Basic Reset & Body Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--dark-bg), var(--light-bg));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-bottom: 0.8em;
            font-weight: 700;
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: var(--primary-gradient-end);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            padding: 1rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--heading-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: var(--heading-color);
            font-weight: 600;
            font-size: 1rem;
            position: relative;
            padding-bottom: 5px;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            left: 0;
            bottom: 0;
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem 0;
        }

        section {
            padding: 4rem 0;
        }

        section:nth-child(even) {
            background: var(--light-bg);
        }

        /* Hero Section */
        #hero {
            background: radial-gradient(circle at top left, var(--primary-gradient-start) 0%, transparent 70%),
                        radial-gradient(circle at bottom right, var(--primary-gradient-end) 0%, transparent 70%),
                        var(--dark-bg);
            padding: 8rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        #hero .hero-content {
            max-width: 800px;
        }

        #hero h1 {
            font-size: 3.8rem;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--secondary-gradient-start), var(--secondary-gradient-end));
            color: var(--dark-bg);
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }

        .project-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
        }

        /* Features Section */
        #features {
            background: var(--light-bg);
            text-align: center;
        }

        #features h2 {
            font-size: 2.8rem;
            margin-bottom: 3rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .feature-card h3 {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(45deg, var(--primary-gradient-end), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback for browsers that don't support -webkit-text-fill-color */
        }

        .feature-card p {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* About Section */
        #about {
            background: var(--dark-bg);
            text-align: center;
        }

        #about h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
        }

        #about p {
            max-width: 800px;
            margin: 0 auto 1.5rem auto;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Footer */
        footer {
            background: linear-gradient(90deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            color: var(--heading-color);
            padding: 2rem 0;
            text-align: center;
            margin-top: auto; /* Pushes footer to the bottom */
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.2);
        }

        footer p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .social-links {
            margin-top: 1rem;
        }

        .social-links a {
            color: var(--heading-color);
            font-size: 1.5rem;
            margin: 0 0.8rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

</body>
