<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Showcase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

        /* CSS Variables */
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --secondary-gradient: linear-gradient(135deg, #FF6B6B 0%, #FFD166 100%);
            --text-color: #333;
            --light-text-color: #f0f0f0;
            --background-color: #f7f9fc;
            --card-background: #ffffff;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-medium: 0 8px 25px rgba(0, 0, 0, 0.12);
            --border-radius-sm: 8px;
            --border-radius-lg: 15px;
            --header-height: 80px;
        }

        /* Base Styles */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            overflow-x: hidden;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            margin-bottom: 0.5em;
            font-weight: 700;
            color: var(--text-color);
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: #2575fc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #6a11cb;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: var(--card-background);
            box-shadow: var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8em;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* Fallback */
        }

        .nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav ul li {
            margin-left: 30px;
        }

        .nav ul li a {
            font-weight: 600;
            color: var(--text-color);
            position: relative;
            padding-bottom: 5px;
        }

        .nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .nav ul li a:hover::after,
        .nav ul li a.active::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            background: var(--primary-gradient);
            color: var(--light-text-color);
            text-align: center;
            padding: 100px 20px;
            position: relative;
            overflow: hidden;
            border-bottom-left-radius: var(--border-radius-lg);
            border-bottom-right-radius: var(--border-radius-lg);
            margin-bottom: 40px;
        }

        .hero::before, .hero::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 1;
        }

        .hero::before {
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            transform: rotate(45deg);
            animation: float-shape 10s infinite ease-in-out;
        }

        .hero::after {
            bottom: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            transform: rotate(-30deg);
            animation: float-shape 12s infinite reverse ease-in-out;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 0.5em;
            color: var(--light-text-color);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.3em;
            margin-bottom: 2em;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            background: var(--secondary-gradient);
            color: var(--light-text-color);
            padding: 15px 30px;
            border-radius: var(--border-radius-sm);
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--shadow-light);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
        }

        /* Sections */
        .section {
            padding: 60px 0;
            text-align: center;
        }

        .section:nth-of-type(even) {
            background-color: var(--card-background);
            box-shadow: var(--shadow-light);
            margin: 40px 0;
            border-radius: var(--border-radius-lg);
        }

        .section h2 {
            font-size: 2.5em;
            margin-bottom: 1em;
            position: relative;
            display: inline-block;
        }

        .section h2::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        /* Features/Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-background);
            padding: 30px;
</body>
</html>
